              <div className={`text-[10px] uppercase tracking-widest ${theme.fgFaint}`}>Navlog</div>
              <div className={`text-sm font-bold ${theme.accent} cockpit-glow truncate`}>
                {flight.callsign} · {ac.short}
              </div>
            </div>
          </div>
          <div className="flex items-center gap-1">
            <button
              onClick={() => savePrefs({ ...prefs, wakeLock: !prefs.wakeLock })}
              className={`p-2 ${prefs.wakeLock ? theme.accent : theme.fgMuted} active:scale-90 transition`}
              aria-label="Manter tela ligada"
              title={prefs.wakeLock ? "Tela travada ligada" : "Permitir desligar tela"}
            >
              {prefs.wakeLock ? <Eye className="w-5 h-5" /> : <EyeOff className="w-5 h-5" />}
            </button>
            <button
              onClick={() => setRoutesOpen(true)}
              className={`p-2 ${theme.fgMuted} hover:${theme.accent} active:scale-90 transition`}
              aria-label="Rotas salvas"
            >
              <FolderOpen className="w-5 h-5" />
            </button>
            <button
              onClick={() => setPrefsOpen(true)}
              className={`p-2 ${theme.fgMuted} active:scale-90 transition`}
              aria-label="Preferências"
            >
              <Settings className="w-5 h-5" />
            </button>
            <div className="text-right leading-tight ml-1">
              <div className={`text-[10px] uppercase tracking-widest ${theme.fgFaint}`}>UTC</div>
              <LiveClock theme={theme} />
            </div>
          </div>
        </div>
      </header>

      {/* CONTEÚDO */}
      <main className={tab === 'map' ? 'overflow-hidden' : 'pb-24'}>
        {tab === "setup" && (
          <SetupTab
            flight={flight} setFlight={setFlight} ac={ac} theme={theme}
            onEditCp={(i) => { setEditingIdx(i); setEditorOpen(true); }}
            onAddCp={() => { setEditingIdx(null); setEditorOpen(true); }}
            onNewBlank={newBlankRoute}
            onDeleteCp={(i) => {
              if (!confirm(`Remover ${flight.checkpoints[i].name}?`)) return;
              setFlight((f) => {
                const cps = [...f.checkpoints];
                cps.splice(i, 1);
                return { ...f, checkpoints: cps };
              });
            }}
            onMoveUp={moveUp}
            onMoveDown={moveDown}
            onReorder={reorder}
            onImportFPL={() => setImportOpen(true)}
            fleet={fleet}
            onManageFleet={() => setFleetOpen(true)}
            computed={computed}
            liveRoute={liveRoute}
            userPoints={userPoints}
            onAddUserPoint={addUserPoint}
            onDeleteUserPoint={deleteUserPoint}
          />
        )}
        {tab === "flight" && (
          <FlightTab
            flight={flight} computed={computed} liveETAs={liveETAs} liveFuel={liveFuel}
            liveRoute={liveRoute} nextLiveIdx={nextLiveIdx}
            markVirtual={markVirtual} unmarkVirtual={unmarkVirtual}
            nextIdx={nextIdx} markCrossed={markCrossed} unmark={unmark}
            depart={depart}
            resetFlight={resetFlight} ac={ac} theme={theme}
            viewMode={viewMode} setViewMode={setViewMode}
            onEditAta={(i) => { setAtaEditIdx(i); setAtaEditOpen(true); }}
            onEditVirtualAta={(key) => setVirtualAtaEditKey(key)}
            onEditAtd={() => setAtdEditOpen(true)}
            onEditNotes={(i) => { setNotesIdx(i); setNotesOpen(true); }}
            onOpenDeviation={() => setDeviationOpen(true)}
            onClearDeviation={clearDeviation}
            prefs={prefs}
          />
        )}
        {tab === "fuel" && (
          <FuelTab flight={flight} computed={computed} liveFuel={liveFuel} ac={ac} theme={theme} />
        )}
        {tab === "log" && (
          <LogTab flight={flight} computed={computed} liveFuel={liveFuel} ac={ac} theme={theme} />
        )}
        {tab === "map" && (
          <MapTab
            flight={flight} computed={computed} liveRoute={liveRoute}
            liveETAs={liveETAs} ac={ac} theme={theme}
            pdfOverlays={pdfOverlays} setPdfOverlays={setPdfOverlays}
            initialView={mapView} onViewChange={setMapView}
            onInsertWaypoint={(afterIdx, lat, lon) => {
              setInsertAfterIdx(afterIdx);
              setInsertCoords([lat, lon]);
              setEditingIdx(null);
              setEditorOpen(true);
            }}
          />
        )}
      </main>

      {/* TAB BAR */}
      <nav className={`fixed bottom-0 left-0 right-0 z-20 ${theme.panel} border-t ${theme.panelBorder}`}>
        <div className="grid grid-cols-5">
          <TabButton theme={theme} active={tab === "setup"} onClick={() => setTab("setup")}
            icon={<Settings className="w-5 h-5" />} label="Setup" />
          <TabButton theme={theme} active={tab === "flight"} onClick={() => setTab("flight")}
            icon={<Gauge className="w-5 h-5" />} label="Em Voo" />
          <TabButton theme={theme} active={tab === "fuel"} onClick={() => setTab("fuel")}
            icon={<Fuel className="w-5 h-5" />} label="Combustível" />
          <TabButton theme={theme} active={tab === "log"} onClick={() => setTab("log")}
            icon={<BookOpen className="w-5 h-5" />} label="Diário" />
          <TabButton theme={theme} active={tab === "map"} onClick={() => setTab("map")}
            icon={<MapIcon className="w-5 h-5" />} label="Mapa" />
        </div>
      </nav>

      {/* EDITOR DE WAYPOINT */}
      {editorOpen && (
        <WaypointEditor
          flight={flight} setFlight={setFlight}
          editingIdx={editingIdx}
          insertAfterIdx={insertAfterIdx}
          initLat={insertCoords?.[0]}
          initLon={insertCoords?.[1]}
          ac={ac}
          computed={computed}
          theme={theme}
          pdfOverlays={pdfOverlays}
          userPoints={userPoints}
          onAddUserPoint={addUserPoint}
          onDeleteUserPoint={deleteUserPoint}
          onClose={() => { setEditorOpen(false); setInsertAfterIdx(null); setInsertCoords(null); }}
        />
      )}

      {/* GERENCIADOR DE ROTAS */}
      {routesOpen && (
        <RoutesManager
          routes={savedRoutes}
          currentFlight={flight}
          onLoad={loadRoute}
          onDelete={deleteRoute}
          onSaveCurrent={saveCurrentRoute}
          onClose={() => setRoutesOpen(false)}
        />
      )}

      {/* EDITOR DE ATA */}
      {ataEditOpen && ataEditIdx != null && (
        <AtaEditor
          checkpoint={flight.checkpoints[ataEditIdx]}
          eobt={flight.eobt}
          prevAta={ataEditIdx > 0
            ? (flight.checkpoints[ataEditIdx - 1].isOrigin
                ? (flight.atd ?? flight.eobt)
                : flight.checkpoints[ataEditIdx - 1].ata)
            : null}
          etaPlanned={computed[ataEditIdx]?.etaPlanned}
          etaLive={liveETAs[ataEditIdx]}
          theme={theme}
          onSave={(ataStr) => { setAta(ataEditIdx, ataStr); setAtaEditOpen(false); }}
          onClear={() => { setAta(ataEditIdx, null); setAtaEditOpen(false); }}
          onClose={() => setAtaEditOpen(false)}
          onUseNow={() => { markCrossed(ataEditIdx); setAtaEditOpen(false); }}
        />
      )}

      {/* EDITOR DE ATA DE PONTO VIRTUAL (TOC/TOD/BOD) */}
      {virtualAtaEditKey != null && (() => {
        const item = liveRoute.find((x) => x.autoKey === virtualAtaEditKey);
        if (!item) return null;
        const currentAta = flight.autoWpATAs?.[virtualAtaEditKey] ?? null;
        return (
          <AtaEditor
            checkpoint={{ name: item.name, ata: currentAta }}
            eobt={flight.eobt}
            prevAta={null}
            etaPlanned={null}
            etaLive={null}
            theme={theme}
            onSave={(ataStr) => { setVirtualAta(virtualAtaEditKey, ataStr); setVirtualAtaEditKey(null); }}
            onClear={() => { unmarkVirtual(virtualAtaEditKey); setVirtualAtaEditKey(null); }}
            onClose={() => setVirtualAtaEditKey(null)}
            onUseNow={() => { markVirtual(virtualAtaEditKey); setVirtualAtaEditKey(null); }}
          />
        );
      })()}

      {/* EDITOR DE ATD */}
      {atdEditOpen && (
        <AtaEditor
          checkpoint={{ name: flight.origin || computed[0]?.name || "Origem", ata: flight.atd }}
          eobt={flight.eobt}
          prevAta={null}
          etaPlanned={flight.eobt ? parseHHMM(flight.eobt) : null}
          etaLive={null}
          theme={theme}
          fieldLabel="ATD"
          confirmLabel="Confirmar ATD"
          clearLabel="Cancelar ATD"
          onSave={(ataStr) => { setFlight((f) => ({ ...f, atd: ataStr })); setAtdEditOpen(false); }}
          onClear={() => { setFlight((f) => ({ ...f, atd: null })); setAtdEditOpen(false); }}
          onClose={() => setAtdEditOpen(false)}
          onUseNow={() => { setFlight((f) => ({ ...f, atd: formatHHMMSS(nowHHMM()) })); setAtdEditOpen(false); }}
        />
      )}

      {/* PREFERÊNCIAS */}
      {prefsOpen && (
        <PrefsPanel
          prefs={prefs} savePrefs={savePrefs} theme={theme}
          onClose={() => setPrefsOpen(false)}
        />
      )}

      {/* DEVIAÇÃO / REPOSICIONAMENTO */}
      {deviationOpen && (
        <DeviationPanel
          flight={flight} ac={ac} theme={theme}
          pdfOverlays={pdfOverlays}
          defaultTargetIdx={(function() {
            // Resolve default to the next user waypoint not yet crossed.
            for (let i = 1; i < flight.checkpoints.length; i++) {
              const c = flight.checkpoints[i];
              if (c && !c.isOrigin && c.lat != null && c.ata == null) return i;
            }
            return null;
          })()}
          onApply={setDeviation}
          onClear={clearDeviation}
          onClose={() => setDeviationOpen(false)}
        />
      )}

      {/* NOTAS DE WAYPOINT */}
      {notesOpen && notesIdx != null && (
        <NotesEditor
          checkpoint={flight.checkpoints[notesIdx]}
          theme={theme}
          onSave={(text) => { saveNote(notesIdx, text); setNotesOpen(false); }}
          onClose={() => setNotesOpen(false)}
        />
      )}

      {/* IMPORTAR FPL */}
      {importOpen && (
        <FPLImporter
          theme={theme}
          onImport={importFPLRoute}
          onClose={() => setImportOpen(false)}
        />
      )}

      {/* GERENCIAR FROTA */}
      {fleetOpen && (
        <FleetManager
          fleet={fleet}
          onEdit={(ac) => setFleetEditAircraft(ac)}
          onDelete={(id) => {
            if (!confirm('Remover aeronave?')) return;
            setFleet((f) => { const n = { ...f }; delete n[id]; return n; });
            if (flight.aircraftKey === id) setFlight((f) => ({ ...f, aircraftKey: Object.keys(fleet).find(k => k !== id) || 'baron58' }));
          }}
          onReset={(id) => {
            if (!confirm('Restaurar valores padrão?')) return;
            setFleet((f) => ({ ...f, [id]: { ...FLEET_DEFAULTS[id], id, isBuiltIn: true } }));
          }}
          onAdd={() => setFleetEditAircraft({ isBuiltIn: false, name: '', short: '', engine: '', tasCruise: 0, vy: 0, vDescent: 0, rocClimb: 0, rodDescent: 0, gphClimb: 0, gphCruise: 0, gphDescent: 0, fuelUsable: 0, mtow: 0, bew: 0 })}
          onClose={() => setFleetOpen(false)}
          theme={theme}
        />
      )}
      {fleetEditAircraft !== null && (
        <AircraftEditor
          aircraft={fleetEditAircraft}
          theme={theme}
          onSave={(updated) => {
            const id = updated.id || ('custom_' + Date.now().toString(36));
            setFleet((f) => ({ ...f, [id]: { ...updated, id } }));
            setFleetEditAircraft(null);
          }}
          onClose={() => setFleetEditAircraft(null)}
        />
      )}
    </div>
  );
}

    const id = setInterval(() => setT(nowHHMM()), 1000 * 10);
    return () => clearInterval(id);
  }, []);

// --------- SETUP ---------
function PointFinderMapTab({ flight, theme, pdfOverlays, userPoints, onConfirm, onSave }) {
  const mapDivRef = useRef(null);
  const mapRef = useRef(null);
  const pickedMarkerRef = useRef(null);
  const pdfLayerRefs = useRef({});
  const [picked, setPicked] = useState(null);
  const [name, setName] = useState("");

  useEffect(() => {
    if (!window.L || !mapDivRef.current || mapRef.current) return;
    const map = window.L.map(mapDivRef.current, { zoomControl: true, zoomSnap: 0, zoomDelta: 0.25, wheelPxPerZoomLevel: 90 });
    window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap', maxZoom: 18, keepBuffer: 4,
    }).addTo(map);

    map.createPane('pfRoute');
    map.getPane('pfRoute').style.zIndex = 500;
    map.createPane('pfLib');
    map.getPane('pfLib').style.zIndex = 510;

    const wps = (flight.checkpoints || []).filter(cp => cp.lat != null && cp.lon != null);
    if (wps.length >= 2) {
      const coords = wps.map(cp => [cp.lat, cp.lon]);
      window.L.polyline(coords, { color: '#f59e0b', weight: 2, opacity: 0.7, dashArray: '4,4', pane: 'pfRoute' }).addTo(map);
      wps.forEach(cp => {
        const html = `<div style="background:#a855f7;border-radius:50%;width:10px;height:10px;border:2px solid #fff;box-shadow:0 1px 3px #000"></div>`;
        const icon = window.L.divIcon({ html, className: '', iconSize: [10,10], iconAnchor: [5,5] });
        window.L.marker([cp.lat, cp.lon], { icon, pane: 'pfRoute' }).addTo(map).bindPopup(cp.name || '');
      });
      map.fitBounds(window.L.latLngBounds(coords), { padding: [50,50] });
    } else if (wps.length === 1) {
      map.setView([wps[0].lat, wps[0].lon], 9);
    } else {
      map.setView([39.5, -8.0], 6);
    }

    // Library points (⭐)
    (userPoints || []).forEach(pt => {
      if (pt.lat == null || pt.lon == null) return;
      const html = `<div style="background:#f59e0b;border-radius:50%;width:14px;height:14px;border:2px solid #fff;box-shadow:0 1px 3px #000;display:flex;align-items:center;justify-content:center;font-size:9px;color:#000;font-weight:700">★</div>`;
      const icon = window.L.divIcon({ html, className: '', iconSize: [14,14], iconAnchor: [7,7] });
      window.L.marker([pt.lat, pt.lon], { icon, pane: 'pfLib' }).addTo(map).bindPopup(pt.name || '');
    });

    map.on('click', (e) => setPicked([e.latlng.lat, e.latlng.lng]));

    mapRef.current = map;
    const t = setTimeout(() => { try { map.invalidateSize(); } catch (_) {} }, 50);
    return () => { clearTimeout(t); map.remove(); mapRef.current = null; };
  }, []);

  // PDF overlays
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !window.L || !pdfOverlays) return;
    Object.keys(pdfLayerRefs.current).forEach(id => { try { pdfLayerRefs.current[id].remove(); } catch (_) {} });
    pdfLayerRefs.current = {};
    pdfOverlays.forEach(ov => {
      if (!ov.visible || !ov.dataUrl || !ov.bounds) return;
      const layer = window.L.imageOverlay(ov.dataUrl, ov.bounds, {
        opacity: ov.opacity != null ? ov.opacity : 0.7, interactive: false, zIndex: 450,
      }).addTo(map);
      pdfLayerRefs.current[ov.id] = layer;
    });
    return () => {
      Object.keys(pdfLayerRefs.current).forEach(id => { try { pdfLayerRefs.current[id].remove(); } catch (_) {} });
      pdfLayerRefs.current = {};
    };
  }, [pdfOverlays]);

  // Picked marker
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !window.L) return;
    if (pickedMarkerRef.current) { map.removeLayer(pickedMarkerRef.current); pickedMarkerRef.current = null; }
    if (!picked) return;
    const html = `<div style="background:#22c55e;border-radius:50%;width:18px;height:18px;border:3px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.9)"></div>`;
    const icon = window.L.divIcon({ html, className: '', iconSize: [18,18], iconAnchor: [9,9] });
    pickedMarkerRef.current = window.L.marker(picked, { icon, zIndexOffset: 900 }).addTo(map);
  }, [picked]);

  function buildPoint() {
    if (!picked) return null;
    const lat = Math.round(picked[0] * 1e6) / 1e6;
    const lon = Math.round(picked[1] * 1e6) / 1e6;
    let n = (name || "").trim().slice(0, 10).toUpperCase();
    if (!n) {
      // Auto name: M + abs(lat°)*100 + abs(lon°)*100, e.g., M2350-4664 trimmed
      n = "MAP" + Math.abs(Math.round(lat * 10)).toString().slice(-3) + Math.abs(Math.round(lon * 10)).toString().slice(-3);
      n = n.slice(0, 10);
    }
    return { name: n, kind: "custom", lat, lon, source: { kind: "map", lat, lon } };
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", minHeight: 0 }}>
      <div ref={mapDivRef} style={{ flex: 1, minHeight: 0 }} />
      <div className={`p-3 shrink-0 ${theme.panel} border-t ${theme.panelBorder} space-y-2`}>
        {picked ? (
          <div className={`text-center text-[11px] num ${theme.cyan}`}>
            {picked[0].toFixed(4)}, {picked[1].toFixed(4)}
          </div>
        ) : (
          <div className={`text-center text-[10px] uppercase tracking-widest ${theme.fgFaint}`}>
            Toque no mapa para definir o ponto
          </div>
        )}
        <div className="grid grid-cols-2 gap-2">
          <input type="text" placeholder="Nome (auto)" maxLength={10}
            value={name} onChange={(e) => setName(e.target.value.toUpperCase())}
            className={`${theme.inputBg} border ${theme.inputBorder} ${theme.fg} px-3 py-2 text-sm rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500/30 num`}
          />
          <button onClick={() => { const p = buildPoint(); if (p) onSave(p); }}
            disabled={!picked}
            className={`px-3 py-2 rounded-xl border text-xs font-bold inline-flex items-center justify-center gap-1 ${picked ? theme.panelBorder + ' ' + theme.fgMuted : theme.panel + ' ' + theme.fgFaint + ' opacity-40'}`}>
            <Star className="w-3.5 h-3.5" /> Salvar
          </button>
        </div>
        <button onClick={() => { const p = buildPoint(); if (p) onConfirm(p); }}
          disabled={!picked}
          className={`w-full py-3 rounded-xl font-bold text-base ${picked ? theme.accentBg + ' ' + (theme.accentBgFg ?? 'text-black') : theme.panel + ' ' + theme.fgFaint + ' opacity-40'}`}>
          Usar este ponto
        </button>
      </div>
    </div>
  );
}

function PointFinder({ flight, ac, theme, userPoints, onAddUserPoint, onDeleteUserPoint, onConfirm, onCancel, depth = 0, initialQuery = "", pdfOverlays, initialSource = null }) {
  const initialTab = initialSource && initialSource.kind === "radial" ? "radial"
    : initialSource && initialSource.kind === "intersection" ? "intersect"
    : initialSource && initialSource.kind === "map" ? "map"
    : "search";
  const [tab, setTab] = useState(initialTab);
  const [innerOpen, setInnerOpen] = useState(false);
  const [innerSlot, setInnerSlot] = useState(null); // 'anchor' | 'iA' | 'iB'

  // Search tab state
  const [query, setQuery] = useState(initialQuery || "");
  const [airacResults, setAiracResults] = useState(null);
  const [searching, setSearching] = useState(false);
  const abortRef = useRef(null);
  const debounceRef = useRef(null);

  function triggerSearch(q) {
    if (debounceRef.current) clearTimeout(debounceRef.current);
    if (abortRef.current) { try { abortRef.current.abort(); } catch (_) {} abortRef.current = null; }
    if (!q || q.length < 2) { setAiracResults(null); setSearching(false); return; }
    setSearching(true);
    debounceRef.current = setTimeout(async () => {
      const ctrl = new AbortController();
      abortRef.current = ctrl;
      try {
        const data = await airacSearch(q, ctrl.signal);
        if (ctrl === abortRef.current) {
          setAiracResults(data || { airports: [], navaids: [], waypoints: [] });
          setSearching(false);
        }
      } catch (_) { /* aborted */ }
    }, 300);
  }
  useEffect(() => {
    return () => {
      if (debounceRef.current) clearTimeout(debounceRef.current);
      if (abortRef.current) { try { abortRef.current.abort(); } catch (_) {} }
    };
  }, []);
  useEffect(() => { if (initialQuery) triggerSearch(initialQuery); }, []); // eslint-disable-line

  // Local matches (substring on name / notes / tags)
  const localMatches = useMemo(() => {
    if (!query || query.length < 1) return [];
    const q = query.toUpperCase();
    return (userPoints || []).filter((pt) => {
      if ((pt.name || "").toUpperCase().includes(q)) return true;
      if ((pt.notes || "").toUpperCase().includes(q)) return true;
      if ((pt.tags || []).some((t) => (t || "").toUpperCase().includes(q))) return true;
      return false;
    });
  }, [userPoints, query]);

  // Radial+distance tab state
  // Pre-fill from initialSource when it's a radial computation, so 'Editar fonte'
  // re-opens with anchor/bearing/distance ready to tweak.
  const _initRadial = initialSource && initialSource.kind === "radial" ? initialSource : null;
  const _initIsect = initialSource && initialSource.kind === "intersection" ? initialSource : null;
  const [anchor, setAnchor] = useState(_initRadial && _initRadial.anchor ? _initRadial.anchor : null);
  const [bearingMode, setBearingMode] = useState(_initRadial && _initRadial.bearingMode ? _initRadial.bearingMode : "mc");
  const [bearing, setBearing] = useState(_initRadial && _initRadial.bearing != null ? String(_initRadial.bearing) : "");
  const [distance, setDistance] = useState(_initRadial && _initRadial.distance != null ? String(_initRadial.distance) : "");

  // Intersection tab state
  const [iAnchorA, setIAnchorA] = useState(_initIsect && _initIsect.anchorA ? _initIsect.anchorA : null);
  const [iAnchorB, setIAnchorB] = useState(_initIsect && _initIsect.anchorB ? _initIsect.anchorB : null);
  const [iBearingMode, setIBearingMode] = useState(_initIsect && _initIsect.bearingMode ? _initIsect.bearingMode : "mc");
  const [iBearingA, setIBearingA] = useState(_initIsect && _initIsect.bearingA != null ? String(_initIsect.bearingA) : "");
  const [iBearingB, setIBearingB] = useState(_initIsect && _initIsect.bearingB != null ? String(_initIsect.bearingB) : "");

  // Coords tab state
  const _initCoords = initialSource && initialSource.kind === "manual" ? initialSource : null;
  const [coordsText, setCoordsText] = useState("");

  const radialResult = (function() {
    if (!anchor || anchor.lat == null || anchor.lon == null) return null;
    const brg = parseFloat(bearing);
    const dist = parseFloat(distance);
    if (isNaN(brg) || isNaN(dist) || dist <= 0) return null;
    const variation = getDecl(anchor.lat, anchor.lon, anchor.alt || 0) ?? (flight.variation ?? 0);
    const tc = bearingMode === "mc" ? (((brg + variation) % 360) + 360) % 360 : brg;
    const proj = projectDest(anchor.lat, anchor.lon, tc, dist);
    return {
      name: ((anchor.name || "PT") + Math.round(brg).toString().padStart(3, "0") + Math.round(dist)).slice(0, 10).toUpperCase(),
      lat: Math.round(proj[0] * 1e6) / 1e6,
      lon: Math.round(proj[1] * 1e6) / 1e6,
      kind: "computed",
      notes: (anchor.name || "") + " " + bearingMode.toUpperCase() + " " + Math.round(brg) + "° / " + dist + " NM",
      source: {
        kind: "radial",
        anchor: {
          name: anchor.name, kind: anchor.kind || "custom",
          lat: anchor.lat, lon: anchor.lon, alt: anchor.alt ?? null,
          source: anchor.source || { kind: "manual" },
        },
        bearing: brg,
        bearingMode: bearingMode,
        distance: dist,
      },
    };
  })();

  // Intersection result: two anchors, two bearings → great-circle intersection.
  const intersectionResult = (function() {
    if (!iAnchorA || iAnchorA.lat == null || !iAnchorB || iAnchorB.lat == null) return null;
    const ba = parseFloat(iBearingA), bb = parseFloat(iBearingB);
    if (isNaN(ba) || isNaN(bb)) return null;
    const varA = getDecl(iAnchorA.lat, iAnchorA.lon, iAnchorA.alt || 0) ?? (flight.variation ?? 0);
    const varB = getDecl(iAnchorB.lat, iAnchorB.lon, iAnchorB.alt || 0) ?? (flight.variation ?? 0);
    const tcA = iBearingMode === "mc" ? (((ba + varA) % 360) + 360) % 360 : ba;
    const tcB = iBearingMode === "mc" ? (((bb + varB) % 360) + 360) % 360 : bb;
    const out = gcIntersection(iAnchorA.lat, iAnchorA.lon, tcA, iAnchorB.lat, iAnchorB.lon, tcB);
    if (!out) return null;
    return {
      name: ((iAnchorA.name || "A") + "x" + (iAnchorB.name || "B")).slice(0, 10).toUpperCase(),
      kind: "computed",
      lat: Math.round(out[0] * 1e6) / 1e6,
      lon: Math.round(out[1] * 1e6) / 1e6,
      notes: (iAnchorA.name || "?") + " R" + Math.round(ba) + "° × " + (iAnchorB.name || "?") + " R" + Math.round(bb) + "°",
      source: {
        kind: "intersection",
        anchorA: { name: iAnchorA.name, kind: iAnchorA.kind || "custom",

          lat: iAnchorB.lat, lon: iAnchorB.lon, alt: iAnchorB.alt ?? null,
          source: iAnchorB.source || { kind: "manual" } },
        bearingMode: iBearingMode,
        bearingA: ba,
        bearingB: bb,
      },
    };

  const coordsResult = (function() {

    const r = parseCoordsString(coordsText);

      kind: "custom",
      lat: Math.round(r[0] * 1e6) / 1e6,

    const id = (kind === "airport" ? (item.icao || item.iata) : (item.identifier || item.icao)) || "PT";

      lat: Math.round(Number(lat) * 1e6) / 1e6,
      lon: Math.round(Number(lon) * 1e6) / 1e6,

              if (innerSlot === "anchor") setAnchor(pt);
              else if (innerSlot === "iA") setIAnchorA(pt);
              else if (innerSlot === "iB") setIAnchorB(pt);
              setInnerOpen(false);
            }}
            onCancel={() => setInnerOpen(false)}
          />
        );
      })()}
    </div>
  );
}

function DeviationPanel({ flight, ac, theme, defaultTargetIdx, pdfOverlays, onApply, onClear, onClose }) {
  const dev = flight.activeDeviation || null;
  const mapDivRef = useRef(null);
  const mapRef = useRef(null);
  const posMarkerRef = useRef(null);
  const previewLineRef = useRef(null);
  const targetMarkerRef = useRef(null);
  const pdfLayerRefs = useRef({});

  const [pos, setPos] = useState(dev ? [dev.fromLat, dev.fromLon] : null);
  const [alt, setAlt] = useState(dev != null && dev.currentAlt != null ? dev.currentAlt : (flight.cruiseAlt ?? 7000));
  const [tas, setTas] = useState(dev != null && dev.currentTas != null ? dev.currentTas : (ac && ac.tasCruise ? ac.tasCruise : 100));
  const [targetIdx, setTargetIdx] = useState(dev && dev.targetIdx != null ? dev.targetIdx : (defaultTargetIdx != null ? defaultTargetIdx : null));

  const targetOptions = (flight.checkpoints || [])
    .map((cp, i) => ({ cp, i }))
    .filter(x => x.cp && !x.cp.isOrigin && x.cp.lat != null && x.cp.lon != null && (x.cp.ata == null || (dev && dev.targetIdx === x.i)));

  // Init map
  useEffect(() => {
    if (!window.L || !mapDivRef.current || mapRef.current) return;
    const map = window.L.map(mapDivRef.current, { zoomControl: true, zoomSnap: 0, zoomDelta: 0.25, wheelPxPerZoomLevel: 90 });
    window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap', maxZoom: 18, keepBuffer: 4,
    }).addTo(map);
    map.createPane('devRoute');
    map.getPane('devRoute').style.zIndex = 500;
    map.getPane('devRoute').style.pointerEvents = 'none';

    const wps = (flight.checkpoints || []).filter(cp => cp.lat != null && cp.lon != null);
    if (wps.length >= 2) {
      const coords = wps.map(cp => [cp.lat, cp.lon]);
      window.L.polyline(coords, { color: '#f59e0b', weight: 2, opacity: 0.65, dashArray: '4,4', pane: 'devRoute' }).addTo(map);
      wps.forEach(cp => {
        const html = `<div style="background:#a855f7;border-radius:50%;width:10px;height:10px;border:2px solid #fff;box-shadow:0 1px 3px #000"></div>`;
        const icon = window.L.divIcon({ html, className: '', iconSize: [10,10], iconAnchor: [5,5] });
        window.L.marker([cp.lat, cp.lon], { icon, pane: 'devRoute' }).addTo(map).bindPopup(cp.name || '');
      });
      map.fitBounds(window.L.latLngBounds(coords), { padding: [60,60] });
    } else if (wps.length === 1) {
      map.setView([wps[0].lat, wps[0].lon], 9);
    } else {
      map.setView([39.5, -8.0], 6);
    }

    map.on('click', (e) => setPos([e.latlng.lat, e.latlng.lng]));

    mapRef.current = map;
    const t = setTimeout(() => { try { map.invalidateSize(); } catch (_) {} }, 50);
    return () => { clearTimeout(t); map.remove(); mapRef.current = null; };
  }, []);

  // Render PDF overlays
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !window.L || !pdfOverlays) return;
    Object.keys(pdfLayerRefs.current).forEach(id => { try { pdfLayerRefs.current[id].remove(); } catch (_) {} });
    pdfLayerRefs.current = {};
    pdfOverlays.forEach(ov => {
      if (!ov.visible || !ov.dataUrl || !ov.bounds) return;
      const layer = window.L.imageOverlay(ov.dataUrl, ov.bounds, {
        opacity: ov.opacity != null ? ov.opacity : 0.7, interactive: false, zIndex: 450,
      }).addTo(map);
      pdfLayerRefs.current[ov.id] = layer;
    });
    return () => {
      Object.keys(pdfLayerRefs.current).forEach(id => { try { pdfLayerRefs.current[id].remove(); } catch (_) {} });
      pdfLayerRefs.current = {};
    };
  }, [pdfOverlays]);

  // Target waypoint marker (cyan)
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !window.L) return;
    if (targetMarkerRef.current) { map.removeLayer(targetMarkerRef.current); targetMarkerRef.current = null; }
    const target = targetIdx != null ? flight.checkpoints[targetIdx] : null;
    if (target && target.lat != null && target.lon != null) {
      const html = `<div style="background:#22d3ee;border-radius:50%;width:14px;height:14px;border:3px solid #fff;box-shadow:0 0 6px rgba(34,211,238,0.7)"></div>`;
      const icon = window.L.divIcon({ html, className: '', iconSize: [14,14], iconAnchor: [7,7] });
      targetMarkerRef.current = window.L.marker([target.lat, target.lon], { icon, pane: 'devRoute', zIndexOffset: 800 }).addTo(map);
      targetMarkerRef.current.bindPopup('Alvo · ' + (target.name || ''));
    }
  }, [targetIdx]);

  // Picked position marker + preview line to target
  useEffect(() => {
    const map = mapRef.current;
    if (!map || !window.L) return;
    if (posMarkerRef.current) { map.removeLayer(posMarkerRef.current); posMarkerRef.current = null; }
    if (previewLineRef.current) { map.removeLayer(previewLineRef.current); previewLineRef.current = null; }
    if (!pos) return;
    const html = `<div style="background:#22c55e;border-radius:50%;width:18px;height:18px;border:3px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.9)"></div>`;
    const icon = window.L.divIcon({ html, className: '', iconSize: [18,18], iconAnchor: [9,9] });
    posMarkerRef.current = window.L.marker(pos, { icon, zIndexOffset: 900 }).addTo(map);

    const target = targetIdx != null ? flight.checkpoints[targetIdx] : null;
    if (target && target.lat != null && target.lon != null) {
      previewLineRef.current = window.L.polyline([pos, [target.lat, target.lon]], {
        color: '#22d3ee', weight: 3, opacity: 0.95, dashArray: '8,6', pane: 'devRoute',
      }).addTo(map);
    }
  }, [pos, targetIdx]);

  // Compute preview metrics
  const target = targetIdx != null ? flight.checkpoints[targetIdx] : null;
  let pDist = null, pMC = null, pETE = null, pETA = null;
  if (pos && target && target.lat != null && target.lon != null) {
    pDist = gcDist(pos[0], pos[1], target.lat, target.lon);
    const tc = gcTC(pos[0], pos[1], target.lat, target.lon);
    const variation = flight.variation ?? 0;
    pMC = Math.round(((tc - variation) % 360 + 360) % 360);
    const tasN = Number(tas) || 100;
    const r = calcLeg(tc, pDist, tasN, flight.windDir, flight.windVel, variation, 0);
    pETE = r.ete;
    const startMin = nowHHMM();
    pETA = startMin + (r.ete || 0);
  }

  function handleApply() {
    if (pos == null || targetIdx == null) return;
    onApply({
      fromLat: Math.round(pos[0] * 1e6) / 1e6,
      fromLon: Math.round(pos[1] * 1e6) / 1e6,
      targetIdx: Number(targetIdx),
      currentAlt: Number(alt) || 0,
      currentTas: Number(tas) || 0,
      startedAt: formatHHMMSS(nowHHMM()),
    });
    onClose();
  }
  function handleClear() {
    onClear();
    onClose();
  }

  return (
    <div onClick={(e) => e.stopPropagation()}
      style={{ position: 'fixed', inset: 0, zIndex: 9999, display: 'flex', flexDirection: 'column', isolation: 'isolate' }}
      className={theme.bg}>
      <div className={`flex items-center gap-2 p-3 shrink-0 ${theme.panel} border-b ${theme.panelBorder}`}>
        <button onClick={onClose}
          className={`px-3 py-1.5 rounded-lg border text-sm ${theme.panelBorder} ${theme.fgFaint}`}>
          Cancelar
        </button>
        <span className={`flex-1 text-center text-sm font-bold ${theme.cyan}`}>
          {dev ? "Editar desvio" : "Reposicionar — toque na sua posição"}
        </span>
        {dev && (
          <button onClick={handleClear}
            className="px-3 py-1.5 rounded-lg border border-red-500 text-red-400 text-sm font-bold">
            Voltar à rota
          </button>
        )}
      </div>
      <div ref={mapDivRef} style={{ flex: 1, minHeight: 0 }} />
      <div className={`p-3 shrink-0 ${theme.panel} border-t ${theme.panelBorder} space-y-2`}>
        <div className="grid grid-cols-3 gap-2">
          <label className="space-y-0.5 block">
            <span className={`text-[10px] uppercase tracking-widest ${theme.fgFaint}`}>Altitude (ft)</span>
            <input type="number" inputMode="numeric" value={alt}
              onChange={(e) => setAlt(e.target.value === '' ? '' : Number(e.target.value))}
              className={`w-full ${theme.inputBg} border ${theme.inputBorder} ${theme.fg} px-2 py-1.5 text-sm rounded num focus:outline-none focus:ring-2 focus:ring-amber-500/30`} />
          </label>
          <label className="space-y-0.5 block">
            <span className={`text-[10px] uppercase tracking-widest ${theme.fgFaint}`}>TAS (kt)</span>
            <input type="number" inputMode="numeric" value={tas}
              onChange={(e) => setTas(e.target.value === '' ? '' : Number(e.target.value))}
              className={`w-full ${theme.inputBg} border ${theme.inputBorder} ${theme.fg} px-2 py-1.5 text-sm rounded num focus:outline-none focus:ring-2 focus:ring-amber-500/30`} />
          </label>
          <label className="space-y-0.5 block">
            <span className={`text-[10px] uppercase tracking-widest ${theme.fgFaint}`}>Alvo</span>
            <select value={targetIdx ?? ''}
              onChange={(e) => setTargetIdx(e.target.value === '' ? null : Number(e.target.value))}
              className={`w-full ${theme.inputBg} border ${theme.inputBorder} ${theme.fg} px-2 py-1.5 text-sm rounded focus:outline-none focus:ring-2 focus:ring-amber-500/30`}>
              {targetIdx == null && <option value="">—</option>}
              {targetOptions.map(({ cp, i }) => (
                <option key={i} value={i}>{cp.name || ('WP ' + i)}</option>
              ))}
            </select>
          </label>
        </div>
        {pDist != null && (
          <div className={`text-center text-xs num ${theme.cyan}`}>
            {String(pMC).padStart(3, '0')}°M · {pDist.toFixed(1)} NM · {pETE.toFixed(1)} min · ETA {formatHHMM(pETA)}
          </div>
        )}
        <button onClick={handleApply}
          disabled={pos == null || targetIdx == null}
          className={`w-full py-3 rounded-xl font-bold text-base ${
            pos != null && targetIdx != null
              ? `${theme.accentBg} ${theme.accentBgFg ?? 'text-black'}`
              : `${theme.panel} ${theme.fgFaint} opacity-40`
          }`}>
          {dev ? "Atualizar desvio" : "Aplicar desvio"}
        </button>
      </div>
    </div>
  );
}

function AiracBadge({ theme }) {
  const [info, setInfo] = useState(null);
  useEffect(() => { airacGetCurrent().then(setInfo); }, []);
  if (!info) return null;
  const days = info.days_remaining;
  const expired = typeof days === "number" && days < 0;
  const warn    = typeof days === "number" && days >= 0 && days <= 3;
  const cls = expired
    ? "border-red-500 text-red-300 bg-red-500/10"
    : warn
      ? "border-amber-500 text-amber-300 bg-amber-500/10"
      : (theme.panelBorder + " " + (theme.fgMuted || "text-zinc-400"));
  const tip = `Efetivo ${(info.effective_date || "").slice(0,10)} → expira ${(info.expiration_date || "").slice(0,10)}`;
  return (
    <div title={tip}
      className={`text-[10px] uppercase tracking-widest border rounded-md px-2 py-1 inline-flex items-center gap-1.5 num ${cls}`}>
      <span className="font-bold">AIRAC {info.cycle}</span>
      <span>·</span>
      <span>{expired ? "expirado" : (days == null ? "—" : `${days} dia${days !== 1 ? "s" : ""}`)}</span>
    </div>
  );
}

function SetupTab({ flight, setFlight, ac, theme, onEditCp, onAddCp, onNewBlank, onDeleteCp, onMoveUp, onMoveDown, onReorder, onImportFPL, fleet, onManageFleet, computed, liveRoute, userPoints, onAddUserPoint, onDeleteUserPoint, onRefreshFreqs }) {
  const set = (k, v) => setFlight({ ...flight, [k]: v });
  const setN = (k, v) => set(k, v === "" ? null : Number(v));

  // Drag-to-reorder state
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOverIdx, setDragOverIdx] = useState(null);
  const listRef = useRef(null);

  function onDragHandleTouchStart(e, i) {
    haptic([20]);
    setDragIdx(i);
    setDragOverIdx(i);
  }
  function onDragHandleTouchMove(e) {
    if (dragIdx == null) return;
    e.preventDefault();
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const row = el?.closest('[data-wp-idx]');
    if (row) {
      const idx = parseInt(row.dataset.wpIdx, 10);
      if (!isNaN(idx) && idx !== dragOverIdx) setDragOverIdx(idx);
    }
  }
  function onDragHandleTouchEnd() {
    if (dragIdx != null && dragOverIdx != null && dragIdx !== dragOverIdx) {
      haptic([30]);
      onReorder(dragIdx, dragOverIdx);
    }
    setDragIdx(null);
    setDragOverIdx(null);
  }

  const fieldClass =
    `w-full ${theme.inputBg} border-2 ${theme.inputBorder} ${theme.fg} px-3 py-2.5 text-base rounded-xl num focus:${theme.accentBorder} focus:outline-none focus:ring-2 focus:ring-amber-500/30`;
  const labelClass = `text-[10px] uppercase tracking-widest ${theme.fgFaint} mb-1 block`;

  return (
    <div className="px-3 py-3 space-y-4">
      <div className="flex items-center justify-end -mb-2">
        <AiracBadge theme={theme} />
      </div>

      {/* AERONAVE */}
      <Section theme={theme} icon={<Plane className="w-4 h-4" />} title="Aeronave">
        <select
          value={flight.aircraftKey}
          onChange={(e) => set("aircraftKey", e.target.value)}
          className={fieldClass}
        >
          {Object.entries(fleet).map(([k, v]) => (
            <option key={k} value={k}>{v.name}</option>
          ))}
        </select>
        <button
          onClick={onManageFleet}
          className={`mt-2 w-full ${theme.panel} border ${theme.panelBorder} ${theme.fgMuted} rounded-xl py-2 text-xs uppercase tracking-widest flex items-center justify-center gap-2`}
        >
          <Settings className="w-3.5 h-3.5" /> Gerenciar frota
        </button>
        <div className="grid grid-cols-3 gap-2 mt-2 text-xs">
          <Stat theme={theme} label="TAS" value={`${ac.tasCruise} kt`} />
          <Stat theme={theme} label="GPH" value={`${ac.gphCruise}`} />
          <Stat theme={theme} label="Fuel" value={`${ac.fuelUsable} gal`} />
        </div>
      </Section>

      {/* IDENTIFICAÇÃO */}
      <Section theme={theme} icon={<MapPin className="w-4 h-4" />} title="Identificação">
        <div className="grid grid-cols-2 gap-2">
          <div>
            <label className={labelClass}>Callsign</label>
            <input className={fieldClass} value={flight.callsign}
              onChange={(e) => set("callsign", e.target.value.toUpperCase())} />
          </div>
          <div>
            <label className={labelClass}>EOBT (UTC)</label>
            <input className={fieldClass} value={flight.eobt} placeholder="13:00"
              onChange={(e) => set("eobt", e.target.value)} />
          </div>
          <div>
            <label className={labelClass}>Origem</label>
            <input className={fieldClass} value={flight.origin}
              onChange={(e) => set("origin", e.target.value.toUpperCase())} />
          </div>
          <div>
            <label className={labelClass}>Destino</label>
            <input className={fieldClass} value={flight.destination}
              onChange={(e) => set("destination", e.target.value.toUpperCase())} />
          </div>
          <div>
            <label className={labelClass}>Alternado</label>
            <input className={fieldClass} value={flight.alternate}
              onChange={(e) => set("alternate", e.target.value.toUpperCase())} />
          </div>
          <div>
            <label className={labelClass}>Regras</label>
            <select className={fieldClass} value={flight.rules}
              onChange={(e) => set("rules", e.target.value)}>
              <option>VFR</option><option>IFR</option>
            </select>
          </div>
        </div>
      </Section>

      {/* AMBIENTE */}
      <Section theme={theme} icon={<Wind className="w-4 h-4" />} title="Ambiente (vento médio)">
        <div className="grid grid-cols-2 gap-2">
          <div>
            <label className={labelClass}>Alt cruzeiro (ft)</label>
            <input className={fieldClass} type="number" value={flight.cruiseAlt ?? ""}
              onChange={(e) => setN("cruiseAlt", e.target.value)} />
          </div>
          <div>
            <label className={labelClass}>Var. magnética fallback (W = neg)</label>
            {(() => {
              const origin = flight.checkpoints.find(cp => cp.isOrigin);
              const wmm = origin?.lat != null ? getDecl(origin.lat, origin.lon, flight.cruiseAlt ?? 7000) : null;
              return wmm != null
                ? <div className={`${fieldClass} flex items-center justify-between`}>
                    <span className={theme.fgMuted}>Auto WMM</span>
                    <span className={`num font-bold ${theme.accent}`}>{wmm >= 0 ? '+' : ''}{wmm.toFixed(1)}°</span>
                  </div>
                : <input className={fieldClass} type="number" value={flight.variation ?? ""}
                    onChange={(e) => setN("variation", e.target.value)} placeholder="Ex: -22" />;
            })()}
          </div>
          <div>
            <label className={labelClass}>Vento direção (°)</label>
            <input className={fieldClass} type="number" value={flight.windDir ?? ""}
              onChange={(e) => setN("windDir", e.target.value)} />
          </div>
          <div>
            <label className={labelClass}>Vento vel. (kt)</label>
            <input className={fieldClass} type="number" value={flight.windVel ?? ""}
              onChange={(e) => setN("windVel", e.target.value)} />
          </div>
          <div>
            <label className={labelClass}>ISA Dev (°C, + = mais quente)</label>
            <input className={fieldClass} type="number" value={flight.isaDevC ?? ""}
              onChange={(e) => setN("isaDevC", e.target.value)} placeholder="0" />
          </div>
          <div className="col-span-2">
            <label className={labelClass}>Combustível inicial real (gal) — vazio = usar usable</label>
            <input className={fieldClass} type="number" value={flight.fuelInitial ?? ""}
              onChange={(e) => setN("fuelInitial", e.target.value)} placeholder={`${ac.fuelUsable}`} />
          </div>
        </div>
        <div className={`text-[10px] ${theme.fgFaint} mt-1`}>
          Cada waypoint pode ter vento próprio (override) — toque para editar.
        </div>
      </Section>

      {/* FREQUÊNCIAS */}
      <FreqsSection flight={flight} setFlight={setFlight} theme={theme} onRefreshFreqs={onRefreshFreqs} />

      {/* WAYPOINTS */}
      <Section theme={theme} icon={<MapPin className="w-4 h-4" />} title={`Rota · ${flight.checkpoints.filter(c=>!c.isAuto).length} pts + ${flight.checkpoints.filter(c=>c.isAuto).length} auto`}>
        <div
          ref={listRef}
          className="space-y-1.5"
          onTouchMove={onDragHandleTouchMove}
          onTouchEnd={onDragHandleTouchEnd}
          onTouchCancel={onDragHandleTouchEnd}
        >
          {flight.checkpoints.map((cp, i) => {
            const isDragging = dragIdx === i;
            const isOver = dragOverIdx === i && dragIdx != null && dragIdx !== i;
            // Virtual TOC/TOD/BOC/BOD rows that fall WITHIN the leg ending at `i`.
            // liveRoute computes these from cp.portions transitions, so they're
            // surfaced here for the planning view too.
            const virtuals = (liveRoute || []).filter(v => v.isVirtual && v.userIdx === i);
            return (
            <React.Fragment key={i}>
            {virtuals.map(v => (
              <div key={v.autoKey}
                className={`flex items-stretch gap-1 rounded ${theme.panel} border border-dashed border-cyan-500/30 px-3 py-1.5 opacity-90`}>
                <div className="w-5 shrink-0" />
                <div className="flex-1 flex items-center gap-2 min-w-0">
                  <div className={`text-[11px] font-bold ${theme.cyan}`}>
                    {v.name === "TOC" ? "↗ TOC" :
                     v.name === "TOD" ? "↘ TOD" :
                     v.name === "BOC" ? "↗ BOC" :
                     v.name === "BOD" ? "↘ BOD" : v.name}
                  </div>
                  <div className={`text-[10px] ${theme.fgFaint} num`}>
                    {v.alt} ft · +{v.dist} NM
                  </div>
                </div>
              </div>
            ))}
            <div data-wp-idx={i}
              className={`flex items-stretch gap-1 rounded transition-all duration-150 ${isDragging ? "opacity-50 scale-[0.98]" : ""} ${isOver ? `ring-2 ${theme.accentBorder} bg-amber-500/10` : ""}`}>
              {/* Alça de arrasto — apenas para waypoints manuais não-origem */}
              {!cp.isOrigin && !cp.isAuto ? (
                <div
                  className={`${theme.panel} border ${theme.panelBorder} rounded px-1.5 flex items-center justify-center cursor-grab active:cursor-grabbing`}
                  style={{ touchAction: "none" }}
                  onTouchStart={(e) => onDragHandleTouchStart(e, i)}
                >
                  <GripVertical className={`w-4 h-4 ${theme.fgFaint}`} />
                </div>
              ) : (
                <div className="w-5 shrink-0" />
              )}

              {/* Waypoint auto (TOC/TOD) — display only, no edit */}
              {cp.isAuto ? (
                <div className={`flex-1 ${theme.panel} border border-dashed ${theme.panelBorder} rounded px-3 py-2 flex items-center gap-2 opacity-70 min-w-0`}>
                  <div className={`text-[10px] ${theme.fgFaint} num w-4 shrink-0`}>{i + 1}</div>
                  <div className="min-w-0 flex-1">
                    <div className={`text-xs font-bold ${theme.cyan}`}>
                      {cp.name === "TOC" ? "↗ TOC" : "↘ TOD"}
                      <span className={`ml-2 text-[10px] ${theme.fgFaint} font-normal`}>AUTO</span>
                    </div>
                    <div className={`text-[10px] ${theme.fgFaint} num`}>{cp.alt} ft · +{cp.dist} NM · TC {String(cp.tc ?? 0).padStart(3,"0")}°</div>
                  </div>
                </div>
              ) : (
                /* Botão de edição — waypoints manuais */
                <button onClick={() => onEditCp(i)}
                  className={`flex-1 ${theme.panel} border ${computed[i]?.warnings?.length ? 'border-red-500' : theme.panelBorder} rounded px-3 py-2 flex items-center justify-between transition-colors min-w-0`}>
                  <div className="flex items-center gap-2 min-w-0">
                    <div className={`text-[10px] ${computed[i]?.warnings?.length ? 'text-red-400' : theme.fgFaint} num w-4 shrink-0`}>{i + 1}</div>
                    <div className="text-left min-w-0 flex-1">
                      <div className="font-bold truncate flex items-center gap-1">
                        {cp.name || "—"}
                        {computed[i]?.phaseHint && (
                          <span className={`text-[10px] ${theme.cyan} border border-current rounded px-1`}>
                            {computed[i].phaseHint === "TOC" ? "↗ TOC"
                              : computed[i].phaseHint === "TOD" ? "↘ TOD"
                              : computed[i].phaseHint === "BOC" ? "↗ BOC"
                              : "↘ BOD"}
                          </span>
                        )}
                        {cp.windMode === "none" && <span className={`text-[10px] ${theme.cyan} border border-current rounded px-1`}>W=0</span>}
                        {cp.windMode === "custom" && <span className={`text-[10px] ${theme.cyan} border border-current rounded px-1`}>W↗</span>}
                      </div>
                      <div className={`text-[10px] ${theme.fgFaint} uppercase tracking-wider truncate flex items-center gap-1`}>
                        {cp.isOrigin
                          ? `Origem · ${cp.useCruiseAlt ? (computed.find(c=>c.isOrigin)?.alt ?? cp.alt) : (cp.alt ?? 0)} ft`
                          : `${cp.useCruiseAlt ? (computed[i]?.alt ?? cp.alt) : (cp.alt ?? "?")} ft · TC ${String(computed[i]?.tc ?? cp.tc ?? 0).padStart(3, "0")}° · ${computed[i]?.dist ?? cp.dist ?? 0} NM`}
                        {cp.useCruiseAlt && <span className={`text-[10px] ${theme.accent} border border-current rounded px-1 normal-case`}>CRZ</span>}
                      </div>
                      {computed[i]?.warnings?.length > 0 && (
                        <div className="mt-0.5 space-y-0.5">
                          {computed[i].warnings.map(function(w, wi) {
                            return <div key={wi} className="text-[10px] text-red-400 leading-tight">⚠ {w}</div>;
                          })}
                        </div>
                      )}
                    </div>
                  </div>
                  <Pencil className={`w-3.5 h-3.5 ${computed[i]?.warnings?.length ? 'text-red-400' : theme.fgFaint} shrink-0 ml-1`} />
                </button>
              )}

              {/* Lixeira — apenas para waypoints manuais */}
              {!cp.isOrigin && !cp.isAuto && (
                <button
                  onClick={() => onDeleteCp(i)}
                  className={`${theme.panel} border ${theme.panelBorder} rounded px-2.5 ${theme.fgFaint} hover:text-red-400 active:scale-95 shrink-0`}
                  aria-label="Remover"
                >
                  <Trash className="w-4 h-4" />
                </button>
              )}
            </div>
            </React.Fragment>
            );
          })}
          <button onClick={onAddCp}
            className={`w-full border border-dashed ${theme.inputBorder} rounded px-3 py-2 ${theme.fgFaint} flex items-center justify-center gap-2 text-sm transition-colors`}>
            <Plus className="w-4 h-4" /> Adicionar waypoint
          </button>
        </div>
        <div className="mt-3 grid grid-cols-2 gap-2">
          <button onClick={onImportFPL}
            className={`${theme.panel} border ${theme.inputBorder} ${theme.fgMuted} rounded px-2 py-2 text-[10px] uppercase tracking-wider flex items-center justify-center gap-1 transition-colors`}>
            <Upload className="w-3 h-3" /> FPL
          </button>
          <button onClick={onNewBlank}
            className={`${theme.panel} border ${theme.inputBorder} ${theme.fgMuted} rounded px-2 py-2 text-[10px] uppercase tracking-wider flex items-center justify-center gap-1 transition-colors`}>
            <FileText className="w-3 h-3" /> Limpar
          </button>
        </div>
      </Section>

      {/* MEUS PONTOS */}
      <Section theme={theme} icon={<MapPin className="w-4 h-4" />} title={`Meus pontos · ${(userPoints || []).length}`}
        collapsible defaultOpen={(userPoints || []).length <= 5}>
        <div className="grid grid-cols-2 gap-2 mb-2">
          <button
            onClick={function() {
              const data = { format: "navlog-userpts/v1", exportedAt: new Date().toISOString(), points: userPoints };
              const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = url;
              a.download = "navlog-pontos-" + new Date().toISOString().slice(0,10) + ".json";
              document.body.appendChild(a); a.click(); document.body.removeChild(a);
              setTimeout(function() { URL.revokeObjectURL(url); }, 500);
            }}
            disabled={(userPoints || []).length === 0}
            className={`${theme.panel} border ${theme.inputBorder} ${(userPoints || []).length === 0 ? theme.fgFaint + ' opacity-40' : theme.fgMuted} rounded px-2 py-2 text-[10px] uppercase tracking-wider flex items-center justify-center gap-1`}>
            <Download className="w-3 h-3" /> Exportar JSON
          </button>
          <label className={`${theme.panel} border ${theme.inputBorder} ${theme.fgMuted} rounded px-2 py-2 text-[10px] uppercase tracking-wider flex items-center justify-center gap-1 cursor-pointer active:scale-95`}>
            <Upload className="w-3 h-3" /> Importar JSON
            <input type="file" accept="application/json,.json" className="hidden"
              onChange={async function(e) {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                try {
                  const text = await file.text();
                  const parsed = JSON.parse(text);
                  let arr = Array.isArray(parsed) ? parsed : (parsed && Array.isArray(parsed.points) ? parsed.points : null);
                  if (!arr) { alert("Formato não reconhecido (esperado array ou objeto com 'points')."); e.target.value = ""; return; }
                  let imported = 0, skipped = 0;
                  for (const pt of arr) {
                    if (!pt || pt.lat == null || pt.lon == null) { skipped++; continue; }
                    await onAddUserPoint({
                      name: pt.name || "PT",
                      kind: pt.kind || "custom",
                      lat: Number(pt.lat),
                      lon: Number(pt.lon),
                      alt: pt.alt != null ? Number(pt.alt) : null,
                      notes: pt.notes || "",
                      tags: pt.tags || [],
                      source: pt.source || { kind: "manual" },
                    });
                    imported++;
                  }
                  alert("Importados: " + imported + (skipped ? " · Ignorados: " + skipped : ""));
                } catch (err) {
                  alert("Erro ao importar: " + (err.message || err));
                }
                e.target.value = "";
              }}
            />
          </label>
        </div>
        {(userPoints || []).length === 0 ? (
          <div className={`text-[11px] ${theme.fgFaint} text-center py-2`}>
            Nenhum ponto guardado. Use o botão <Search className="w-3 h-3 inline -mt-0.5" /> no editor de waypoint para criar (busca / radial+dist / interseção / coords) e <strong>Salvar na biblioteca</strong>.
          </div>
        ) : (
          <div className={`${theme.panel} border ${theme.panelBorder} rounded-xl divide-y ${theme.panelBorder} overflow-hidden`}>
            {[...userPoints].sort(function(a, b) { return (a.name || "").localeCompare(b.name || ""); }).map(function(pt) {
              return (
                <div key={pt.id || pt.name}
                  className="grid items-center gap-2 px-3 py-2"
                  style={{ gridTemplateColumns: "3.5rem minmax(0, 1fr) auto" }}>
                  <span className={`text-[10px] font-bold ${theme.accent} inline-flex items-center gap-1`}>
                    <Star className="w-3 h-3 fill-current shrink-0" />
                    {pt.kind === "computed" ? "CALC" : pt.kind === "airport" ? "APT" : pt.kind === "navaid" ? "NAV" : pt.kind === "waypoint" ? "WPT" : "MEU"}
                  </span>
                  <div className="min-w-0">
                    <div className={`font-bold truncate ${theme.fg}`}>{pt.name}</div>
                    <div className={`text-xs truncate num ${theme.fgFaint}`}>
                      {pt.lat != null ? pt.lat.toFixed(4) : "—"}, {pt.lon != null ? pt.lon.toFixed(4) : "—"}
                      {pt.alt != null ? ` · ${pt.alt} ft` : ""}
                      {pt.notes ? ` · ${pt.notes}` : ""}
                    </div>
                  </div>
                  <button
                    onClick={function() {
                      if (confirm(`Remover ${pt.name} da biblioteca?`)) onDeleteUserPoint(pt.id);
                    }}
                    className={`px-2 py-1 rounded border border-red-500/40 text-red-400 text-[10px] active:scale-95`}>
                    Remover
                  </button>
                </div>
              );
            })}
          </div>
        )}
      </Section>
    </div>
  );
}

// --------- SEÇÃO DE FREQUÊNCIAS ---------
function FreqsSection({ flight, setFlight, theme, onRefreshFreqs }) {
  const [open, setOpen] = useState(false);
  const [proceduresIcao, setProceduresIcao] = useState(null);
  const setFreq = (which, key, val) => {
    const freqs = { ...(flight.freqs || {}), [which]: { ...(flight.freqs?.[which] || {}), [key]: val } };
    setFlight({ ...flight, freqs });
  };
  const fieldClass = `w-full ${theme.inputBg} border ${theme.inputBorder} ${theme.fg} px-2 py-1.5 text-sm rounded-lg num focus:${theme.accentBorder} focus:outline-none focus:ring-2 focus:ring-amber-500/30`;

  return (
    <section>
      <button onClick={() => setOpen(!open)}
        className={`w-full flex items-center justify-between text-[10px] uppercase tracking-widest ${theme.fgMuted} mb-2`}>
        <span className="flex items-center gap-2"><Radio className="w-4 h-4" /> Frequências</span>
        {open ? <ChevronUp className="w-4 h-4" /> : <ChevronDown className="w-4 h-4" />}
      </button>
      {open && (
        <div className="space-y-2">
          {[
            ["origin", flight.origin || "Origem"],
            ["destination", flight.destination || "Destino"],
            ["alternate", flight.alternate || "Alternado"],
          ].map(([which, label]) => {
            const icao = flight[which];
            const isIcao = icao && /^[A-Z0-9]{4}$/.test(String(icao).toUpperCase());
            return (
              <div key={which} className={`${theme.panel} border ${theme.panelBorder} rounded-xl p-3`}>
                <div className="flex items-center justify-between mb-1.5">
                  <div className={`text-xs font-bold ${theme.accent}`}>{label}</div>
                  {isIcao && (
                    <div className="flex items-center gap-1">
                      <button type="button"
                        onClick={() => onRefreshFreqs && onRefreshFreqs(which, true)}
                        title="Buscar do AIRAC (sobrescreve)"
                        className={`text-[10px] px-2 py-1 rounded border inline-flex items-center gap-1 ${theme.panelBorder} ${theme.fgMuted}`}>
                        <RefreshCw className="w-3 h-3" /> AIRAC
                      </button>
                      <button type="button"
                        onClick={() => setProceduresIcao(String(icao).toUpperCase())}
                        title="Ver SID / STAR / Approach"
                        className={`text-[10px] px-2 py-1 rounded border inline-flex items-center gap-1 ${theme.panelBorder} ${theme.fgMuted}`}>
                        <ClipboardList className="w-3 h-3" /> Procs
                      </button>
                    </div>
                  )}
                </div>
                <div className="grid grid-cols-2 gap-2">
                  {[
                    ["atis", "ATIS"], ["ground", "Ground"], ["tower", "Tower"],
                    ["approach", "App/Dep"], ["ctaf", "CTAF"], ["unicom", "UNICOM"],
                    ["elev", "Elev (ft)"],
                  ].map(([k, l]) => (
                    <div key={k}>
                      <label className={`text-[10px] uppercase ${theme.fgFaint} block`}>{l}</label>
                      <input className={fieldClass}
                        value={flight.freqs?.[which]?.[k] || ""}
                        onChange={(e) => setFreq(which, k, e.target.value)} />
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {proceduresIcao && (
        <ProceduresPanel
          icao={proceduresIcao}
          flight={flight}
          setFlight={setFlight}
          theme={theme}
          onClose={() => setProceduresIcao(null)}
        />
      )}
    </section>
  );
}

function ProceduresPanel({ icao, flight, setFlight, theme, onClose }) {
  const [data, setData] = useState(null);
  const [err, setErr] = useState(null);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState("all"); // all | SID | STAR | APP

  // Detail (procedure + transition selected by user)
  const [selected, setSelected] = useState(null); // { typeCode, identifier, transition }
  const [detail, setDetail] = useState(null);
  const [detailLoading, setDetailLoading] = useState(false);
  const [detailErr, setDetailErr] = useState(null);
  const [insertAfterIdx, setInsertAfterIdx] = useState(0);

  useEffect(() => {
    let cancelled = false;
    setLoading(true); setErr(null); setData(null);
    airacProcedures(icao).then(d => {
      if (cancelled) return;
      if (!d) { setErr("Sem dados ou falha na API"); setLoading(false); return; }
      setData(d); setLoading(false);
    }).catch(e => { if (!cancelled) { setErr(e.message || String(e)); setLoading(false); } });
    return () => { cancelled = true; };
  }, [icao]);

  useEffect(() => {
    if (!selected) { setDetail(null); setDetailErr(null); return; }
    let cancelled = false;
    setDetailLoading(true); setDetailErr(null); setDetail(null);
    airacProcedureDetail(icao, selected.identifier).then(d => {
      if (cancelled) return;
      if (!d) { setDetailErr("Falha ao carregar procedimento"); setDetailLoading(false); return; }
      setDetail(d); setDetailLoading(false);
      const cps = (flight && flight.checkpoints) || [];
      const def = selected.typeCode === "SID"
        ? 0
        : Math.max(0, cps.length - 2);
      setInsertAfterIdx(def);
    }).catch(e => { if (!cancelled) { setDetailErr(e.message || String(e)); setDetailLoading(false); } });
    return () => { cancelled = true; };
  }, [selected]);

  // Group listing by typeCode → identifier → [transitions]
  const grouped = (function() {
    if (!data || typeof data !== "object") return null;
    const out = { SID: {}, STAR: {}, APP: {} };
    Object.keys(data).forEach(typeKey => {
      const list = data[typeKey];
      if (!Array.isArray(list)) return;
      const tCode = String(typeKey).toUpperCase();
      const target = out[tCode] || (out[tCode] = {});
      list.forEach(item => {
        const id = item.identifier || item.name;
        if (!id) return;
        if (!target[id]) target[id] = [];
        const t = item.transition || "";
        if (!target[id].includes(t)) target[id].push(t);
      });
    });
    return out;
  })();

  function applyProcedure() {
    if (!selected || !detail) return;
    const legs = pickProcedureLegs(detail, selected.transition, selected.typeCode);
    const source = {
      kind: "procedure",
      airport: icao,
      procedure: selected.identifier,
      transition: selected.transition,
      type: selected.typeCode,
    };
    const newCps = [];
    legs.forEach(leg => {
      const cp = legToCheckpoint(leg, source, selected.typeCode);
      if (cp) newCps.push(cp);
    });
    if (newCps.length === 0) {
      alert("Nenhum fixo com coordenadas neste procedimento.");
      return;
    }
    setFlight(f => {
      const cps = [...((f && f.checkpoints) || [])];
      const max = Math.max(0, cps.length - 1);
      const after = Math.max(0, Math.min(insertAfterIdx, max));
      cps.splice(after + 1, 0, ...newCps);
      return Object.assign({}, f, { checkpoints: cps });
    });
    onClose();
  }

  // ── Detail view ─────────────────────────────────────────────────────────────
  if (selected) {
    const legs = detail ? pickProcedureLegs(detail, selected.transition, selected.typeCode) : [];
    const insertableLegs = legs.filter(l => l.fix_coordinates && l.fix_coordinates.lat != null);
    const cps = (flight && flight.checkpoints) || [];
    return (
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: "fixed", inset: 0, zIndex: 9999, display: "flex", flexDirection: "column" }}
        className={theme.bg}>
        <div className={`flex items-center gap-2 p-3 shrink-0 ${theme.panel} border-b ${theme.panelBorder}`}>
          <button onClick={() => setSelected(null)}
            className={`px-3 py-1.5 rounded-lg border text-sm ${theme.panelBorder} ${theme.fgFaint}`}>
            ← Voltar
          </button>
          <div className="flex-1 text-center">
            <div className={`text-sm font-bold ${theme.cyan}`}>
              {selected.typeCode} · {selected.identifier}{selected.transition ? " · " + selected.transition : ""}
            </div>
            <div className={`text-[10px] ${theme.fgFaint}`}>{icao}</div>
          </div>
          <div style={{ width: 80 }} />
        </div>
        <div className="flex-1 overflow-y-auto p-3 space-y-3">
          {detailLoading && <Loading theme={theme} />}
          {detailErr && <ErrorState theme={theme} message={detailErr} />}
          {detail && legs.length > 0 && (
            <>
              <div className={`${theme.panel} border ${theme.panelBorder} rounded-xl overflow-hidden divide-y ${theme.panelBorder}`}>
                {legs.map((leg, i) => {
                  const hasCoords = leg.fix_coordinates && leg.fix_coordinates.lat != null;
                  const altStr = leg.altitude_ft != null
                    ? (leg.altitude_restriction === "at_or_above" ? `≥ ${leg.altitude_ft} ft`
                      : leg.altitude_restriction === "at_or_below" ? `≤ ${leg.altitude_ft} ft`
                      : `${leg.altitude_ft} ft`)
                    : "—";
                  return (
                    <div key={i}
                      className={`px-3 py-2 grid items-center gap-2 ${hasCoords ? "" : "opacity-50"}`}
                      style={{ gridTemplateColumns: "2rem minmax(0, 1fr)" }}>
                      <span className={`text-[10px] num ${theme.fgFaint}`}>#{leg.sequence != null ? leg.sequence : i}</span>
                      <div className="min-w-0">
                        <div className={`font-bold truncate ${theme.fg}`}>
                          {leg.fix_identifier || leg.fix_name || "—"}
                          {!hasCoords && <span className={`ml-2 text-[10px] ${theme.fgFaint}`}>(sem coords, ignorado)</span>}
                        </div>
                        <div className={`text-xs num truncate ${theme.fgFaint}`}>
                          {altStr}
                          {leg.course != null ? ` · MC ${leg.course}°` : ""}
                          {leg.turn_direction ? ` · turn ${leg.turn_direction}` : ""}
                          {leg.path_terminator ? ` · ${leg.path_terminator}` : ""}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div>
                <label className={`text-[10px] uppercase tracking-widest ${theme.fgFaint} block mb-1`}>
                  Inserir após qual ponto da rota
                </label>
                <select value={insertAfterIdx}
                  onChange={(e) => setInsertAfterIdx(Number(e.target.value))}
                  className={`w-full ${theme.inputBg} border ${theme.inputBorder} ${theme.fg} px-3 py-2 text-sm rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-500/30`}>
                  {cps.map((cp, i) => (
                    <option key={i} value={i}>
                      {i + 1}. {cp.name || "(sem nome)"}{cp.isOrigin ? " · origem" : i === cps.length - 1 ? " · destino" : ""}
                    </option>
                  ))}
                </select>
                <div className={`text-[10px] ${theme.fgFaint} mt-1`}>
                  Default: {selected.typeCode === "SID" ? "depois da origem" : "antes do destino"}.
                </div>
              </div>
              <button onClick={applyProcedure}
                disabled={insertableLegs.length === 0}
                className={`w-full py-3 rounded-xl font-bold text-sm ${
                  insertableLegs.length === 0
                    ? `${theme.panel} ${theme.fgFaint} opacity-40`
                    : `${theme.accentBg} ${theme.accentBgFg ?? "text-black"}`
                }`}>
                Adicionar à rota ({insertableLegs.length} fixo{insertableLegs.length !== 1 ? "s" : ""})
              </button>
            </>
          )}
          {detail && legs.length === 0 && (
            <Empty theme={theme} icon={MapPin} title="Sem fixes" hint="Este procedimento não tem coordenadas geográficas para anexar à rota." />
          )}
        </div>
      </div>
    );
  }

  // ── Listing view ───────────────────────────────────────────────────────────
  return (
    <div onClick={(e) => e.stopPropagation()}
      style={{ position: "fixed", inset: 0, zIndex: 9999, display: "flex", flexDirection: "column", isolation: "isolate" }}
      className={theme.bg}>
      <div className={`flex items-center gap-2 p-3 shrink-0 ${theme.panel} border-b ${theme.panelBorder}`}>
        <button onClick={onClose}
          className={`px-3 py-1.5 rounded-lg border text-sm ${theme.panelBorder} ${theme.fgFaint}`}>
          Fechar
        </button>
        <div className="flex-1 text-center">
          <div className={`text-sm font-bold ${theme.cyan}`}>Procedures · {icao}</div>
        </div>
        <div style={{ width: 80 }} />
      </div>
      <div className={`flex shrink-0 border-b ${theme.panelBorder} overflow-x-auto`}>
        {[["all", "Todos"], ["SID", "SIDs"], ["STAR", "STARs"], ["APP", "Approaches"]].map(([key, label]) => (
          <button key={key} onClick={() => setFilter(key)}
            className={`flex-1 min-w-[64px] py-3 text-[10px] font-bold uppercase tracking-wider ${filter === key ? theme.accent + " border-b-2 border-current" : theme.fgFaint}`}>
            {label}
          </button>
        ))}
      </div>
      <div className="flex-1 overflow-y-auto p-3 space-y-3">
        {loading && <Loading theme={theme} />}
        {err && <ErrorState theme={theme} message={err} />}
        {grouped && [["SID", "SIDs"], ["STAR", "STARs"], ["APP", "Approaches"]].map(([typeCode, label]) => {
          if (filter !== "all" && filter !== typeCode) return null;
          const ids = Object.keys(grouped[typeCode] || {}).sort();
          if (ids.length === 0) return null;
          return (
            <div key={typeCode}>
              <div className={`text-[10px] uppercase tracking-widest ${theme.fgFaint} mb-1`}>
                {label} ({ids.length})
              </div>
              <div className={`${theme.panel} border ${theme.panelBorder} rounded-xl overflow-hidden divide-y ${theme.panelBorder}`}>
                {ids.map(id => {
                  const transitions = grouped[typeCode][id] || [];
                  return (
                    <div key={id} className="px-3 py-2">
                      <div className="flex items-center gap-2 mb-1.5">
                        <span className={`text-[10px] font-bold w-12 shrink-0 ${theme.cyan}`}>{typeCode}</span>
                        <div className={`font-bold ${theme.fg}`}>{id}</div>
                        <div className={`text-[10px] num ${theme.fgFaint} ml-auto`}>
                          {transitions.length} trans.
                        </div>
                      </div>
                      <div className="flex flex-wrap gap-1 ml-12">
                        {transitions.length === 0 ? (
                          <button onClick={() => setSelected({ typeCode, identifier: id, transition: "" })}
                            className={`text-[10px] px-2 py-1 rounded border ${theme.panelBorder} ${theme.fgMuted} active:scale-95`}>
                            Selecionar
                          </button>
                        ) : transitions.map(t => (
                          <button key={t || "(none)"} onClick={() => setSelected({ typeCode, identifier: id, transition: t })}
                            className={`text-[10px] px-2 py-1 rounded border ${theme.panelBorder} ${theme.fgMuted} active:scale-95`}>
                            {t || "(direct)"}
                          </button>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
        {grouped && Object.values(grouped).every(g => Object.keys(g).length === 0) && !loading && (
          <Empty theme={theme} icon={ClipboardList} title="Sem procedimentos" hint={`Não há SID/STAR/Approach publicados para ${icao}.`} />
        )}
      </div>
    </div>
  );
}

function Section({ icon, title, children, theme, collapsible, defaultOpen }) {
  const [open, setOpen] = useState(defaultOpen != null ? defaultOpen : true);
  if (!collapsible) {
    return (
      <section>
        <h2 className={`flex items-center gap-2 text-[10px] uppercase tracking-widest ${theme?.fgMuted || "text-zinc-400"} mb-2`}>
          {icon}{title}
        </h2>
        {children}
      </section>
    );
  }
  return (
    <section>
      <button onClick={() => setOpen(o => !o)}
        className={`w-full flex items-center justify-between gap-2 text-[10px] uppercase tracking-widest ${theme?.fgMuted || "text-zinc-400"} mb-2 active:opacity-70`}>
        <span className="flex items-center gap-2">{icon}{title}</span>
        {open ? <ChevronUp className="w-4 h-4" /> : <ChevronDown className="w-4 h-4" />}
      </button>
      {open && children}
    </section>
  );
}

function Stat({ label, value, theme }) {
  return (
    <div className={`${theme?.panel || "bg-zinc-900"} border ${theme?.panelBorder || "border-zinc-800"} rounded px-2 py-1.5`}>
      <div className={`text-[10px] uppercase tracking-wider ${theme?.fgFaint || "text-zinc-500"}`}>{label}</div>

}

// =========================================================================
// WAYPOINT EDITOR — wizard em passos com teclados especializados
// =========================================================================
// Passos: NOME → ALT → TC → DIST → VENTO → PERF (overrides) → RESUMO
const WP_STEPS = ["nome", "coord", "alt", "tcdist", "vento", "override", "resumo"];

function WaypointEditor({ flight, setFlight, editingIdx, insertAfterIdx, initLat, initLon, onClose, theme, ac, computed, pdfOverlays, userPoints, onAddUserPoint, onDeleteUserPoint }) {
  const [finderOpen, setFinderOpen] = useState(false);
  const isNew    = editingIdx == null;
  const isOrigin = !isNew && flight.checkpoints[editingIdx]?.isOrigin;
  const cruiseAlt = flight.cruiseAlt ?? 7000;
  const initial = isNew
    ? { name: "", alt: null,
        // When inserting between existing WPs, default to "inherit" so the
        // new WP follows the climb/descent gradient instead of becoming a
        // cruise-alt anchor that ends the climb at this fix. When appending
        // at the end of the route, default to cruise alt as before.
        useCruiseAlt: insertAfterIdx == null,
        tc: null, dist: null, windDir: null, windVel: null,
        lat: initLat ?? null, lon: initLon ?? null, notes: "" }
    : { ...flight.checkpoints[editingIdx] };

  const [cp, setCp] = useState(initial);
  const [windMode, setWindMode] = useState(
    initial.windMode === "none"    ? "none"
    : initial.windMode === "custom" ? "custom"
    : "route"
  );
  const [tcMode, setTcMode] = useState("mh"); // "mh" | "tc"
  const [showMapPicker, setShowMapPicker] = useState(false);
  const [showPerf, setShowPerf] = useState(false);
  const altDragRef = useRef({ active: false, startY: 0, startVal: 0 });

  // AIRAC.net autocomplete for the name field.
  const [airacSugs, setAiracSugs] = useState(null);
  const [airacSearching, setAiracSearching] = useState(false);
  const airacAbortRef = useRef(null);
  const airacDebounceRef = useRef(null);
  function triggerAiracSearch(q) {
    if (airacDebounceRef.current) clearTimeout(airacDebounceRef.current);
    if (airacAbortRef.current) { try { airacAbortRef.current.abort(); } catch (_) {} airacAbortRef.current = null; }
    if (!q || q.length < 2) { setAiracSugs(null); setAiracSearching(false); return; }
    setAiracSearching(true);
    airacDebounceRef.current = setTimeout(async () => {
      const ctrl = new AbortController();
      airacAbortRef.current = ctrl;
      try {
        const data = await airacSearch(q, ctrl.signal);
        if (ctrl === airacAbortRef.current) {
          setAiracSugs(data || { airports: [], navaids: [], waypoints: [] });
          setAiracSearching(false);
        }
      } catch (_) { /* aborted */ }
    }, 300);
  }
  useEffect(() => {
    return () => {
      if (airacDebounceRef.current) clearTimeout(airacDebounceRef.current);
      if (airacAbortRef.current) { try { airacAbortRef.current.abort(); } catch (_) {} }
    };
  }, []);
  function applyAiracSuggestion(item, kind) {
    let name, lat, lon, alt = null, source = null;
    if (kind === "local") {
      name = item.name || "";
      lat = item.lat != null ? Number(item.lat) : null;
      lon = item.lon != null ? Number(item.lon) : null;
      alt = item.alt != null ? Number(item.alt) : null;
      source = item.source || { kind: "library", libraryId: item.id };
    } else {
      name = (kind === "airport" ? (item.icao || item.iata) : (item.identifier || item.icao)) || "";
      lat = item.latitude != null ? Number(item.latitude) : (item.coordinates?.lat != null ? Number(item.coordinates.lat) : null);
      lon = item.longitude != null ? Number(item.longitude) : (item.coordinates?.lon != null ? Number(item.coordinates.lon) : null);
      if (kind === "airport" && item.elevation_ft != null) alt = Number(item.elevation_ft);
      source = { kind: "search", airacKind: kind, id: name };
    }
    setCp(p => {
      const n = Object.assign({}, p, { name: String(name).slice(0, 10).toUpperCase() });
      if (lat != null && lon != null) { n.lat = Math.round(lat * 1e6) / 1e6; n.lon = Math.round(lon * 1e6) / 1e6; n._tcDistEdited = true; }
      if (alt != null) { n.alt = alt; n.useCruiseAlt = false; }
      if (source) n.source = source;
      return n;
    });
    setAiracSugs(null);
    if (lat != null && lon != null) applyCoords(Math.round(lat * 1e6) / 1e6, Math.round(lon * 1e6) / 1e6);
  }

  // DDM (degrees + decimal minutes) editing state, kept in sync with cp.lat/cp.lon.
  function decToDdm(dd, isLon) {
    if (dd == null || isNaN(dd)) return { deg: "", min: "", hem: isLon ? "W" : "N" };
    const abs = Math.abs(dd);
    const deg = Math.floor(abs);
    const min = (abs - deg) * 60;
    return {
      deg: String(deg),
      min: min.toFixed(2),
      hem: isLon ? (dd < 0 ? "W" : "E") : (dd < 0 ? "S" : "N"),
    };
  }
  function ddmToDec(parts, isLon) {
