// -------- PASSO 5: VENTO --------
function StepVento({ theme, cp, setCp, windMode, setWindMode, defaultDir, defaultVel, onNext }) {
  const [dir, setDir] = useState(cp.windDir != null ? String(Math.round(cp.windDir)) : "");
  const [vel, setVel] = useState(cp.windVel != null ? String(Math.round(cp.windVel)) : "");
  const [field, setField] = useState("dir");

  function press(n) {
    const setFn = field === "dir" ? setDir : setVel;
    const max   = field === "dir" ? 3 : 3;
    setFn((prev) => prev.length < max ? prev + n : prev);
  }
  function del() {
    (field === "dir" ? setDir : setVel)((prev) => prev.slice(0, -1));
  }
  function clr() {
    (field === "dir" ? setDir : setVel)("");
  }

  function confirm() {
    if (windMode === "custom") {
      setCp({ ...cp,
        windDir: dir !== "" ? Number(dir) : null,
        windVel: vel !== "" ? Number(vel) : null,
      });
    } else {
      setCp({ ...cp, windDir: null, windVel: null });
    }
    onNext();
  }

  const customReady = windMode !== "custom" || (dir !== "" && Number(dir) <= 359 && vel !== "");

  const keyBase = `${theme.panel} border ${theme.panelBorder} rounded-xl flex items-center justify-center font-bold text-xl active:scale-95 transition-transform duration-100 select-none`;

  const windOptions = [
    {
      key: "route",
      label: "Vento da rota",
      sub: `${defaultDir}° / ${defaultVel} kt`,
      icon: "→",
    },
    {
      key: "none",
      label: "Sem vento",
      sub: "WCA = 0, GS = TAS",
      icon: "∅",
    },
    {
      key: "custom",
      label: "Vento próprio",
      sub: "Define dir/vel para esta perna",
      icon: "↗",
    },
  ];

  return (
    <div className="space-y-3">
      <div className={`text-[10px] uppercase tracking-widest ${theme.fgFaint}`}>
        Vento para perna até <span className={theme.accent}>{cp.name}</span>
      </div>

      {/* Seleção do modo */}
      <div className="space-y-2">
        {windOptions.map(({ key, label, sub, icon }) => (
          <button key={key}
            onClick={() => setWindMode(key)}
            className={`w-full ${theme.panel} border-2 rounded-xl px-4 py-3 flex items-center gap-4 active:scale-[0.98] transition-transform duration-100 ${
              windMode === key ? theme.accentBorder : theme.panelBorder
            }`}
          >
            <span className={`text-2xl w-8 text-center ${windMode === key ? theme.accent : theme.fgMuted}`}>
              {icon}
            </span>
            <div className="text-left flex-1">
              <div className={`text-sm font-bold ${windMode === key ? theme.accent : theme.fg}`}>{label}</div>
              <div className={`text-[10px] ${theme.fgFaint}`}>{sub}</div>
            </div>
            {windMode === key && <CircleCheckBig className={`w-5 h-5 ${theme.accent} shrink-0`} />}
          </button>
        ))}
      </div>

      {/* Teclado numérico apenas quando "custom" */}
      {windMode === "custom" && (
        <>
          <div className="grid grid-cols-2 gap-2">
            {[
              { key: "dir", label: "Direção", unit: "°",  val: dir },
              { key: "vel", label: "Vel.",    unit: "kt", val: vel },
            ].map(({ key, label, unit, val }) => (
              <button key={key} onClick={() => setField(key)}
                className={`${theme.panel} border-2 rounded-xl px-3 py-3 text-center transition-all duration-150 ${
                  field === key ? theme.accentBorder : theme.panelBorder
                }`}>
                <div className={`text-[10px] uppercase ${field === key ? theme.accent : theme.fgFaint}`}>{label}</div>
                <div className={`text-3xl font-black num ${val ? (field === key ? theme.accent : theme.fg) : theme.fgFaint}`}>
                  {val || "—"}
                </div>
                <div className={`text-[10px] ${theme.fgFaint}`}>{unit}</div>
              </button>
            ))}
          </div>

          <div className="space-y-2">
            {[["1","2","3"],["4","5","6"],["7","8","9"]].map((row, ri) => (
              <div key={ri} className="grid grid-cols-3 gap-2">
                {row.map((n) => (
                  <button key={n} onClick={() => press(n)}
                    className={`${keyBase} py-3.5 ${theme.fg}`}>{n}</button>
                ))}
              </div>
            ))}
            <div className="grid grid-cols-3 gap-2">
              <button onClick={clr} className={`${keyBase} py-3.5 text-sm ${theme.fgMuted}`}>CLR</button>
              <button onClick={() => press("0")} className={`${keyBase} py-3.5 ${theme.fg}`}>0</button>
              <button onClick={del} className={`${keyBase} py-3.5 ${theme.fgMuted}`}>
                <ChevronLeft className="w-5 h-5" />
              </button>
            </div>
          </div>
        </>
      )}

      <button onClick={confirm} disabled={!customReady}
        className={`w-full ${theme.accentBg} disabled:opacity-40 ${theme.accentBgFg} rounded-xl py-4 font-bold text-base active:scale-95 transition-transform duration-100`}>
        Confirmar →
      </button>
    </div>
  );
}

// -------- PASSO FINAL: RESUMO --------
function StepResumo({ theme, cp, setCp, isNew, isOrigin, windMode, cruiseAlt, prevAlt, variation, onEdit, onSave, onRemove }) {
  const windLabel =
    windMode === "none"   ? "Sem vento (GS = TAS)" :
    windMode === "custom" ? `${cp.windDir ?? "—"}° / ${cp.windVel ?? "—"} kt` :
                            "Padrão da rota";

  const overrideKeys = ["tasClimbOvr","tasCruiseOvr","tasDescentOvr","gphClimbOvr","gphCruiseOvr","gphDescentOvr"];
  const overrideLabels = { tasClimbOvr: "TAS↗", tasCruiseOvr: "TAS→", tasDescentOvr: "TAS↘", gphClimbOvr: "GPH↗", gphCruiseOvr: "GPH→", gphDescentOvr: "GPH↘" };
  const overrideActive = overrideKeys.filter((k) => cp[k] != null);
  const overrideValue = overrideActive.length > 0
    ? overrideActive.map((k) => `${overrideLabels[k]} ${cp[k]}`).join(" · ")
    : "Padrão da aeronave";

  const rows = [
    { label: "Nome", value: cp.name || "—", step: "nome" },
    { label: isOrigin ? "Alt. de partida" : "Altitude Alvo", value: (() => {
        const altStr = cp.useCruiseAlt ? `CRZ (${cruiseAlt} ft)` : (cp.alt != null ? `${cp.alt} ft` : (!isOrigin ? "Herdar" : "—"));
        const modeStr = cp.arrivalMode === "asap" ? " · ASAP"
          : cp.arrivalMode === "at_fix" ? " · no fix"
          : cp.arrivalMode === "before_nm" ? ` · −${cp.arrivalValue ?? 5} NM`
          : cp.arrivalMode === "before_min" ? ` · −${cp.arrivalValue ?? 5} min`
          : "";
        return altStr + modeStr;
      })(), step: "alt" },
    ...(!isOrigin ? [
      cp.lat != null ? { label: "Coordenadas", value: formatCoord(cp.lat, cp.lon) ?? "—", step: "coord" } : null,
      { label: "TC / MC · Distância", value: (() => {
          const tcStr = cp.tc != null ? (() => {
            const tc = Math.round(cp.tc);
            const mc = Math.round(((cp.tc - (variation ?? 0)) % 360 + 360) % 360);
            return `TC ${String(tc).padStart(3,"0")}° MC ${String(mc).padStart(3,"0")}°`;
          })() : "TC —";
          const distStr = cp.dist != null ? `${cp.dist} NM` : "— NM";
          return `${tcStr} · ${distStr}`;
        })(), step: "tcdist" },
      { label: "Vento",         value: windLabel,                                                 step: "vento"},
      { label: "Performance",   value: overrideValue,                                             step: "override" },
    ] : []),
  ];

  return (
    <div className="space-y-3">
      <div className={`text-[10px] uppercase tracking-widest ${theme.fgFaint}`}>Resumo</div>

      {/* Card de confirmação */}
      <div className={`${theme.panel} border ${theme.panelBorder} rounded-xl overflow-hidden`}>
        {rows.filter(Boolean).map(({ label, value, step, derived }) => (
          <button key={step}
            onClick={() => !derived && onEdit(step)}
            className={`w-full flex items-center justify-between px-4 py-3 text-left border-b ${theme.panelBorder} last:border-b-0 ${derived ? 'opacity-60 cursor-default' : 'active:opacity-70'}`}>
            <div>
              <div className={`text-[10px] uppercase tracking-wider ${theme.fgFaint} flex items-center gap-1.5`}>
                {label}
                {derived && (
                  <span className={`px-1 py-0.5 rounded text-[10px] font-bold ${theme.accentBg} text-black`}>
                    GPS
                  </span>
                )}
              </div>
              <div className={`text-base font-bold num ${theme.fg}`}>{value}</div>
            </div>
            {derived
              ? <span className={`text-[10px] ${theme.fgFaint} shrink-0`}>auto</span>
              : <Pencil className={`w-4 h-4 ${theme.fgFaint} shrink-0`} />
            }
          </button>
        ))}
      </div>

      {/* Arrival mode — inline no resumo, só para pernas com variação de altitude */}
      {!isOrigin && setCp && (() => {
        const currentAlt = cp.useCruiseAlt ? cruiseAlt : cp.alt;
        const isClimbing  = prevAlt != null && currentAlt != null && currentAlt - prevAlt > 50;
        const isDescending = prevAlt != null && currentAlt != null && prevAlt - currentAlt > 50;
        if (!isClimbing && !isDescending) return null;
        const contextDefault = isDescending ? "at_fix" : "asap";
        const arrivalMode = cp.arrivalMode ?? null;
        const arrivalValue = cp.arrivalValue ?? 5;
        const modeOpts = [
          { key: "asap",       label: "ASAP" },
          { key: "at_fix",     label: "No fix" },
          { key: "before_nm",  label: "−NM" },
          { key: "before_min", label: "−min" },
        ];
        function setMode(key) {
          setCp((p) => ({ ...p, arrivalMode: p.arrivalMode === key ? null : key }));
        }
        function adjustValue(delta) {
          setCp((p) => ({ ...p, arrivalValue: Math.max(1, Math.min(60, (p.arrivalValue ?? 5) + delta)) }));
        }
        return (
          <div className={`${theme.panel} border ${theme.panelBorder} rounded-xl p-3 space-y-2`}>
            <div className={`text-[10px] uppercase tracking-widest ${theme.fgFaint}`}>
              {isClimbing ? "↗ Subida" : "↘ Descida"} · nivelar
              {arrivalMode == null && <span className={`ml-1 ${theme.cyan}`}>· padrão: {contextDefault === "asap" ? "ASAP" : "no fix"}</span>}
            </div>
            <div className="flex gap-1">
              {modeOpts.map(({ key, label }) => {
                const active = arrivalMode === key || (arrivalMode == null && key === contextDefault);
                return (
                  <button key={key} onClick={() => setMode(key)}
                    className={`flex-1 py-2 rounded-lg border text-[11px] font-bold transition-colors active:scale-95 ${
                      active ? `${theme.accentBorder} bg-amber-500/10 ${theme.accent}` : `${theme.panelBorder} ${theme.fgFaint}`
                    }`}>
                    {label}
                  </button>
                );
              })}
            </div>
            {(arrivalMode === "before_nm" || arrivalMode === "before_min") && (
              <div className="flex items-center gap-3">
                <button onClick={() => adjustValue(-1)}
                  className={`w-10 h-10 rounded-lg border ${theme.panelBorder} ${theme.fg} text-xl font-black flex items-center justify-center active:scale-95`}>−</button>
                <div className="flex-1 text-center">
                  <span className={`text-2xl font-black num cockpit-glow ${theme.accent}`}>{arrivalValue}</span>
                  <span className={`ml-1 text-sm ${theme.fgFaint}`}>{arrivalMode === "before_nm" ? "NM" : "min"}</span>
                </div>
                <button onClick={() => adjustValue(1)}
                  className={`w-10 h-10 rounded-lg border ${theme.panelBorder} ${theme.fg} text-xl font-black flex items-center justify-center active:scale-95`}>+</button>
              </div>
            )}
          </div>
        );
      })()}

      <div className="space-y-2 pt-1">
        <button onClick={onSave}
          className={`w-full ${theme.accentBg} ${theme.accentBgFg} rounded-xl py-4 font-bold text-base active:scale-95 transition-transform duration-100`}>
          {isNew ? "Adicionar waypoint" : "Salvar alterações"}
        </button>
        {onRemove && (
          <button onClick={onRemove}
            className="w-full bg-red-900/40 border border-red-800 text-red-300 rounded-xl py-3 font-bold text-sm flex items-center justify-center gap-2 active:scale-95 transition-transform duration-100">
            <Trash className="w-4 h-4" /> Remover waypoint
          </button>
        )}
      </div>
    </div>
  );
}


// --------- TAB EM VOO ---------
function FlightTab({ flight, computed, liveETAs, liveRoute, nextLiveIdx, markVirtual, unmarkVirtual,
    nextIdx, markCrossed, depart,
    resetFlight, onEditAta, onEditVirtualAta, onEditAtd, onEditNotes, theme, viewMode, setViewMode,
    onOpenDeviation, onClearDeviation,
    liveFuel, ac, prefs }) {

  const dev = flight.activeDeviation || null;
  // Recalculate deviation geometry on each render so the banner stays live with TAS edits etc.
  const devTarget = dev && dev.targetIdx != null ? flight.checkpoints[dev.targetIdx] : null;
  let devGeom = null;
  if (dev && devTarget && devTarget.lat != null && devTarget.lon != null && dev.fromLat != null && dev.fromLon != null) {
    const d = gcDist(dev.fromLat, dev.fromLon, devTarget.lat, devTarget.lon);
    const tc = gcTC(dev.fromLat, dev.fromLon, devTarget.lat, devTarget.lon);
    const variation = flight.variation ?? 0;
    const mc = Math.round(((tc - variation) % 360 + 360) % 360);
    const tasN = Number(dev.currentTas) || (ac && ac.tasCruise) || 100;
    const r = calcLeg(tc, d, tasN, flight.windDir, flight.windVel, variation, 0);
    const startMin = parseHHMM(dev.startedAt) ?? nowHHMM();
    devGeom = { dist: d, mc, ete: r.ete, tc, eta: startMin + r.ete, targetIdx: dev.targetIdx, target: devTarget };
  }

  let next = nextLiveIdx < liveRoute.length ? liveRoute[nextLiveIdx] : null;
  // When the active deviation targets the same fix as `next`, swap in the
  // deviation's geometry so the banner shows the *correction* heading,
  // distance, and ETE — not the planned ones.
  if (next && devGeom && next.userIdx === devGeom.targetIdx) {
    next = Object.assign({}, next, {
      tc: devGeom.tc,
      mc: devGeom.mc,
      mh: devGeom.mc,
      dist: devGeom.dist,
      distLeg: devGeom.dist,
      etePlanned: devGeom.ete,
      eteLeg: devGeom.ete,
      _isDeviation: true,
    });
  }
  const planNext = next ? next.etaPlanned : null;

  // ETA live do próximo ponto — para virtuais, interpola entre o ETA do wp anterior e do próximo
  const liveNext = useMemo(() => {
    if (!next) return null;
    if (!next.isVirtual) return liveETAs[next.userIdx] ?? null;
    const userCp = computed[next.userIdx];
    if (!userCp?.etePlanned || userCp.etePlanned <= 0) return null;
    const prevETA = next.userIdx > 1 ? liveETAs[next.userIdx - 1] : (flight.atd ? parseHHMM(flight.atd) : null);
    if (prevETA == null || liveETAs[next.userIdx] == null) return null;
    return prevETA + (next.etePlanned / userCp.etePlanned) * (liveETAs[next.userIdx] - prevETA);
  }, [next, liveETAs, computed, flight.atd]);
  // Desvio calculado em cima do plano ajustado pelo ATD real (não pela EOBT)
  // Se saímos atrasados, isso não gera alerta — só desvios de navegação/velocidade alertam
  const eobtMin = parseHHMM(flight.eobt) ?? 0;
  const atdMin = flight.atd ? (parseHHMM(flight.atd) ?? eobtMin) : eobtMin;
  const departDelay = atdMin - eobtMin;
  const planNextAdj = planNext != null ? planNext + departDelay : null;
  const deltaMin = liveNext != null && planNextAdj != null ? liveNext - planNextAdj : null;
  const alertDelta = prefs?.alertEtaDeltaMin ?? 5;
  const isAlert = deltaMin != null && Math.abs(deltaMin) >= alertDelta;

  // Alerta háptico quando desvio de ETA passa do limiar
  const prevIsAlert = useRef(false);
  useEffect(() => {
    if (isAlert && !prevIsAlert.current) haptic([100, 50, 100]);
    prevIsAlert.current = isAlert;
  }, [isAlert]);

  // Tick a cada segundo para forçar re-render
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 1000);
    return () => clearInterval(id);
  }, []);

  // Cronômetro baseado no ATA mais recente (ou ATD) — sobrevive a edições de ATA e recarregamentos
  const lastAtaMs = useMemo(() => {
    const now = new Date();
    const startOfDayMs = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate());
    const allAtaMins = [];
    for (const cp of flight.checkpoints) {
      if (cp.ata) { const m = parseHHMM(cp.ata); if (m != null) allAtaMins.push(m); }
    }
    for (const v of Object.values(flight.autoWpATAs || {})) {
      if (v) { const m = parseHHMM(v); if (m != null) allAtaMins.push(m); }
    }
    let latestMin = null;
    if (allAtaMins.length > 0) {
      const nowMin = nowHHMM();
      let bestDiff = Infinity;
      for (const m of allAtaMins) {
        let diff = nowMin - m; if (diff < 0) diff += 1440;
        if (diff < bestDiff) { bestDiff = diff; latestMin = m; }
      }
    } else if (flight.atd) {
      latestMin = parseHHMM(flight.atd);
    }
    if (latestMin == null) return null;
    let ms = startOfDayMs + latestMin * 60 * 1000;
    if (ms > Date.now()) ms -= 24 * 60 * 60 * 1000; // ontem se ATA ainda não chegou
    return ms;
  }, [flight.checkpoints, flight.autoWpATAs, flight.atd, tick]);

  const elapsed = lastAtaMs != null ? Math.max(0, Math.floor((Date.now() - lastAtaMs) / 1000)) : 0;
  const elapsedMin = Math.floor(elapsed / 60);
  const elapsedSec = elapsed % 60;

  // ETA atingida: hora atual >= ETA do próximo waypoint (não cruzado)
  const isEtaPassed = useMemo(() => {
    if (!next || liveNext == null) return false;
    let diff = nowHHMM() - liveNext;
    if (diff > 720) diff -= 1440;
    if (diff < -720) diff += 1440;
    return diff >= 0;
  }, [tick, next, liveNext]); // tick muda a cada segundo → reavalia

  // Alarme sonoro + háptico único quando a ETA do próximo ponto é atingida
  const etaAlarmFiredFor = useRef(null);
  useEffect(() => {
    if (!next) { etaAlarmFiredFor.current = null; return; }
    const key = next.isVirtual ? next.autoKey : next.userIdx;
    if (isEtaPassed && etaAlarmFiredFor.current !== key) {
      etaAlarmFiredFor.current = key;
      const isVirt = next?.isVirtual;
      haptic(isVirt ? [120, 60, 200] : [250, 80, 250, 80, 400]);
      playAlarm(isVirt ? "virtual" : "waypoint");
    }
    if (!isEtaPassed) etaAlarmFiredFor.current = null;
  }, [isEtaPassed, next?.userIdx, next?.autoKey]);

  // Combustível restante atual
  const fuelStart = flight.fuelInitial ?? ac.fuelUsable;
  const currentFuel = useMemo(() => {
    for (let i = liveFuel.length - 1; i >= 0; i--) {
      if (liveFuel[i] != null) return liveFuel[i];
    }
    return fuelStart;
  }, [liveFuel, fuelStart]);
  const fuelPct = Math.max(0, Math.min(100, (currentFuel / fuelStart) * 100));
  const fuelColor = fuelPct < 25 ? theme.danger : fuelPct < 50 ? "text-amber-400" : theme.success;

  const allWarnings = useMemo(() =>
    computed.flatMap((cp) => (cp.warnings || []).map((w) => `${cp.name}: ${w}`)),
    [computed]
  );

  const anyWpCrossed = computed.some(cp => !cp.isOrigin && cp.ata != null);

  return (
    <div className="px-3 py-3 space-y-3">

      {/* ---- Card de Partida ---- */}
      {!flight.atd && !anyWpCrossed ? (
        <div className={`border-2 rounded-lg p-4 ${theme.accentBorder} bg-amber-500/5`}>
          <div className={`text-[10px] uppercase tracking-widest ${theme.accent} mb-1`}>Pronto para partir</div>
          <div className="flex items-center justify-between mb-3">
            <div>
              <div className={`text-[10px] uppercase ${theme.fgFaint}`}>EOBT</div>
              <div className={`text-2xl font-black num cockpit-glow ${theme.accent}`}>{flight.eobt}</div>
            </div>
            <div className="text-right">
              <div className={`text-[10px] uppercase ${theme.fgFaint}`}>Origem</div>
              <div className={`text-2xl font-black ${theme.fg}`}>{flight.origin || computed[0]?.name || "—"}</div>
            </div>
          </div>
          <button onClick={depart}
            className={`w-full ${theme.accentBg} ${theme.accentBgFg} font-bold py-5 rounded-lg text-base flex items-center justify-center gap-2 active:scale-[0.98] transition-all duration-150`}
            style={{ minHeight: 64 }}>
            <Plane className="w-5 h-5" /> Partir agora
          </button>
        </div>
      ) : flight.atd ? (
        <button onClick={onEditAtd}
          className={`w-full ${theme.panel} border ${theme.panelBorder} rounded-lg px-3 py-2 flex items-center justify-between active:scale-[0.98] transition-all duration-150`}>
          <div className="flex items-center gap-2">
            <Plane className={`w-4 h-4 ${theme.success}`} />
            <div className="text-left">
              <div className={`text-[10px] uppercase ${theme.fgFaint}`}>ATD</div>
              <div className={`font-bold num ${theme.success}`}>{displayTime(flight.atd)}</div>
            </div>
          </div>
          <div className="flex items-center gap-2">
            <div className={`text-[10px] uppercase ${theme.fgFaint}`}>{flight.origin || computed[0]?.name}</div>
            <Edit2 className={`w-3.5 h-3.5 ${theme.fgFaint}`} />
          </div>
        </button>
      ) : null}

      {allWarnings.length > 0 && (
        <div className="bg-amber-900/30 border border-amber-600/50 rounded-lg px-3 py-2 space-y-0.5">
          {allWarnings.map((w, i) => (
            <div key={i} className="flex items-center gap-2 text-xs text-amber-300">
              <AlertTriangle className="w-3.5 h-3.5 shrink-0" /> {w}
            </div>
          ))}
        </div>
      )}

      {/* Strip de Reposicionamento (Desvio) */}
      {flight.atd && (
        <div className={`flex items-center gap-2 ${dev ? "border-cyan-500/60 bg-cyan-500/10 border" : ""} rounded-lg ${dev ? "p-2" : ""}`}>
          {dev ? (
            <>
              <span className={`text-[10px] uppercase tracking-widest font-bold ${theme.cyan}`}>DESVIO ATIVO</span>
              {devGeom && (
                <span className={`text-[10px] num ${theme.fgFaint}`}>
                  → {devGeom.target?.name} · {String(devGeom.mc).padStart(3,"0")}°M · {devGeom.dist.toFixed(1)} NM
                </span>
              )}
              <button onClick={onOpenDeviation}
                className={`ml-auto text-[10px] px-2 py-1 rounded border ${theme.panelBorder} ${theme.fgMuted}`}>
                Editar
              </button>
              <button onClick={onClearDeviation}
                className="text-[10px] px-2 py-1 rounded border border-red-500 text-red-400 font-bold">
                Voltar à rota
              </button>
            </>
          ) : (
            <button onClick={onOpenDeviation}
              className={`w-full text-[11px] uppercase tracking-widest font-bold py-2 rounded-lg border ${theme.panelBorder} ${theme.fgMuted} active:scale-[0.99] flex items-center justify-center gap-1.5`}>
              <Navigation className="w-3.5 h-3.5" /> Reposicionar (desvio)
            </button>
          )}
        </div>
      )}

      {next ? (
        /* ---- Card de próximo waypoint (regular ou virtual TOC/TOD/BOD) ---- */
        (() => {
          const isDev = next._isDeviation === true;
          const accentColor = isDev ? theme.cyan : next.isVirtual ? theme.cyan : isAlert ? theme.danger : theme.accent;
          const borderClass = isDev
            ? "border-cyan-500/80 bg-cyan-500/10"
            : next.isVirtual
              ? (isAlert ? "border-red-500/80 bg-red-500/10" : "border-cyan-500/60 bg-cyan-500/5")
              : (isAlert ? "border-red-500/80 bg-red-500/10" : `${theme.accentBorder} bg-amber-500/5`);
          const virtLabel = next.name === "BOC" ? "Início da Subida"
            : next.name === "TOC" ? "Topo de Subida"
            : next.name === "TOD" ? "Início de Descida"
            : "Fim de Descida";
          const topLabel = isDev
            ? "Correção · Próximo"
            : next.isVirtual
              ? virtLabel
              : isAlert ? "DESVIO DE ETA" : "Próximo Waypoint";
          return (
        <div className={`border-2 rounded-lg p-4 transition-all duration-150 ${borderClass}`}>
          {/* Linha topo: label + alt */}
          <div className="flex items-center justify-between mb-1">
            <span className={`text-[10px] uppercase tracking-widest ${accentColor}`}>
              {topLabel}
            </span>
            <span className={`text-[10px] ${theme.fgFaint} num`}>
              {next.alt != null ? `${next.alt} ft` : ""}
            </span>
          </div>

          {/* Nome + proa */}
          <div className="flex items-end justify-between mb-3 gap-2">
            <div className={`text-4xl font-black cockpit-glow tracking-tight leading-none ${accentColor}`}>
              {next.name}
            </div>
            {next.mh != null && (
              <div className="text-right">
                <div className={`text-[10px] uppercase tracking-widest ${theme.fgFaint}`}>MH</div>
                <div className={`text-4xl font-black num cockpit-glow leading-none ${accentColor}`}>
                  {Math.round(next.mh).toString().padStart(3,"0")}°
                </div>
                {next.mc != null && next.wca != null && Math.abs(next.wca) >= 1 && (
                  <div className={`text-[10px] num ${theme.fgFaint} mt-0.5`}>
                    MC {Math.round(next.mc).toString().padStart(3,"0")}°
                  </div>
                )}
              </div>
            )}
          </div>

          {/* ETE, ETA e barra de progresso da perna */}
          {/* ETE + ETA */}
          <div className="grid grid-cols-2 gap-2 mb-2">
            <div className={`bg-black/30 border ${theme.panelBorder} rounded-lg px-3 py-3`}>
              <div className={`text-[10px] uppercase tracking-widest ${theme.fgFaint} mb-1`}>ETE</div>
              <div className={`text-3xl font-black num cockpit-glow ${theme.fg}`}>
                {Math.round(next.eteLeg ?? next.etePlanned ?? 0)}<span className={`text-base font-bold ${theme.fgFaint} ml-1`}>min</span>
              </div>
            </div>
            <div className={`bg-black/30 border rounded-lg px-3 py-3 ${isAlert ? "border-red-500/60" : "border-cyan-500/40"}`}>
              <div className={`text-[10px] uppercase tracking-widest ${theme.fgFaint} mb-1`}>{isAlert ? "ETA ⚠" : "ETA"}</div>
              {liveNext != null ? (
                <>
                  <div className={`text-3xl font-black num cockpit-glow ${accentColor}`}>
                    {formatHHMM(liveNext)}
                  </div>
                  {deltaMin != null && Math.abs(deltaMin) >= 1 && (
                    <div className={`text-[10px] num mt-0.5 ${deltaMin > 0 ? theme.danger : theme.success}`}>
                      {deltaMin > 0 ? "+" : "−"}{Math.abs(Math.round(deltaMin))} min
                    </div>
                  )}
                </>
              ) : (
                <div className={`text-3xl font-black num ${theme.fgFaint}`}>—</div>
              )}
            </div>
          </div>
          {/* Barra de progresso — fina, sem label (a percentagem é implícita) */}
          {lastAtaMs != null && (next.eteLeg ?? next.etePlanned) > 0 && (() => {
            const legETE = next.eteLeg ?? next.etePlanned;
            const progressPct = Math.min(100, (elapsed / 60) / legETE * 100);
            return (
              <div className="h-1 rounded-full bg-black/40 overflow-hidden mb-3">
                <div
                  className={`h-full rounded-full ${
                    progressPct >= 95 ? "bg-red-500" :
                    progressPct >= 75 ? "bg-amber-400" :
                    isAlert ? "bg-red-500" : "bg-amber-500"
                  }`}
                  style={{ width: `${progressPct}%`, transition: "width 1s linear" }}
                />
              </div>
            );
          })()}

          {/* Dist + alt + vento como info secundária */}
          <div className={`grid grid-cols-3 text-[10px] num ${theme.fgFaint} mb-3 px-1 gap-1`}>
            <span>{(next.distLeg ?? next.dist)?.toFixed(2)} NM</span>
            <span className="text-center">{next.alt != null ? `${next.alt} ft` : "—"}</span>
            <span className="text-right">
              {next.windMode === "none" ? "W=0" : (
                <>
                  <Wind className="w-3 h-3 inline mr-0.5 opacity-70" />
                  {String(Math.round(next.windDirUsed ?? flight.windDir ?? 0)).padStart(3,"0")}°
                  {" / "}
                  {Math.round(next.windVelUsed ?? flight.windVel ?? 0)} kt
                </>
              )}
            </span>
          </div>

          {next.warnings?.length > 0 && (
            <div className="mb-3 space-y-0.5">
              {next.warnings.map((w, i) => (
                <div key={i} className="text-xs text-amber-300 flex items-center gap-1">
                  <AlertTriangle className="w-3 h-3" />{w}
                </div>
              ))}
            </div>
          )}
          {isEtaPassed && (
            <div className="mb-2 bg-amber-500/20 border border-amber-400/60 rounded-lg px-3 py-2 flex items-center gap-2 animate-pulse">
              <Clock className="w-4 h-4 text-amber-300 shrink-0" />
              <span className="text-amber-200 text-sm font-bold">ETA atingida — confirme passagem</span>
            </div>
          )}
          <div className="grid grid-cols-2 gap-2">
            <button
              onClick={() => next.isVirtual ? markVirtual(next.autoKey) : markCrossed(next.userIdx)}
              className={`${isEtaPassed ? "bg-amber-500 animate-pulse" : isAlert ? "bg-red-600" : next.isVirtual ? "bg-cyan-700" : theme.accentBg} ${next.isVirtual ? "text-white" : theme.accentBgFg} font-bold py-5 rounded-lg text-base flex items-center justify-center gap-2 active:scale-[0.98] transition-all duration-150`}
              style={{ minHeight: 64 }}>
              <CircleCheckBig className="w-5 h-5" /> Agora
            </button>
            <button
              onClick={() => next.isVirtual ? onEditVirtualAta(next.autoKey) : onEditAta(next.userIdx)}
              className={`${theme.panel} border-2 ${next.isVirtual ? "border-cyan-600" : theme.accentBorder} ${next.isVirtual ? theme.cyan : theme.accent} font-bold py-5 rounded-lg text-base flex items-center justify-center gap-2 active:scale-[0.98] transition-all duration-150`}
              style={{ minHeight: 64 }}>
              <Clock className="w-5 h-5" /> Registrar hora
            </button>
          </div>
        </div>
          );
        })()
      ) : (
        <div className="bg-green-500/15 border-2 border-green-500/50 rounded-lg p-6 text-center">
          <CircleCheckBig className={`w-10 h-10 mx-auto ${theme.success} mb-2`} />
          <div className={`text-lg font-bold ${theme.success}`}>Voo concluído</div>
          {computed.length > 0 && computed[computed.length-1].ata && (
            <div className={`text-sm ${theme.fgMuted} mt-1 num`}>
              {computed[computed.length-1].name} · ATA {displayTime(computed[computed.length-1].ata)}
              {computed[computed.length-1].gsActual &&
                ` · GS ${Math.round(computed[computed.length-1].gsActual)} kt`}
            </div>
          )}
          <button onClick={resetFlight}
            className={`mt-3 text-xs uppercase tracking-wider ${theme.fgMuted} underline`}>
            Resetar para próximo voo
          </button>
        </div>
      )}

      <div className={`${theme.panel} border ${theme.panelBorder} rounded-lg px-3 py-2 flex items-center justify-between`}>
        <div className="flex items-center gap-2">
          <Clock className={`w-4 h-4 ${lastAtaMs != null ? theme.accent : theme.fgFaint}`} />
          <div>
            <div className={`text-[10px] uppercase ${theme.fgFaint}`}>Desde último ponto</div>
            <div className={`text-lg font-bold num cockpit-glow ${lastAtaMs != null ? theme.accent : theme.fgFaint}`}>
              {lastAtaMs != null
                ? `${String(elapsedMin).padStart(2,"0")}:${String(elapsedSec).padStart(2,"0")}`
                : "--:--"}
            </div>
          </div>
        </div>
        <div className={`w-px h-10 bg-current opacity-20`} />
        <div className="text-right">
          <div className={`text-[10px] uppercase ${theme.fgFaint}`}>Comb. restante est.</div>
          <div className={`text-lg font-bold num cockpit-glow ${fuelColor}`}>
            {Math.round(currentFuel)} <span className={`text-xs ${theme.fgFaint}`}>gal</span>
          </div>
          <div className={`text-[10px] num ${theme.fgFaint}`}>{fuelPct.toFixed(0)}% de {fuelStart}</div>
        </div>
      </div>

      <div className="space-y-1">
        <div className={`flex items-center justify-between text-[10px] uppercase tracking-widest ${theme.fgFaint} px-1`}>
          <span>Rota</span>
          <div className="flex items-center gap-2">
            <button onClick={() => setViewMode(viewMode === "leg" ? "cum" : "leg")}
              className={`${theme.fgMuted} px-2 py-1 border ${theme.panelBorder} rounded text-[10px]`}>
              {viewMode === "leg" ? "Por Perna" : "Acumulado"}
            </button>
            <button onClick={resetFlight} className={`flex items-center gap-1 ${theme.fgMuted}`}>
              <RotateCcw className="w-3 h-3" /> Reset
            </button>
          </div>
        </div>
        {liveRoute.map((item, i) => {
          const hasLiveBase = !!flight.atd || anyWpCrossed;
          const originEta = item.isOrigin ? (flight.atd ? parseHHMM(flight.atd) : null) : null;
          return (
          <CheckpointRow key={item.isVirtual ? item.autoKey : `u${item.userIdx}`}
            cp={item} index={i} theme={theme}
            isNext={i === nextLiveIdx}
            etaPlanned={item.isOrigin ? originEta : item.etaPlanned}
            etaOriginLabel={item.isOrigin ? (flight.atd ? "ATD" : null) : undefined}
            etaLive={(!item.isVirtual && !item.isOrigin && item.userIdx != null) ? liveETAs[item.userIdx] : null}
            crossed={item.ata != null}
            isOrigin={item.isOrigin}
            isVirtual={item.isVirtual}
            hasLiveBase={hasLiveBase}
            departDelay={departDelay}
            viewMode={viewMode}
            onEditAta={() => item.isVirtual ? onEditVirtualAta(item.autoKey) : onEditAta(item.userIdx)}
            onEditNotes={() => !item.isVirtual && onEditNotes(item.userIdx)}
            onUnmarkVirtual={item.isVirtual ? () => unmarkVirtual(item.autoKey) : null}
          />
          );
        })}
      </div>

      <div className={`${theme.panel} border ${theme.panelBorder} rounded-lg p-3 grid grid-cols-3 gap-3 text-center`}>
        <div>
          <div className={`text-[10px] uppercase ${theme.fgFaint}`}>Dist Total</div>
          <div className={`text-base font-bold num ${theme.fg}`}>{computed[computed.length-1]?.cumDist?.toFixed(0)||0} NM</div>
        </div>
        <div>
          <div className={`text-[10px] uppercase ${theme.fgFaint}`}>Tempo Total</div>
          <div className={`text-base font-bold num ${theme.fg}`}>{(computed[computed.length-1]?.cumTime||0).toFixed(0)} min</div>
        </div>
        <div>
          <div className={`text-[10px] uppercase ${theme.fgFaint}`}>Cruzados</div>
          <div className={`text-base font-bold num ${theme.fg}`}>
            {computed.filter(c=>c.ata!=null).length}/{computed.filter(c=>!c.isOrigin).length}
          </div>
        </div>
      </div>
    </div>
  );
}

function BigStat({ label, value, theme }) {
  return (
    <div className={`bg-black/30 border ${theme?.panelBorder || "border-zinc-800"} rounded px-2 py-2 text-center`}>
      <div className={`text-[10px] uppercase tracking-wider ${theme?.fgFaint || "text-zinc-500"}`}>{label}</div>
      <div className={`text-xl font-bold num ${theme?.fg || "text-zinc-100"}`}>{value}</div>
    </div>
  );
}

function ETACell({ label, value, delta, muted, theme }) {
  const sign = delta == null ? null : delta > 0 ? "+" : delta < 0 ? "−" : "";
  const absDelta = delta == null ? null : Math.abs(Math.round(delta));
  const deltaColor =
    delta == null ? "" :
    delta > 1 ? (theme?.danger || "text-red-400") :
    delta < -1 ? (theme?.success || "text-green-400") : (theme?.fgFaint || "text-zinc-500");
  return (
    <div className={`bg-black/30 border rounded px-2 py-2 ${muted ? (theme?.panelBorder || "border-zinc-800") : "border-cyan-500/40"}`}>
      <div className={`text-[10px] uppercase tracking-wider ${theme?.fgFaint || "text-zinc-500"}`}>{label}</div>
      <div className={`text-xl font-bold num ${muted ? (theme?.fgMuted || "text-zinc-300") : (theme?.cyan || "text-cyan-400")}`}>{value}</div>
      {absDelta != null && absDelta > 0 && (
        <div className={`text-[10px] num ${deltaColor}`}>{sign}{absDelta} min</div>
      )}
    </div>
  );
}

function CheckpointRow({ cp, index, isNext, etaPlanned, etaOriginLabel, etaLive, crossed, isOrigin, isVirtual, hasLiveBase, departDelay, onEditAta, onEditNotes, onUnmarkVirtual, theme, viewMode }) {
  const ringClass =
    isVirtual && crossed ? "border-cyan-500/30 bg-cyan-500/5" :
    isVirtual && isNext  ? "border-cyan-500/60 bg-cyan-500/5" :
    isVirtual            ? "border-cyan-500/20 bg-transparent" :
    crossed ? "border-green-500/40 bg-green-500/5" :
    isNext  ? `${theme.accentBorder} bg-amber-500/5` :
              `${theme.panelBorder} ${theme.panel}/50`;
  const planAdj = etaPlanned != null ? etaPlanned + (departDelay ?? 0) : null;
  const deltaMin = etaLive != null && !crossed ? etaLive - planAdj : null;
  const sign = deltaMin == null ? null : deltaMin > 0 ? "+" : deltaMin < 0 ? "−" : "";
  const absDelta = deltaMin == null ? null : Math.abs(Math.round(deltaMin));
  const deltaColor = deltaMin == null ? "" :
    deltaMin > 1 ? theme.danger :
    deltaMin < -1 ? theme.success : theme.fgFaint;

  const isAuto = cp.isAuto;
  const isClickable = !isOrigin && !isAuto;
  const Wrapper = isClickable ? "button" : "div";
  const wrapperProps = isClickable ? { onClick: onEditAta } : {};

  // Subtítulo: depende do modo de visualização
  const altLabel = cp.alt != null ? `${cp.alt} ft` : null;
  // Use eteLeg (segment delta) when available; fall back to full etePlanned for single-phase legs
  const displayETE = cp.eteLeg ?? cp.etePlanned;
  const phaseLbl = cp.eteLeg != null ? null : phaseETELabel(cp.portions, cp.etePlanned);
  const eteLabel = phaseLbl ?? (displayETE != null ? `${displayETE.toFixed(1)} min` : null);
  const subtitle = isOrigin ? "Origem"
    : isVirtual ? `+${(cp.distLeg ?? cp.dist)?.toFixed(2)} NM · ${displayETE != null ? displayETE.toFixed(1) : "—"} min · ${cp.alt} ft`
    : isAuto ? `AUTO · ${cp.alt} ft · +${cp.dist?.toFixed(1)} NM da perna`
    : viewMode === "cum"
      ? `Σ ${cp.cumDist?.toFixed(0)} NM · Σ ${cp.cumTime?.toFixed(0)} min${altLabel ? ` · ${altLabel}` : ""} · MC ${Math.round(cp.mc ?? cp.mh).toString().padStart(3, "0")}°`
      : `${(cp.distLeg ?? cp.dist)?.toFixed(2)} NM · ${eteLabel ?? "—"}${altLabel ? ` · ${altLabel}` : ""} · MC ${Math.round(cp.mc ?? cp.mh).toString().padStart(3, "0")}°`;

  return (
    <Wrapper
      {...wrapperProps}
      className={`w-full text-left border rounded px-2 py-2 ${ringClass} ${isVirtual ? "border-dashed opacity-80" : ""} ${isClickable ? "active:scale-[0.99] transition-transform duration-100" : ""}`}
    >
      <div className="flex items-center gap-2">
        {/* Indicador */}
        <div className="w-6 text-center shrink-0">
          {crossed ? (
            <CircleCheckBig className={`w-5 h-5 ${isVirtual ? theme.cyan : theme.success} mx-auto`} />
          ) : isNext ? (
            <ChevronRight className={`w-5 h-5 ${isVirtual ? theme.cyan : theme.accent} mx-auto animate-pulse`} />
          ) : isVirtual ? (
            (cp.name === "BOC" || cp.name === "TOC") ? <TrendingUp  className={`w-4 h-4 ${theme.cyan} opacity-70 mx-auto`} /> :
            (cp.name === "TOD" || cp.name === "BOD") ? <TrendingDown className={`w-4 h-4 ${theme.cyan} opacity-70 mx-auto`} /> :
                                                       <Minus        className={`w-4 h-4 ${theme.cyan} opacity-70 mx-auto`} />
          ) : (
            <span className={`text-[10px] num ${theme.fgFaint}`}>{index + 1}</span>
          )}
        </div>
        {/* Nome + badges */}
        <div className="flex-1 min-w-0">
          <div className={`font-bold truncate ${crossed ? (isVirtual ? theme.cyan : theme.success) : isNext ? (isVirtual ? theme.cyan : theme.accent) : isVirtual ? theme.cyan : theme.fg}`}>
            {cp.name}
            {!isVirtual && cp.windMode === "none"   && <span className={`ml-1 text-[10px] ${theme.cyan} border border-current rounded px-1`}>W=0</span>}
            {!isVirtual && cp.windMode === "custom" && <span className={`ml-1 text-[10px] ${theme.cyan} border border-current rounded px-1`}>W↗</span>}
            {!isVirtual && cp.warnings?.length > 0  && <span className="ml-1 text-[10px] text-amber-400 border border-current rounded px-1">⚠</span>}
          </div>
          {!cp.isOrigin && (
            <div className={`text-[10px] ${isVirtual ? theme.cyan : theme.fgFaint} num opacity-70`}>{subtitle}</div>
          )}
          {!isVirtual && cp.notes && (
            <div className={`text-[10px] ${theme.cyan} truncate mt-0.5`}>📝 {cp.notes}</div>
          )}
        </div>
        {/* Tempos + botão nota */}
        <div className="flex items-start gap-1 shrink-0">
          <div className="text-right">
            {cp.isOrigin ? (
              etaPlanned != null ? (
                <div>
                  <div className={`text-[10px] uppercase ${theme.success}`}>{etaOriginLabel ?? "ATD"}</div>
                  <div className={`num font-bold ${theme.success}`}>{formatHHMM(etaPlanned)}</div>
                </div>
              ) : null
            ) : crossed ? (
              <div>
                <div className={`text-[10px] uppercase ${isVirtual ? theme.cyan : theme.success} flex items-center gap-1 justify-end`}>
                  ATA {!isVirtual && <Pencil className="w-2.5 h-2.5 opacity-60" />}
                </div>
                <div className={`num font-bold ${isVirtual ? theme.cyan : theme.success}`}>{displayTime(cp.ata)}</div>
                {!isVirtual && cp.gsActual && (
                  <div className={`text-[10px] num ${theme.fgFaint}`}>GS {Math.round(cp.gsActual)} kt</div>
                )}
              </div>
            ) : hasLiveBase && etaLive != null ? (
              <div>
                <div className={`text-[10px] uppercase ${theme.fgFaint} flex items-center gap-1 justify-end`}>
                  EST {!isVirtual && <Pencil className="w-2.5 h-2.5 opacity-40" />}
                </div>
                <div className={`num font-bold ${isVirtual ? theme.cyan : absDelta != null && absDelta > 0 ? deltaColor : theme.fgMuted}`}>
                  {formatHHMM(etaLive)}
                </div>
                {!isVirtual && absDelta != null && absDelta > 0 && (
                  <div className={`text-[10px] num ${deltaColor}`}>{sign}{absDelta} min</div>
                )}
              </div>
            ) : null}
          </div>
          {/* Botão nota (só waypoints manuais) ou botão desfazer virtual */}
          {isVirtual && crossed && onUnmarkVirtual ? (
            <button
              onClick={(e) => { e.stopPropagation(); onUnmarkVirtual(); }}
              className={`mt-0.5 p-1 rounded ${theme.fgFaint} opacity-60 hover:opacity-100 active:scale-90`}
              aria-label="Desfazer"
            >
              <RotateCcw className="w-3 h-3" />
            </button>
          ) : !isOrigin && !isAuto && !isVirtual ? (
            <button
              onClick={(e) => { e.stopPropagation(); onEditNotes(); }}
              className={`mt-0.5 p-1 rounded ${cp.notes ? theme.cyan : theme.fgFaint} opacity-70 hover:opacity-100 active:scale-90`}
              aria-label="Editar nota"
            >
              <FileText className="w-3.5 h-3.5" />
            </button>
          ) : null}
        </div>
      </div>
    </Wrapper>
  );
}
// Per-tick re-renders in the parent (every 1 s while ATD is set) only need to
// reach a row whose live ETA / crossed-state actually moved. Skip the rest.
CheckpointRow = React.memo(CheckpointRow, function(a, b) {
  return (
    a.cp === b.cp &&
    a.index === b.index &&
    a.isNext === b.isNext &&
    a.etaPlanned === b.etaPlanned &&
    a.etaLive === b.etaLive &&
    a.crossed === b.crossed &&
    a.isOrigin === b.isOrigin &&
    a.isVirtual === b.isVirtual &&
    a.hasLiveBase === b.hasLiveBase &&
    a.departDelay === b.departDelay &&
    a.viewMode === b.viewMode &&
    a.theme === b.theme &&
    a.etaOriginLabel === b.etaOriginLabel
  );
});

// --------- TAB COMBUSTÍVEL ---------
function FuelTab({ flight, computed, liveFuel, ac, theme }) {
  const fuelStart = flight.fuelInitial ?? ac.fuelUsable;

  const tripByPhase = useMemo(() => {
    const acc = { SUBIDA: { time: 0, fuel: 0 }, CRUZEIRO: { time: 0, fuel: 0 }, DESCIDA: { time: 0, fuel: 0 } };
    computed.forEach((cp) => {
      if (cp.isOrigin || !cp.portions || !cp.portions.length) return;
      const totalDist = cp.dist || 0;
      if (totalDist <= 0) return;
      cp.portions.forEach((p) => {
        const portionETE = (p.dist / totalDist) * (cp.etePlanned || 0);
        const portionFuel = (portionETE / 60) * p.gph;
        if (acc[p.phase]) {
          acc[p.phase].time += portionETE;
          acc[p.phase].fuel += portionFuel;
        }
      });
    });
    return acc;
  }, [computed]);

  const taxi = { time: 5, gph: ac.gphCruise / 2, fuel: (5 / 60) * (ac.gphCruise / 2) };
  const approach = { time: 5, gph: ac.gphCruise, fuel: (5 / 60) * ac.gphCruise };
  const tripTotal =
    tripByPhase.SUBIDA.fuel + tripByPhase.CRUZEIRO.fuel + tripByPhase.DESCIDA.fuel
    + taxi.fuel + approach.fuel;
  const altn = 12;
  const reserve = flight.rules === "IFR"
    ? (45 / 60) * ac.gphCruise
    : (30 / 60) * ac.gphCruise;
  const cont = tripTotal * 0.05;
  const totalReq = tripTotal + altn + reserve + cont;
  const margin = fuelStart - totalReq;
  const ok = margin >= 0;

  const lastFuel = useMemo(() => {
    for (let i = liveFuel.length - 1; i >= 0; i--) {
      if (liveFuel[i] != null) return liveFuel[i];
    }
    return fuelStart;
  }, [liveFuel, fuelStart]);

  const pct = Math.max(0, Math.min(100, (lastFuel / fuelStart) * 100));

  return (
    <div className="px-3 py-3 space-y-3">
      <div className={`${theme.panel} border ${theme.panelBorder} rounded-lg p-4`}>
        <div className={`text-[10px] uppercase tracking-widest ${theme.fgFaint} mb-2`}>Combustível atual</div>
        <div className="flex items-baseline gap-2 mb-3">
          <span className={`text-5xl font-black num ${theme.accent} cockpit-glow`}>{Math.round(lastFuel)}</span>
          <span className={`${theme.fgFaint} text-sm`}>/ {fuelStart} gal</span>
        </div>
        <div className="h-3 bg-black/40 rounded-full overflow-hidden">
          <div
            className={`h-full transition-all duration-150 ${
              pct < 25 ? "bg-red-500" : pct < 50 ? "bg-amber-500" : "bg-green-500"
            }`}
            style={{ width: `${pct}%` }}
          />
        </div>
        <div className={`flex justify-between mt-1 text-[10px] num ${theme.fgFaint}`}>
          <span>0</span><span>{Math.round(fuelStart / 2)}</span><span>{fuelStart}</span>
        </div>
      </div>

      <Section theme={theme} icon={<Fuel className="w-4 h-4" />} title="Cálculo de combustível">
        <div className={`${theme.panel} border ${theme.panelBorder} rounded divide-y ${theme.panelBorder} text-sm`}>
          <FuelRow theme={theme} label="Taxi e decolagem" time={taxi.time} fuel={taxi.fuel} />
          <FuelRow theme={theme} label="Subida" time={tripByPhase.SUBIDA.time} fuel={tripByPhase.SUBIDA.fuel} />
          <FuelRow theme={theme} label="Cruzeiro" time={tripByPhase.CRUZEIRO.time} fuel={tripByPhase.CRUZEIRO.fuel} />
          <FuelRow theme={theme} label="Descida" time={tripByPhase.DESCIDA.time} fuel={tripByPhase.DESCIDA.fuel} />
          <FuelRow theme={theme} label="Aproximação e pouso" time={approach.time} fuel={approach.fuel} />
          <FuelRow theme={theme} label="Trip Fuel" fuel={tripTotal} bold />
          <FuelRow theme={theme} label="Alternado" fuel={altn} />
          <FuelRow theme={theme} label={`Reserva ${flight.rules}`} fuel={reserve} />
          <FuelRow theme={theme} label="Contingência (5%)" fuel={cont} />
          <FuelRow theme={theme} label="Total Requerido" fuel={totalReq} bold accent />
        </div>
      </Section>

      <div className={`border-2 rounded-lg p-4 ${
        ok ? "bg-green-500/10 border-green-500/40" : "bg-red-500/10 border-red-500/40"
      }`}>
        <div className="flex items-center gap-3">
          {ok ? (
            <CircleCheckBig className={`w-8 h-8 ${theme.success}`} />
          ) : (
            <AlertTriangle className={`w-8 h-8 ${theme.danger}`} />
          )}
          <div>
            <div className={`text-base font-bold ${ok ? theme.success : theme.danger}`}>
              {ok ? "OK" : "INSUFICIENTE"}
            </div>
            <div className={`text-xs ${theme.fgMuted} num`}>
              Margem: {margin > 0 ? "+" : ""}{margin.toFixed(1)} gal
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function FuelRow({ label, time, fuel, bold, accent, theme }) {
  return (
    <div className={`flex items-center justify-between px-3 py-2 ${bold ? "bg-black/20" : ""}`}>
      <div className={`${bold ? "font-bold" : ""} ${accent ? theme.accent : theme.fgMuted} text-sm`}>
        {label}
      </div>
      <div className="flex items-center gap-3 text-sm num">
        {time != null && <span className={`${theme.fgFaint} text-xs`}>{time.toFixed(0)} min</span>}
        <span className={`${bold ? "font-bold" : ""} ${accent ? theme.accent : theme.fg}`}>
          {fuel.toFixed(1)} gal
        </span>
      </div>
    </div>
  );
}

// --------- TAB DIÁRIO ---------
function LogTab({ flight, computed, liveFuel, ac, theme }) {
  const fuelStart = flight.fuelInitial ?? ac.fuelUsable;

  // Estatísticas gerais
  const crossed = computed.filter((cp) => cp.ata != null);
  const last = crossed[crossed.length - 1];

  const planTotalDist = computed[computed.length - 1]?.cumDist || 0;
  const planTotalTime = computed[computed.length - 1]?.cumTime || 0;
  const planTotalFuel = fuelStart - (computed[computed.length - 1]?.fuelRemPlanned || fuelStart);

  // Tempo real total = ATA do último cruzado - EOBT
  const eobt = parseHHMM(flight.eobt);
  let realTotalTime = null;
  let realTotalDist = 0;
  let realFuelUsed = 0;
  if (last && eobt != null) {
    const lastAta = parseHHMM(last.ata);
    realTotalTime = lastAta - eobt;
    if (realTotalTime < 0) realTotalTime += 1440;
    realTotalDist = last.cumDist || 0;
    const lastFuel = liveFuel[computed.indexOf(last)];
    if (lastFuel != null) realFuelUsed = fuelStart - lastFuel;
  }
  const realGsAvg = realTotalTime > 0 ? (realTotalDist / realTotalTime) * 60 : null;

  return (
    <div className="px-3 py-3 space-y-3">
      <div className={`${theme.panel} border ${theme.panelBorder} rounded-lg p-3`}>
        <div className={`text-[10px] uppercase tracking-widest ${theme.fgFaint} mb-2`}>Resumo do voo</div>
        <div className="grid grid-cols-2 gap-2 text-center">
          <div>
            <div className={`text-[10px] uppercase ${theme.fgFaint}`}>Origem</div>
            <div className={`text-base font-bold ${theme.accent}`}>{flight.origin}</div>
          </div>
          <div>
            <div className={`text-[10px] uppercase ${theme.fgFaint}`}>Destino</div>
            <div className={`text-base font-bold ${theme.accent}`}>{flight.destination}</div>
          </div>
        </div>
      </div>

      {/* Comparação planejado vs real */}
      <Section theme={theme} icon={<BookOpen className="w-4 h-4" />} title="Planejado vs Real">
        <div className={`${theme.panel} border ${theme.panelBorder} rounded overflow-hidden`}>
          <div className={`grid grid-cols-3 px-3 py-2 text-[10px] uppercase ${theme.fgFaint} border-b ${theme.panelBorder}`}>
            <div>Métrica</div><div className="text-right">Plano</div><div className="text-right">Real</div>
          </div>
          <CompareRow theme={theme} label="Distância (NM)"
            plan={planTotalDist.toFixed(0)} real={realTotalDist > 0 ? realTotalDist.toFixed(0) : "—"} />
          <CompareRow theme={theme} label="Tempo (min)"
            plan={planTotalTime.toFixed(0)} real={realTotalTime != null ? realTotalTime.toFixed(0) : "—"} />
          <CompareRow theme={theme} label="GS médio (kt)"
            plan={planTotalDist > 0 && planTotalTime > 0 ? Math.round((planTotalDist / planTotalTime) * 60) : "—"}
            real={realGsAvg != null ? Math.round(realGsAvg) : "—"} />
          <CompareRow theme={theme} label="Combustível (gal)"
            plan={planTotalFuel.toFixed(1)} real={realFuelUsed > 0 ? realFuelUsed.toFixed(1) : "—"} />
        </div>
      </Section>

      {/* Lista de passagens */}
      <Section theme={theme} icon={<Clock className="w-4 h-4" />} title={`Passagens registradas (${crossed.length})`}>
        {crossed.length === 0 ? (
          <div className={`text-center py-6 ${theme.fgFaint} text-sm`}>
            Nenhuma passagem registrada ainda.
          </div>
        ) : (
          <div className="space-y-1">
            {crossed.map((cp) => {
              const eta = formatHHMM(cp.etaPlanned);
              const ataMin = parseHHMM(cp.ata);
              const delta = ataMin - cp.etaPlanned;
              const sign = delta > 0 ? "+" : delta < 0 ? "−" : "";
              const absD = Math.abs(Math.round(delta));
              return (
                <div key={cp.name + cp.ata}
                  className={`${theme.panel} border ${theme.panelBorder} rounded px-3 py-2 flex items-center justify-between`}>
                  <div>
                    <div className={`font-bold ${theme.success}`}>{cp.name}</div>
                    <div className={`text-[10px] ${theme.fgFaint} num`}>
                      ETA {eta} → ATA {displayTime(cp.ata)}
                      {absD > 0 && <span> ({sign}{absD} min)</span>}
                    </div>
                  </div>
                  <div className="text-right">
                    <div className={`text-[10px] uppercase ${theme.fgFaint}`}>GS real</div>
                    <div className={`text-sm font-bold num ${theme.fg}`}>
                      {cp.gsActual ? Math.round(cp.gsActual) : "—"} kt
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </Section>
    </div>
  );
}

function CompareRow({ label, plan, real, theme }) {
  return (
    <div className={`grid grid-cols-3 px-3 py-2 text-sm border-b ${theme.panelBorder} last:border-b-0`}>
      <div className={theme.fgMuted}>{label}</div>
      <div className={`text-right num ${theme.fgMuted}`}>{plan}</div>
      <div className={`text-right num font-bold ${theme.accent}`}>{real}</div>
    </div>
  );
}

// --------- PAINEL DE PREFERÊNCIAS ---------

        <div className="flex items-center justify-between">
          <h3 className={`text-sm uppercase tracking-widest ${theme.accent} font-bold`}>Preferências</h3>

          </div>
        </div>

// --------- EDITOR DE ATA ---------
function AtaEditor({ checkpoint, eobt, prevAta, etaPlanned, etaLive, onSave, onClear, onClose, onUseNow, theme, fieldLabel, confirmLabel, clearLabel }) {
  // Representação interna: string de dígitos puros, máx 6 (HHMMSS)
  const initialDigits = checkpoint.ata
    ? checkpoint.ata.replace(/:/g, "").slice(0, 6)
    : "";
  const [digits, setDigits] = useState(initialDigits);

  // Formata dígitos → "HH:MM:SS" para armazenamento
  function digitsToHHMMSS(d) {
    return `${d[0]||"0"}${d[1]||"0"}:${d[2]||"0"}${d[3]||"0"}:${d[4]||"0"}${d[5]||"0"}`;
  }

  // Valida: 6 dígitos, HH 00-23, MM 00-59, SS 00-59
  function isValid(d) {
    if (d.length !== 6) return false;
    const hh = parseInt(d.slice(0, 2), 10);
    const mm = parseInt(d.slice(2, 4), 10);
    const ss = parseInt(d.slice(4, 6), 10);
    return hh >= 0 && hh <= 23 && mm >= 0 && mm <= 59 && ss >= 0 && ss <= 59;
  }

  function pressDigit(n) {
    setDigits((prev) => (prev.length < 6 ? prev + String(n) : prev));
  }
  function backspace() {
    setDigits((prev) => prev.slice(0, -1));
  }
  function useNow() {
    setDigits(formatHHMMSS(nowHHMM()).replace(/:/g, ""));
  }

  const valid = isValid(digits);

  // Delta entre ATA digitada e ETA planejada
  const deltaMin = useMemo(() => {
    if (!valid || etaPlanned == null) return null;
    const hh = parseInt(digits.slice(0, 2), 10);
    const mm = parseInt(digits.slice(2, 4), 10);
    const ss = parseInt(digits.slice(4, 6), 10);
    const ataMin = hh * 60 + mm + ss / 60;
    let d = ataMin - etaPlanned;
    // Ajusta crossing de meia-noite
    if (d > 720) d -= 1440;
    if (d < -720) d += 1440;
    return d;
  }, [digits, valid, etaPlanned]);

  const deltaColor =
    deltaMin == null ? theme.fgFaint :
    deltaMin > 2  ? theme.danger :
    deltaMin < -2 ? theme.success :
    theme.fgFaint;

  const sign = deltaMin == null ? "" : deltaMin >= 0 ? "+" : "−";
  const absD = deltaMin == null ? null : Math.abs(Math.round(deltaMin));

  // Layout do teclado numérico: linhas [1,2,3], [4,5,6], [7,8,9], [⌫,0,↩]
  const keys = [
    [1, 2, 3],
    [4, 5, 6],
    [7, 8, 9],
  ];

  return (
    <div className="fixed inset-0 z-30 bg-black/85 flex items-end" onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()}
        className={`w-full ${theme.panel} border-t ${theme.panelBorder} rounded-t-2xl p-4 space-y-3`}>

        {/* Header */}
        <div className="flex items-center justify-between">
          <h3 className={`text-sm uppercase tracking-widest ${theme.accent} font-bold`}>
            {checkpoint.ata ? (fieldLabel ? `Editar ${fieldLabel}` : "Editar passagem") : (fieldLabel ? `Registrar ${fieldLabel}` : "Marcar passagem")}
          </h3>
          <button onClick={onClose} aria-label="Fechar"><X className={`w-5 h-5 ${theme.fgFaint}`} /></button>
        </div>

        {/* Waypoint + ETAs */}
        <div className={`${theme.panel} border ${theme.panelBorder} rounded-lg px-4 py-3`}>
          <div className="flex items-center justify-between">
            {/* Nome do waypoint */}
            <div>
              <div className={`text-[10px] uppercase tracking-widest ${theme.fgFaint}`}>Waypoint</div>
              <div className={`text-2xl font-black ${theme.accent} cockpit-glow`}>{checkpoint.name}</div>
            </div>

            {/* ETA planejada e atualizada */}
            <div className="text-right space-y-1">
              <div className="flex items-center justify-end gap-3">
                <div>
                  <div className={`text-[10px] uppercase ${theme.fgFaint}`}>ETA plan.</div>
                  <div className={`text-lg font-bold num ${theme.fgMuted}`}>
                    {etaPlanned != null ? formatHHMM(etaPlanned) : "--:--"}
                  </div>
                </div>
                {etaLive != null && (
                  <div>
                    <div className={`text-[10px] uppercase ${theme.cyan}`}>ETA atual.</div>
                    <div className={`text-lg font-bold num ${theme.cyan}`}>
                      {formatHHMM(etaLive)}
                    </div>
                  </div>
                )}
              </div>
              {prevAta && (
                <div className={`text-[10px] num ${theme.fgFaint} text-right`}>
                  Checkpoint anterior: <span className={theme.fgMuted}>{prevAta}</span>
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Display do horário digitado */}
        <div className="text-center">
          <div className={`text-[10px] uppercase tracking-widest ${theme.fgFaint} mb-1`}>{fieldLabel ?? "ATA"} (UTC)</div>
          <div className={`text-4xl font-black num tracking-widest cockpit-glow transition-colors ${
            digits.length === 0 ? theme.fgFaint :
            valid ? theme.accent : theme.fgMuted
          }`}>
            {/* HH : MM : SS — renderiza dígito a dígito */}
            {[0,1,null,2,3,null,4,5].map((dIdx, i) => {
              if (dIdx === null) return <span key={`sep${i}`} className={`${theme.fgFaint} mx-0.5 text-3xl`}>:</span>;
              const ch = digits[dIdx];
              const ph = dIdx < 2 ? "H" : dIdx < 4 ? "M" : "S";
              return <span key={i} className={ch ? "" : "opacity-20"}>{ch || ph}</span>;
            })}
          </div>
          {/* Delta */}
          <div className={`text-sm font-bold num mt-1 h-5 ${deltaColor}`}>
            {deltaMin != null && absD > 0
              ? `${sign}${absD} min em relação à ETA`
              : deltaMin != null && absD === 0
              ? "No horário"
              : ""}
          </div>
        </div>

        {/* Teclado numérico */}
        <div className="space-y-2">
          {keys.map((row, ri) => (
            <div key={ri} className="grid grid-cols-3 gap-2">
              {row.map((n) => (
                <button
                  key={n}
                  onClick={() => pressDigit(n)}
                  className={`${theme.panel} border ${theme.panelBorder} rounded-xl py-4 text-2xl font-bold num ${theme.fg} active:scale-95 active:${theme.accentBg} active:${theme.accentBgFg} transition-all duration-150`}
                >
                  {n}
                </button>
              ))}
            </div>
          ))}
          {/* Última linha: CLR, 0, ⌫, Agora */}
          <div className="grid grid-cols-4 gap-2">
            <button
              onClick={() => setDigits("")}
              className={`${theme.panel} border ${theme.panelBorder} rounded-xl py-4 text-sm font-bold ${theme.fgMuted} active:scale-95 transition-transform duration-100`}
            >
              CLR
            </button>
            <button
              onClick={() => pressDigit(0)}
              className={`${theme.panel} border ${theme.panelBorder} rounded-xl py-4 text-2xl font-bold num ${theme.fg} active:scale-95 transition-transform duration-100`}
            >
              0
            </button>
            <button
              onClick={backspace}
              className={`${theme.panel} border ${theme.panelBorder} rounded-xl py-4 flex items-center justify-center ${theme.fgMuted} active:scale-95 transition-transform duration-100`}
            >
              <ChevronLeft className="w-6 h-6" />
            </button>
            <button
              onClick={useNow}
              className={`${theme.panel} border ${theme.accentBorder} rounded-xl py-4 text-sm font-bold ${theme.accent} flex items-center justify-center gap-1 active:scale-95 transition-transform duration-100`}
            >
              <Clock className="w-4 h-4" /> Agora
            </button>
          </div>
        </div>

        {/* Ações */}
        <div className="space-y-2 pt-1">
          {/* Confirmar — destaque máximo */}
          <button
            disabled={!valid}
            onClick={() => onSave(digitsToHHMMSS(digits))}
            className={`w-full ${theme.accentBg} disabled:opacity-40 ${theme.accentBgFg} rounded-xl py-4 font-bold text-lg active:scale-95 transition-transform duration-100`}
          >
            {confirmLabel ?? "Confirmar passagem"}
          </button>

          {/* Limpar — só aparece quando o ponto já foi marcado */}
          {checkpoint.ata && (
            <button
              onClick={onClear}
              className="w-full bg-red-900/40 border border-red-800 text-red-300 rounded-xl py-3 text-sm font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform duration-100"
            >
              <X className="w-4 h-4" /> {clearLabel ?? "Limpar passagem registrada"}
            </button>
          )}

          {/* Cancelar — sempre visível, discreto */}
          <button
            onClick={onClose}
            className={`w-full ${theme.panel} border ${theme.panelBorder} ${theme.fgMuted} rounded-xl py-3 text-sm font-bold active:scale-95 transition-transform duration-100`}
          >
            Cancelar
          </button>
        </div>

      </div>
    </div>
  );
}

// Render first page of a PDF file → { dataUrl, width, height }
async function renderPdfToImage(file, scale) {
  scale = scale || 4;
  if (!window.pdfjsLib) throw new Error('PDF.js not loaded');
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  var ab = await file.arrayBuffer();
  var pdf = await window.pdfjsLib.getDocument({ data: ab }).promise;
  var page = await pdf.getPage(1);
  // Cap longest side at 6000 px to balance quality vs memory
  var baseVp = page.getViewport({ scale: 1 });
  var longest = Math.max(baseVp.width, baseVp.height);
  var maxLong = 6000;
  var effectiveScale = Math.min(scale, maxLong / longest);
  var vp = page.getViewport({ scale: effectiveScale });
  var canvas = document.createElement('canvas');
  canvas.width  = Math.round(vp.width);
  canvas.height = Math.round(vp.height);
  var ctx = canvas.getContext('2d', { alpha: false });
  // White background — PDFs are usually white-on-something
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  await page.render({
    canvasContext: ctx,
    viewport: vp,
    intent: 'print', // higher-fidelity text/vector rendering
  }).promise;
  return { dataUrl: canvas.toDataURL('image/png'), width: canvas.width, height: canvas.height };
}

// Build the 3-point affine transform { a, b, c, d, tx, ty } so that
//   mx = a*u + c*v + tx
//   my = b*u + d*v + ty
// maps pdf pixel (u, v) to mercator (mx, my). Returns null if the points are
// (near-)collinear.
function affineFrom3Points(pdfPts, mercPts) {
  var u1=pdfPts[0][0],v1=pdfPts[0][1], u2=pdfPts[1][0],v2=pdfPts[1][1], u3=pdfPts[2][0],v3=pdfPts[2][1];
  var det = u1*(v2-v3) - v1*(u2-u3) + (u2*v3-u3*v2);
  if (Math.abs(det) < 0.5) return null;
  function sol(x1,x2,x3) {
    return [
      (x1*(v2-v3) - v1*(x2-x3) + (x2*v3-x3*v2)) / det,
      (u1*(x2-x3) - x1*(u2-u3) + (u2*x3-u3*x2)) / det,
      (u1*(v2*x3-v3*x2) - v1*(u2*x3-u3*x2) + x1*(u2*v3-u3*v2)) / det
    ];
  }
  var rx = sol(mercPts[0].x, mercPts[1].x, mercPts[2].x);
  var ry = sol(mercPts[0].y, mercPts[1].y, mercPts[2].y);
  return { a: rx[0], c: rx[1], tx: rx[2], b: ry[0], d: ry[1], ty: ry[2] };
}
// Inverse of a 2D affine transform; returns null when degenerate.
function invertAffine(t) {
  if (!t) return null;
  var det = t.a * t.d - t.b * t.c;
  if (Math.abs(det) < 1e-9) return null;
  return {
    a:  t.d / det, c: -t.c / det, tx: (t.c * t.ty - t.d * t.tx) / det,
    b: -t.b / det, d:  t.a / det, ty: (t.b * t.tx - t.a * t.ty) / det,
  };
}
function applyAffinePt(t, u, v) {
  return [t.a * u + t.c * v + t.tx, t.b * u + t.d * v + t.ty];
}

// Warp PDF image to Mercator-aligned canvas using 3-point affine transform.
// Returns { dataUrl, width, height, bounds } ready for L.imageOverlay.
async function computeWarpedImage(imgData, pdfPts, mapLeaflet) {
  var REF_ZOOM = 14;
  var ppts = pdfPts.pdfPts, mpts = pdfPts.mapPts;

  // Convert LatLng reference points to Mercator pixels at REF_ZOOM
  var mp = mpts.map(function(m) { return mapLeaflet.project(window.L.latLng(m[0], m[1]), REF_ZOOM); });

  // Solve affine: PDF pixel (u,v) → Mercator pixel (mx, my)
  var u1=ppts[0][0],v1=ppts[0][1], u2=ppts[1][0],v2=ppts[1][1], u3=ppts[2][0],v3=ppts[2][1];
  var det = u1*(v2-v3) - v1*(u2-u3) + (u2*v3-u3*v2);
  if (Math.abs(det) < 0.5) return null;
  function sol(x1,x2,x3) {
    return [
      (x1*(v2-v3) - v1*(x2-x3) + (x2*v3-x3*v2)) / det,
      (u1*(x2-x3) - x1*(u2-u3) + (u2*x3-u3*x2)) / det,
      (u1*(v2*x3-v3*x2) - v1*(u2*x3-u3*x2) + x1*(u2*v3-u3*v2)) / det
    ];
  }
  var rx=sol(mp[0].x,mp[1].x,mp[2].x); // [a,c,tx] for x
  var ry=sol(mp[0].y,mp[1].y,mp[2].y); // [b,d,ty] for y
  var a=rx[0],c=rx[1],tx=rx[2], b=ry[0],d=ry[1],ty=ry[2];

  // Bounding box of the 4 image corners in Mercator space
  var W=imgData.width, H=imgData.height;
  var xs=[a*0+c*0+tx, a*W+c*0+tx, a*0+c*H+tx, a*W+c*H+tx];
  var ys=[b*0+d*0+ty, b*W+d*0+ty, b*0+d*H+ty, b*W+d*H+ty];
  var minX=Math.min.apply(null,xs),maxX=Math.max.apply(null,xs);
  var minY=Math.min.apply(null,ys),maxY=Math.max.apply(null,ys);

  // Canvas size — cap at 8192px on longest side for high quality
  var cw=maxX-minX, ch=maxY-minY;
  var sc=Math.min(1, 8192/Math.max(cw,ch));
  cw=Math.max(1,Math.round(cw*sc)); ch=Math.max(1,Math.round(ch*sc));

  // Load image element then draw warped
  var img = await new Promise(function(res,rej){
    var i=new Image(); i.onload=function(){res(i);}; i.onerror=rej; i.src=imgData.dataUrl;
  });
  var cvs=document.createElement('canvas'); cvs.width=cw; cvs.height=ch;
  var ctx=cvs.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  // setTransform(a,b,c,d,e,f): maps drawing (u,v) → canvas (a*u+c*v+e, b*u+d*v+f)
  ctx.setTransform(a*sc, b*sc, c*sc, d*sc, (tx-minX)*sc, (ty-minY)*sc);
  ctx.drawImage(img, 0, 0);

  // Leaflet Mercator: Y increases downward; higher lat = smaller Y pixel
  var sw=mapLeaflet.unproject(window.L.point(minX,maxY),REF_ZOOM);
  var ne=mapLeaflet.unproject(window.L.point(maxX,minY),REF_ZOOM);

  return {
    dataUrl: cvs.toDataURL('image/png'),
    width: cw, height: ch,
    bounds: [[sw.lat, sw.lng], [ne.lat, ne.lng]]
  };
}

// Apply per-overlay translation + scale tweaks (from manual calibration) to a
// 2-corner LatLng bounds tuple. Rotation is NOT supported here — would require
// rewarping. Returns a new bounds array.
function applyOverlayCalibration(bounds, calibration) {
  if (!bounds || !calibration) return bounds;
  var dLat = Number(calibration.dLat || 0);
  var dLng = Number(calibration.dLng || 0);
  var sx = Number(calibration.scaleX != null ? calibration.scaleX : 1) || 1;
  var sy = Number(calibration.scaleY != null ? calibration.scaleY : 1) || 1;
  var sw = bounds[0], ne = bounds[1];
  if (!sw || !ne) return bounds;
  var swLat = sw[0], swLng = sw[1], neLat = ne[0], neLng = ne[1];
  var midLat = (swLat + neLat) / 2;
  var midLng = (swLng + neLng) / 2;
  var halfH = (neLat - swLat) / 2;
  var halfW = (neLng - swLng) / 2;
  return [
    [midLat - halfH * sy + dLat, midLng - halfW * sx + dLng],
    [midLat + halfH * sy + dLat, midLng + halfW * sx + dLng],
  ];
}

// Re-renders the original PDF and warps it with a brand-new pair of control
// point arrays. Returns { dataUrl, width, height, bounds } ready to splat into
// the overlay record, or null when the handle isn't available / permission was
// denied. Used by the calibration flow to fix a chart whose georef drifted.
async function rewarpOverlayFromHandle(overlayId, pdfPts, mapPts, mapLeaflet, opts) {
  if (!overlayId || !pdfPts || !mapPts || !mapLeaflet || !window.pdfjsLib) return null;
  if (pdfPts.length < 3 || mapPts.length < 3) return null;
  var rec = await getPdfOverlayIdb(overlayId);
  if (!rec || !rec.handle) return null;
  var handle = rec.handle;
  try {
    var perm = await handle.queryPermission({ mode: 'read' });
    if (perm !== 'granted') perm = await handle.requestPermission({ mode: 'read' });
    if (perm !== 'granted') return null;
    var file = await handle.getFile();
    var scale = (opts && opts.scale) || 4;
    var imgData = await renderPdfToImage(file, scale);
    var warped = await computeWarpedImage(imgData, { pdfPts: pdfPts, mapPts: mapPts }, mapLeaflet);
    if (!warped) return null;
    return {
      dataUrl: warped.dataUrl,
      width: warped.width,
      height: warped.height,
      bounds: warped.bounds,
    };
  } catch (_) { return null; }
}

// Same as rewarpOverlayFromHandle but takes a File object directly. Used as a
// fallback when the saved handle is missing / permission was revoked / the
// browser never supported the File System Access API in the first place.
async function rewarpOverlayFromFile(file, pdfPts, mapPts, mapLeaflet, opts) {
  if (!file || !pdfPts || !mapPts || !mapLeaflet || !window.pdfjsLib) return null;
  if (pdfPts.length < 3 || mapPts.length < 3) return null;
  try {
    var scale = (opts && opts.scale) || 4;
    var imgData = await renderPdfToImage(file, scale);
    var warped = await computeWarpedImage(imgData, { pdfPts: pdfPts, mapPts: mapPts }, mapLeaflet);
    if (!warped) return null;
    return {
      dataUrl: warped.dataUrl,
      width: warped.width,
      height: warped.height,
      bounds: warped.bounds,
    };
  } catch (_) { return null; }
}

// Opens the OS file picker for a single PDF. Returns { file, handle? } or null
// when the user cancels. handle is populated when the browser supports the File
// System Access API so we can re-render later without re-prompting.
async function pickPdfFile() {
  if (window.showOpenFilePicker) {
    try {
      var picks = await window.showOpenFilePicker({
        types: [{ description: 'PDF', accept: { 'application/pdf': ['.pdf'] } }],
        multiple: false,
      });
      var handle = picks[0];
      var file = await handle.getFile();
      return { file: file, handle: handle };
    } catch (_) { return null; }
  }
  return new Promise(function(resolve) {
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/pdf,.pdf';
    input.style.display = 'none';
    input.onchange = function() {
      var f = input.files && input.files[0];
      input.remove();
      resolve(f ? { file: f, handle: null } : null);
    };
    input.oncancel = function() { input.remove(); resolve(null); };
    document.body.appendChild(input);
    input.click();
  });
}

// Re-renders the original PDF for a given overlay at a higher scale, warps with
// the stored 3 control points, and returns the resulting hi-res dataUrl. The
// caller pushes it into state + IDB. Returns null if the file handle is missing
// or permission was denied.
async function renderPdfHiRes(overlay, mapLeaflet, opts) {
  if (!overlay || !overlay.id || !mapLeaflet || !window.pdfjsLib) return null;
  if (!overlay.pdfPts || !overlay.mapPts) return null;
  var rec = await getPdfOverlayIdb(overlay.id);
  if (!rec || !rec.handle) return null;
  var handle = rec.handle;
  try {
    var perm = await handle.queryPermission({ mode: 'read' });
    if (perm !== 'granted') perm = await handle.requestPermission({ mode: 'read' });
    if (perm !== 'granted') return null;
    var file = await handle.getFile();
    var scale = (opts && opts.scale) || 5;
    var imgData = await renderPdfToImage(file, scale);
    var warped = await computeWarpedImage(imgData, { pdfPts: overlay.pdfPts, mapPts: overlay.mapPts }, mapLeaflet);
    return warped ? warped.dataUrl : null;
  } catch (e) { return null; }
}
