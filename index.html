// Web Audio — AudioContext é singleton; precisa de gesto do utilizador para inicializar
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return _audioCtx;
}
function warmUpAudio() {
  const ctx = getAudioCtx();
  if (ctx && ctx.state === 'suspended') ctx.resume().catch(() => {});
}
// type: "waypoint" (regular fix) | "virtual" (TOC/TOD/BOD)
function playAlarm(type = "waypoint") {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const go = () => {
    // Regular waypoint: 3 beeps at 880 Hz
    // Virtual (TOC/TOD/BOD): 2 ascending beeps (880 → 1100 Hz) — shorter, lighter feel
    const beeps = type === "virtual"
      ? [{ delay: 0, freq: 880 }, { delay: 0.3, freq: 1100 }]
      : [{ delay: 0, freq: 880 }, { delay: 0.38, freq: 880 }, { delay: 0.76, freq: 880 }];
    beeps.forEach(({ delay, freq }) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ctx.currentTime + delay;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.45, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
      osc.start(t);
      osc.stop(t + 0.3);
    });
  };
  if (ctx.state === 'suspended') ctx.resume().then(go).catch(() => {});
  else go();
}

// ================= MATEMÁTICA =================
const toRad = (d) => (d * Math.PI) / 180;
const toDeg = (r) => (r * 180) / Math.PI;

// ── Great-circle navigation ─────────────────────────────────────────────────
function gcDist(lat1, lon1, lat2, lon2) {
  var R = 3440.065;
  var r1 = toRad(lat1), r2 = toRad(lat2);
  var dr = toRad(lat2 - lat1), dl = toRad(lon2 - lon1);
  var sinDr = Math.sin(dr/2), sinDl = Math.sin(dl/2);
  var a = sinDr*sinDr + Math.cos(r1)*Math.cos(r2)*sinDl*sinDl;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function gcTC(lat1, lon1, lat2, lon2) {
  var r1 = toRad(lat1), r2 = toRad(lat2), dl = toRad(lon2 - lon1);
  var y = Math.sin(dl) * Math.cos(r2);
  var x = Math.cos(r1)*Math.sin(r2) - Math.sin(r1)*Math.cos(r2)*Math.cos(dl);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}
function gcInterpolate(lat1, lon1, lat2, lon2, frac) {
  return [lat1 + (lat2 - lat1) * frac, lon1 + (lon2 - lon1) * frac];
}
function projectDest(lat, lon, tc, distNM) {
  // Great circle: given start point, true course, distance → destination
  var d = distNM / 3440.065;
  var tcR = toRad(tc), lat1 = toRad(lat), lon1 = toRad(lon);
  var lat2 = Math.asin(Math.sin(lat1)*Math.cos(d) + Math.cos(lat1)*Math.sin(d)*Math.cos(tcR));
  var lon2 = lon1 + Math.atan2(Math.sin(tcR)*Math.sin(d)*Math.cos(lat1), Math.cos(d)-Math.sin(lat1)*Math.sin(lat2));
  return [toDeg(lat2), ((toDeg(lon2) + 540) % 360) - 180];
}
function projectSource(lat2, lon2, tc, distNM) {
  // Reverse: given destination, course from source, distance → source
  var reverseTc = (tc + 180) % 360;
  return projectDest(lat2, lon2, reverseTc, distNM);
}

// Great-circle intersection of two true-course rays from two anchor points.
// Returns [lat, lon] or null when the rays don't meet (parallel / divergent).
// Aviation Formulary V1.46 — "Intersection of two radials".
function gcIntersection(lat1, lon1, brg1, lat2, lon2, brg2) {
  var phi1 = toRad(lat1), lam1 = toRad(lon1);
  var phi2 = toRad(lat2), lam2 = toRad(lon2);
  var t13 = toRad(brg1), t23 = toRad(brg2);
  var dphi = phi2 - phi1, dlam = lam2 - lam1;
  var d12 = 2 * Math.asin(Math.sqrt(
    Math.sin(dphi/2) * Math.sin(dphi/2) +
    Math.cos(phi1) * Math.cos(phi2) * Math.sin(dlam/2) * Math.sin(dlam/2)
  ));
  if (Math.abs(d12) < 1e-12) return null;
  var cosTa = (Math.sin(phi2) - Math.sin(phi1)*Math.cos(d12)) / (Math.sin(d12) * Math.cos(phi1));
  var cosTb = (Math.sin(phi1) - Math.sin(phi2)*Math.cos(d12)) / (Math.sin(d12) * Math.cos(phi2));
  cosTa = Math.min(Math.max(cosTa, -1), 1);
  cosTb = Math.min(Math.max(cosTb, -1), 1);
  var ta = Math.acos(cosTa);
  var tb = Math.acos(cosTb);
  var t12 = Math.sin(lam2 - lam1) > 0 ? ta : (2 * Math.PI - ta);
  var t21 = Math.sin(lam2 - lam1) > 0 ? (2 * Math.PI - tb) : tb;
  var a1 = t13 - t12;
  var a2 = t21 - t23;
  if (Math.sin(a1) === 0 && Math.sin(a2) === 0) return null; // infinite solutions
  if (Math.sin(a1) * Math.sin(a2) < 0) return null;          // ambiguous / divergent
  var a3 = Math.acos(-Math.cos(a1) * Math.cos(a2) + Math.sin(a1) * Math.sin(a2) * Math.cos(d12));
  var d13 = Math.atan2(Math.sin(d12) * Math.sin(a1) * Math.sin(a2), Math.cos(a2) + Math.cos(a1) * Math.cos(a3));
  var phi3 = Math.asin(Math.sin(phi1) * Math.cos(d13) + Math.cos(phi1) * Math.sin(d13) * Math.cos(t13));
  var dlam13 = Math.atan2(Math.sin(t13) * Math.sin(d13) * Math.cos(phi1), Math.cos(d13) - Math.sin(phi1) * Math.sin(phi3));
  var lam3 = lam1 + dlam13;
  return [toDeg(phi3), ((toDeg(lam3) + 540) % 360) - 180];
}

// Best-effort coord parser. Accepts:
//   "38.7169 -9.1395"  /  "38.7169, -9.1395"          (decimal degrees)
//   "3843.01N 00908.37W" / "3843.01N00908.37W"         (DDMm.mm)
//   "38°43.01'N 9°08.37'W"                              (DDM with symbols)
//   "38°43'01\"N 9°08'22\"W"                            (DMS with symbols)
function parseCoordsString(text) {
  if (!text) return null;
  var s = String(text).trim();
  // Decimal: "lat[,/space]lon"
  var dd = s.match(/^([+-]?\d+(?:\.\d+)?)\s*[,;\s]\s*([+-]?\d+(?:\.\d+)?)$/);
  if (dd) {
    var lat = parseFloat(dd[1]), lon = parseFloat(dd[2]);
    if (isFinite(lat) && isFinite(lon) && Math.abs(lat) <= 90 && Math.abs(lon) <= 180) return [lat, lon];
  }
  // DDM with symbols: "38°43.01'N 9°08.37'W" (also accepts decimal in seconds slot for DMS)
  var ddmSym = s.match(/(\d+)\s*°\s*(\d+(?:\.\d+)?)\s*['′]?\s*([NSns])\s*[,;\s]\s*(\d+)\s*°\s*(\d+(?:\.\d+)?)\s*['′]?\s*([EWew])/);
  if (ddmSym) {
    var la = parseInt(ddmSym[1], 10) + parseFloat(ddmSym[2]) / 60;
    var lo = parseInt(ddmSym[4], 10) + parseFloat(ddmSym[5]) / 60;
    if (ddmSym[3].toUpperCase() === "S") la = -la;
    if (ddmSym[6].toUpperCase() === "W") lo = -lo;
    if (Math.abs(la) <= 90 && Math.abs(lo) <= 180) return [la, lo];
  }
  // DMS with symbols: "38°43'01\"N 9°08'22\"W"
  var dmsSym = s.match(/(\d+)\s*°\s*(\d+)\s*['′]\s*(\d+(?:\.\d+)?)\s*["″]?\s*([NSns])\s*[,;\s]\s*(\d+)\s*°\s*(\d+)\s*['′]\s*(\d+(?:\.\d+)?)\s*["″]?\s*([EWew])/);
  if (dmsSym) {
    var la2 = parseInt(dmsSym[1], 10) + parseInt(dmsSym[2], 10) / 60 + parseFloat(dmsSym[3]) / 3600;
    var lo2 = parseInt(dmsSym[5], 10) + parseInt(dmsSym[6], 10) / 60 + parseFloat(dmsSym[7]) / 3600;
    if (dmsSym[4].toUpperCase() === "S") la2 = -la2;
    if (dmsSym[8].toUpperCase() === "W") lo2 = -lo2;
    if (Math.abs(la2) <= 90 && Math.abs(lo2) <= 180) return [la2, lo2];
  }
  // Compact DDMm.mm: "3843.01N 00908.37W"
  var compact = s.match(/(\d{2,4})(\d\d(?:\.\d+)?)\s*([NSns])\s*[,;\s]?\s*(\d{3,5})(\d\d(?:\.\d+)?)\s*([EWew])/);
  if (compact) {
    var la3 = parseInt(compact[1], 10) + parseFloat(compact[2]) / 60;
    var lo3 = parseInt(compact[4], 10) + parseFloat(compact[5]) / 60;
    if (compact[3].toUpperCase() === "S") la3 = -la3;
    if (compact[6].toUpperCase() === "W") lo3 = -lo3;
    if (Math.abs(la3) <= 90 && Math.abs(lo3) <= 180) return [la3, lo3];
  }
  return null;
}

// Magnetic declination from NOAA WMM — returns degrees (E positive, W negative).
// Returns null when library not loaded or coords missing → caller uses flight.variation.
function getDecl(lat, lon, altFt) {
  try {
    if (window._geomagnetism != null && lat != null && lon != null) {
      var altKm = (altFt ?? 0) / 3280.84;
      var result = window._geomagnetism.model().point([lat, lon, altKm]);
      return result.decl ?? 0;
    }
  } catch(e) {}
  return null;
}

// Decimal degrees → DDM string "DD°MM.MMM'N"
function decDegToStr(dd, isLat) {
  const hem = isLat ? (dd >= 0 ? 'N' : 'S') : (dd >= 0 ? 'E' : 'W');
  const abs = Math.abs(dd);
  const deg = Math.floor(abs);
  const min = ((abs - deg) * 60).toFixed(3);
  const degStr = isLat ? String(deg).padStart(2,'0') : String(deg).padStart(3,'0');
  return `${degStr}°${min}'${hem}`;
}
function formatCoord(lat, lon) {
  if (lat == null || lon == null) return null;
  return `${decDegToStr(lat, true)} ${decDegToStr(lon, false)}`;
}
// Parse DDM digit array → decimal degrees
// latDigits: 6 digits [D,D,M,M,m,m] → DD°MM.mm'
// lonDigits: 7 digits [D,D,D,M,M,m,m] → DDD°MM.mm'
function ddmDigitsToDecDeg(digits, isLon, hem) {
  const dc = isLon ? 3 : 2;
  const deg = parseInt(digits.slice(0, dc).join('') || '0');
  const minInt = parseInt((digits[dc] ?? '0').toString() + (digits[dc+1] ?? '0').toString());
  const minDec = parseInt((digits[dc+2] ?? '0').toString() + (digits[dc+3] ?? '0').toString());
  const min = minInt + minDec / 100;
  if (min >= 60 || (isLon ? deg > 179 : deg > 89)) return null;
  const val = deg + min / 60;
  return (hem === 'S' || hem === 'W') ? -val : val;
}

const mod360 = (x) => ((x % 360) + 360) % 360;

function calcLeg(tc, dist, tas, windDir, windVel, variation, dev) {
  const mc = mod360((tc || 0) - variation); // Magnetic Course (no wind)
  if (!tas || tas <= 0) return { wca: 0, th: tc || 0, mc, mh: mc, ch: mc, gs: 0, ete: 0 };
  const sinWCA = (windVel * Math.sin(toRad(windDir - tc))) / tas;
  const wcaRad = Math.asin(Math.max(-1, Math.min(1, sinWCA)));
  const wca = toDeg(wcaRad);
  const th = mod360(tc + wca);
  const mh = mod360(th - variation); // Magnetic Heading (with wind correction)
  const ch = mod360(mh + dev);
  const gs = Math.max(1, tas * Math.cos(wcaRad) - windVel * Math.cos(toRad(windDir - tc)));
  const ete = dist > 0 && gs > 0 ? (dist / gs) * 60 : 0;
  return { wca, th, mc, mh, ch, gs, ete };
}

// TAS corrigida pela altitude e desvio ISA (aproximação GA)
function correctTAS(baseTAS, altFt, isaDevC) {
  const altFactor = 1 + 0.02 * (altFt / 1000);
  const isaFactor = 1 + (isaDevC || 0) * 0.002;
  return Math.round(baseTAS * altFactor * isaFactor);
}

// Validação semântica de uma perna
function validateLeg(cp, result) {
  const w = [];
  if (cp.tc != null && (cp.tc < 0 || cp.tc > 359)) w.push("TC inválido (0–359°)");
  if (cp.dist != null && cp.dist <= 0) w.push("Distância deve ser > 0 NM");
  if (result && result.gs < 30) w.push("GS muito baixo — checar vento/TAS");
  if (result && result.gs > 500) w.push("GS muito alto — checar dados");
  if (result && result.ete > 300) w.push("ETE > 5 h — checar distância");
  return w;
}

// Compute phase portions for a leg given altitude at prev fix → this fix
// wDir/wVel/variation are wind params needed to compute wind-corrected GS per phase.
// Returns { portions: [{phase, dist, tas, gph, timeMin}], avgTas }
// timeMin: actual flight time for that phase (climb/descent time is fixed by alt/ROC;
//          cruise time derived from remaining dist / wind-corrected GS)
// dist:    horizontal distance covered during that phase (climb/descent = GS × timeMin/60)
function computeLegPhases(prevAlt, thisAlt, dist, cp, ac, isaDevC, wDir, wVel, variation) {
  const tc = cp.tc ?? 0;
  const wd = wDir ?? 0, wv = wVel ?? 0, va = variation ?? 0;

  const tasCr0 = cp.tasCruiseOvr ?? correctTAS(ac.tasCruise, thisAlt ?? 0, isaDevC);
  const gphCr0 = cp.gphCruiseOvr ?? ac.gphCruise;
  // Helper: wind-corrected GS for a given TAS
  function gs(tas) { return Math.max(1, calcLeg(tc, 1, tas, wd, wv, va, 0).gs); }

  if (!dist || dist <= 0) {
    const tMin = 0;
    return { portions: [{ phase: "CRUZEIRO", dist: 0, tas: tasCr0, gph: gphCr0, timeMin: tMin }], avgTas: tasCr0 };
  }

  const pAlt = prevAlt ?? 0;
  const tAlt = thisAlt ?? pAlt;
  const altDiff = tAlt - pAlt;
  const cruiseAlt = Math.max(pAlt, tAlt);

  const tasClimb   = cp.tasClimbOvr   ?? correctTAS(ac.vy,        (pAlt + cruiseAlt) / 2, isaDevC);
  const tasCruise  = cp.tasCruiseOvr  ?? correctTAS(ac.tasCruise,  cruiseAlt,             isaDevC);
  const tasDescent = cp.tasDescentOvr ?? correctTAS(ac.vDescent,  (pAlt + tAlt) / 2,     isaDevC);

  const gphC = cp.gphClimbOvr   ?? ac.gphClimb;
  const gphR = cp.gphCruiseOvr  ?? ac.gphCruise;
  const gphD = cp.gphDescentOvr ?? ac.gphDescent;

  const gsClimb   = gs(tasClimb);
  const gsCruise  = gs(tasCruise);
  const gsDescent = gs(tasDescent);

  let portions;
  const roc = ac.rocClimb   || 500;
  const rod = ac.rodDescent || 500;

  if (altDiff > 50) { // climbing
    // Climb time fixed by physics: altitude gain / climb rate
    const climbTimeMin = altDiff / roc;
    // Actual horizontal distance covered while climbing (wind-corrected)
    const climbDist = gsClimb * climbTimeMin / 60;
    const mode = cp.arrivalMode ?? "asap"; // default: start climbing right away

    if (climbDist >= dist - 0.1) {
      // Whole leg is climbing — may not complete the climb but that's OK
      const t = dist / gsClimb * 60;
      portions = [{ phase: "SUBIDA", dist, tas: tasClimb, gph: gphC, timeMin: t }];
    } else if (mode === "asap") {
      const cruiseDist = dist - climbDist;
      const cruiseTime = cruiseDist / gsCruise * 60;
      portions = [
        { phase: "SUBIDA",   dist: climbDist,  tas: tasClimb,  gph: gphC, timeMin: climbTimeMin },
        { phase: "CRUZEIRO", dist: cruiseDist, tas: tasCruise, gph: gphR, timeMin: cruiseTime   },
      ];
    } else if (mode === "at_fix") {
      // Late climb: cruise first, TOC at the fix
      const cruiseDist = dist - climbDist;
      const cruiseTime = cruiseDist / gsCruise * 60;
      portions = [
        { phase: "CRUZEIRO", dist: cruiseDist, tas: tasCruise, gph: gphR, timeMin: cruiseTime   },
        { phase: "SUBIDA",   dist: climbDist,  tas: tasClimb,  gph: gphC, timeMin: climbTimeMin },
      ];
    } else {
      // before_nm / before_min: cruise → climb → cruise(buffer)
      const wantBefore = mode === "before_nm"
        ? (cp.arrivalValue ?? 5)
        : (cp.arrivalValue ?? 5) * gsCruise / 60;
      // Best-effort: shrink the buffer if the leg can't fit the full request.
      const safeBefore = Math.max(0, Math.min(wantBefore, dist - climbDist));
      const cruiseFirst = Math.max(0, dist - climbDist - safeBefore);
      // Always emit the 3-portion structure so BOC is recorded; either side may
      // collapse to dist=0 / time=0 when the leg is too short to honour the full intent.
      portions = [
        { phase: "CRUZEIRO", dist: cruiseFirst, tas: tasCruise, gph: gphR, timeMin: cruiseFirst > 0 ? cruiseFirst / gsCruise * 60 : 0 },
        { phase: "SUBIDA",   dist: climbDist,   tas: tasClimb,  gph: gphC, timeMin: climbTimeMin },
        { phase: "CRUZEIRO", dist: safeBefore,  tas: tasCruise, gph: gphR, timeMin: safeBefore > 0 ? safeBefore / gsCruise * 60 : 0 },
      ];
    }
  } else if (altDiff < -50) { // descending
    // Descent time fixed by physics: altitude loss / descent rate
    const descentTimeMin = -altDiff / rod;
    const tasCruiseLow = correctTAS(ac.tasCruise, tAlt, isaDevC);
    const gsCruiseLow = gs(tasCruiseLow);
    const descDist = gsDescent * descentTimeMin / 60;
    const mode = cp.arrivalMode ?? "at_fix"; // default: arrive at altitude right at the fix

    if (descDist >= dist - 0.1) {
      const t = dist / gsDescent * 60;
      portions = [{ phase: "DESCIDA", dist, tas: tasDescent, gph: gphD, timeMin: t }];
    } else if (mode === "at_fix") {
      const cruiseDist = dist - descDist;
      const cruiseTime = cruiseDist / gsCruise * 60;
      portions = [
        { phase: "CRUZEIRO", dist: cruiseDist, tas: tasCruise,  gph: gphR, timeMin: cruiseTime    },
        { phase: "DESCIDA",  dist: descDist,   tas: tasDescent, gph: gphD, timeMin: descentTimeMin },
      ];
    } else if (mode === "asap") {
      const cruiseDist = dist - descDist;
      const cruiseTime = cruiseDist / gsCruiseLow * 60;
      portions = [
        { phase: "DESCIDA",  dist: descDist,   tas: tasDescent,   gph: gphD, timeMin: descentTimeMin },
        { phase: "CRUZEIRO", dist: cruiseDist, tas: tasCruiseLow, gph: gphR, timeMin: cruiseTime     },
      ];
    } else {
      // before_nm / before_min: cruise → descent → cruise(buffer)
      const wantBefore = mode === "before_nm"
        ? (cp.arrivalValue ?? 5)
        : (cp.arrivalValue ?? 5) * gsCruiseLow / 60;
      const safeBefore = Math.max(0, Math.min(wantBefore, dist - descDist));
      const cruiseFirst = Math.max(0, dist - descDist - safeBefore);
      portions = [
        { phase: "CRUZEIRO", dist: cruiseFirst, tas: tasCruise,    gph: gphR, timeMin: cruiseFirst > 0 ? cruiseFirst / gsCruise * 60    : 0 },
        { phase: "DESCIDA",  dist: descDist,    tas: tasDescent,   gph: gphD, timeMin: descentTimeMin                 },
        { phase: "CRUZEIRO", dist: safeBefore,  tas: tasCruiseLow, gph: gphR, timeMin: safeBefore > 0 ? safeBefore / gsCruiseLow * 60 : 0 },
      ];
    }
  } else { // level
    const t = gsCruise > 0 ? dist / gsCruise * 60 : 0;
    portions = [{ phase: "CRUZEIRO", dist, tas: tasCruise, gph: gphR, timeMin: t }];
  }

  // Drop empty portions (e.g. before_* with cruiseFirst=0 or safeBefore=0 leave
  // a spurious 0-NM CRUZEIRO that would otherwise emit virtuals at the WP).
  portions = portions.filter(p => (p.dist ?? 0) > 0.001);
  if (portions.length === 0) {
    portions = [{ phase: "CRUZEIRO", dist: 0, tas: tasCr0, gph: gphCr0, timeMin: 0 }];
  }

  // avgTas: display TAS (cruise phase preferred)
  const totalTime = portions.reduce((s, p) => s + (p.timeMin ?? 0), 0);
  const totalD    = portions.reduce((s, p) => s + p.dist, 0);
  const avgTas = totalTime > 0 ? (totalD / totalTime) * 60 : tasCruise;

  return { portions, avgTas };
}

// resolveAltitudeProfile — assigns an effective altitude to every checkpoint.
// Waypoints with cp.alt == null && !cp.useCruiseAlt inherit altitude from the
// previous anchor; multi-leg climbs/descents distribute intermediate altitudes
// proportionally so computeLegPhases sees a smooth profile.
// Returns { profile: number[], altWarnings: (string|null)[], legPlans: { [legIdx]: portions[] } }
//
// legPlans contains pre-computed portions for each leg in a multi-anchor
// segment containing inherit WPs. The segment is treated as ONE continuous
// climb/descent profile (cruise → phase → buffer), and each leg receives only
// the slice of phases it actually overlaps. This produces a single TOD/BOD per
// profile instead of one per leg, no matter how many inherit WPs are crossed.
function resolveAltitudeProfile(cps, ac, flight) {
  var n = cps.length;
  var profile = new Array(n).fill(0);
  var altWarnings = new Array(n).fill(null);
  var legPlans = {};
  var cruiseAlt = flight.cruiseAlt ?? 7000;
  var variation = flight.variation ?? 0;
  var isaDev = flight.isaDevC || 0;

  // Anchor altitude: explicit value or useCruiseAlt; null means "inherit"
  var anchorAlt = new Array(n).fill(null);
  for (var ai = 0; ai < n; ai++) {
    var cpA = cps[ai];
    if (cpA.isOrigin) {
      anchorAlt[ai] = cpA.useCruiseAlt ? cruiseAlt : (cpA.alt ?? 0);
    } else if (cpA.useCruiseAlt) {
      anchorAlt[ai] = cruiseAlt;
    } else if (cpA.alt != null) {
      anchorAlt[ai] = cpA.alt;
    }
    // else anchorAlt[ai] stays null → inherit
  }

  // First anchor must exist (origin); fall back to 0
  profile[0] = anchorAlt[0] ?? 0;
  var lastAnchorIdx = 0;
  var lastAnchorAlt = profile[0];

  for (var si = 1; si < n; si++) {
    if (anchorAlt[si] == null) continue; // skip non-anchors; will fill after loop

    var segFromAlt = lastAnchorAlt;
    var segToAlt   = anchorAlt[si];
    profile[si]    = segToAlt;

    if (segFromAlt !== segToAlt) {
      // Compute total segment distance
      var totalSegDist = 0;
      for (var di = lastAnchorIdx + 1; di <= si; di++) totalSegDist += (cps[di].dist ?? 0);

      if (totalSegDist > 0) {
        var altDiff   = Math.abs(segToAlt - segFromAlt);
        var isClimb   = segToAlt > segFromAlt;
        // Use the destination WP to pick TAS / ROC for the segment
        var cpTo = cps[si];
        var wDir2 = cpTo.windMode === "none"   ? 0 :
                    cpTo.windMode === "custom"  ? (cpTo.windDir ?? 0) :
                    (flight.windDir ?? 0);
        var wVel2 = cpTo.windMode === "none"   ? 0 :
                    cpTo.windMode === "custom"  ? (cpTo.windVel ?? 0) :
                    (flight.windVel ?? 0);
        // Altitude-correct the climb/descent TAS using the segment's average
        // altitude — matches what computeLegPhases will use per leg, so the
        // resolver's phaseDist stays consistent with the sum of per-leg
        // descDist/climbDist (otherwise the trailing buffer ends up shorter
        // than the resolver allocated, causing spurious "perna curta" warnings).
        var avgSegAlt = (segFromAlt + segToAlt) / 2;
        var acTas2 = isClimb
          ? (cpTo.tasClimbOvr   ?? correctTAS(ac.vy ?? 100, avgSegAlt, flight.isaDevC || 0))
          : (cpTo.tasDescentOvr ?? correctTAS(ac.vDescent ?? 90, avgSegAlt, flight.isaDevC || 0));
        var acRoc2 = isClimb ? (ac.rocClimb ?? 500) : (ac.rodDescent ?? 500);
        var legRes2 = calcLeg(cpTo.tc ?? 0, 1, acTas2, wDir2, wVel2, variation, 0);
        var gsPhase2 = Math.max(1, legRes2.gs);
        var phaseDist = gsPhase2 * (altDiff / acRoc2) / 60;

        // Honour the destination anchor's arrivalMode/arrivalValue so the
        // resolver pushes the descent (or climb) earlier into prior legs when
        // the last leg alone can't fit "phase + buffer". This way an inherit
        // WP between two anchors gets an altitude consistent with the actual
        // planned phase distribution.
        var defaultMode = isClimb ? "asap" : "at_fix";
        var mode = cpTo.arrivalMode ?? defaultMode;
        var wantBefore = 0;
        if (mode === "before_nm") {
          wantBefore = cpTo.arrivalValue ?? 5;
        } else if (mode === "before_min") {
          // Buffer cruise sits AT segToAlt (after climb or after descent)
          var tasLevel = correctTAS(ac.tasCruise, segToAlt, flight.isaDevC || 0);
          var gsLevel = Math.max(1, calcLeg(cpTo.tc ?? 0, 1, tasLevel, wDir2, wVel2, variation, 0).gs);
          wantBefore = (cpTo.arrivalValue ?? 5) * gsLevel / 60;
        }
        // Clamp the buffer if the segment can't fit the whole intent.
        var safePhase  = Math.min(phaseDist, totalSegDist);
        var safeBefore = Math.max(0, Math.min(wantBefore, totalSegDist - safePhase));
        var cruiseFirst;
        if (mode === "asap")        cruiseFirst = 0;
        else if (mode === "at_fix") cruiseFirst = Math.max(0, totalSegDist - safePhase);
        else /* before_* */          cruiseFirst = Math.max(0, totalSegDist - safePhase - safeBefore);
        var phaseEnd = cruiseFirst + safePhase;

        if (phaseDist > totalSegDist) {
          var verb = isClimb ? 'Subir' : 'Descer';
          var phaseLabel0 = isClimb ? 'subida' : 'descida';
          var deficitNM = (phaseDist - totalSegDist).toFixed(1);
          var bufferNote = (mode === 'before_min' || mode === 'before_nm')
            ? (' + buffer ' + (cpTo.arrivalValue ?? 5) + (mode === 'before_min' ? ' min' : ' NM'))
            : '';
          altWarnings[si] = verb + ' para ' + segToAlt + ' ft em ' + totalSegDist.toFixed(1) +
            ' NM impossível: ' + phaseLabel0 + ' precisa ' + phaseDist.toFixed(1) + ' NM' + bufferNote +
            ' (faltam ' + deficitNM + ' NM). Marque WPs intermédios como "Herdar" para distribuir o perfil.';
        } else if (mode !== 'asap' && mode !== 'at_fix' && safeBefore < wantBefore - 0.1) {
          // Phase fits but the requested buffer was clamped — surface that too.
          altWarnings[si] = 'Buffer reduzido para ' + safeBefore.toFixed(1) + ' NM (pediu ' +
            wantBefore.toFixed(1) + ' NM): perna não comporta ' + (isClimb ? 'subida' : 'descida') +
            ' + nivelamento completo.';
        }

        // Assign intermediate altitudes AND build per-leg portions by slicing
        // the segment regions:
        //   A: [0, cruiseFirst]               — CRUZEIRO at segFromAlt
        //   B: [cruiseFirst, phaseEnd]        — phase (CLIMB or DESCEND)
        //   C: [phaseEnd, totalSegDist]       — CRUZEIRO at segToAlt (buffer)
        // Each leg gets portions = its overlap with each region. Continuous
        // descent/climb across inherit WPs ⇒ middle legs are single-phase.
        if (si > lastAnchorIdx + 1) {
          var distFromSeg = 0;
          for (var ij = lastAnchorIdx + 1; ij < si; ij++) {
            distFromSeg += (cps[ij].dist ?? 0);
            if (distFromSeg <= cruiseFirst + 0.001) {
              profile[ij] = segFromAlt;
            } else if (distFromSeg >= phaseEnd - 0.001) {
              profile[ij] = segToAlt;
            } else {
              var phaseFrac = safePhase > 0 ? (distFromSeg - cruiseFirst) / safePhase : 0;
              profile[ij] = Math.round(segFromAlt + phaseFrac * (segToAlt - segFromAlt));
            }
          }

          // Pre-compute speeds/fuels for each region (uses the segment's wind
          // and the destination anchor's overrides — a known simplification but
          // consistent with the resolver's altDiff/phaseDist math above).
          var tasCruiseHigh = correctTAS(ac.tasCruise, segFromAlt, isaDev);
          var tasCruiseLowR = correctTAS(ac.tasCruise, segToAlt, isaDev);
          var phaseTas = correctTAS(acTas2, (segFromAlt + segToAlt) / 2, isaDev);
          var gsCruiseHigh = Math.max(1, calcLeg(cpTo.tc ?? 0, 1, tasCruiseHigh, wDir2, wVel2, variation, 0).gs);
          var gsCruiseLowR = Math.max(1, calcLeg(cpTo.tc ?? 0, 1, tasCruiseLowR, wDir2, wVel2, variation, 0).gs);
          var gsPhaseR = Math.max(1, calcLeg(cpTo.tc ?? 0, 1, phaseTas, wDir2, wVel2, variation, 0).gs);
          var gphCruiseR = ac.gphCruise || 12;
          var gphPhaseR = isClimb ? (ac.gphClimb || gphCruiseR) : (ac.gphDescent || gphCruiseR);
          var phaseLabel = isClimb ? "SUBIDA" : "DESCIDA";

          var runDist = 0;
          for (var lk = lastAnchorIdx + 1; lk <= si; lk++) {
            var legD = cps[lk].dist || 0;
            var lStart = runDist;
            var lEnd = runDist + legD;
            runDist = lEnd;
            var lp = [];
            // Region A overlap (cruise high)
            var aD = Math.max(0, Math.min(lEnd, cruiseFirst) - lStart);
            if (aD > 0.001) lp.push({
              phase: "CRUZEIRO", dist: aD,
              tas: tasCruiseHigh, gph: gphCruiseR,
              timeMin: aD / gsCruiseHigh * 60,
            });
            // Region B overlap (phase)
            var bD = Math.max(0, Math.min(lEnd, phaseEnd) - Math.max(lStart, cruiseFirst));
            if (bD > 0.001) lp.push({
              phase: phaseLabel, dist: bD,
              tas: phaseTas, gph: gphPhaseR,
              timeMin: bD / gsPhaseR * 60,
            });
            // Region C overlap (buffer cruise low)
            var cD = Math.max(0, lEnd - Math.max(lStart, phaseEnd));
            if (cD > 0.001) lp.push({
              phase: "CRUZEIRO", dist: cD,
              tas: tasCruiseLowR, gph: gphCruiseR,
              timeMin: cD / gsCruiseLowR * 60,
            });
            if (lp.length === 0) lp.push({
              phase: "CRUZEIRO", dist: 0, tas: tasCruiseLowR, gph: gphCruiseR, timeMin: 0,
            });
            legPlans[lk] = lp;
          }
        }
      } else {
        // Zero-distance segment — just fill at previous altitude
        for (var fj = lastAnchorIdx + 1; fj < si; fj++) profile[fj] = segFromAlt;
      }
    } else {
      // Level segment — fill intermediates at same altitude
      for (var lj = lastAnchorIdx + 1; lj < si; lj++) profile[lj] = segFromAlt;
    }

    lastAnchorIdx = si;
    lastAnchorAlt = segToAlt;
  }

  // Trailing waypoints after the last anchor inherit its altitude
  for (var ri = lastAnchorIdx + 1; ri < n; ri++) profile[ri] = lastAnchorAlt;

  return { profile: profile, altWarnings: altWarnings, legPlans: legPlans };
}

// Derive TOC/TOD/BOC/BOD annotation string from a computed checkpoint's portions
// Returns null if single-phase, e.g. "BOC +5nm · TOC +20nm"
function tocTodLabel(portions, dist) {
  if (!portions || portions.length <= 1) return null;
  const labels = [];
  let acc = 0;
  for (let i = 0; i < portions.length - 1; i++) {
    acc += portions[i].dist;
    const cur = portions[i].phase;
    const nxt = portions[i + 1].phase;
    if (cur !== "SUBIDA" && nxt === "SUBIDA") labels.push(`BOC +${acc.toFixed(0)}nm`);
    if (cur === "SUBIDA" && nxt !== "SUBIDA") labels.push(`TOC +${acc.toFixed(0)}nm`);
    if (cur !== "DESCIDA" && nxt === "DESCIDA") labels.push(`TOD +${acc.toFixed(0)}nm`);
    if (cur === "DESCIDA" && nxt !== "DESCIDA") labels.push(`BOD +${acc.toFixed(0)}nm`);
  }
  return labels.length > 0 ? labels.join(" · ") : null;
}


// Per-phase ETE breakdown label, e.g. "↗5 →12 ↘3 min"
// Returns null for single-phase legs
function phaseETELabel(portions, totalETE) {
  if (!portions || portions.length <= 1 || !totalETE) return null;
  const totalDist = portions.reduce((s, p) => s + p.dist, 0);
  if (totalDist <= 0) return null;
  const icon = { SUBIDA: "↗", DESCIDA: "↘", CRUZEIRO: "→" };
  return portions
    .map((p) => {
      const ete = Math.round((p.dist / totalDist) * totalETE);
      return ete > 0 ? `${icon[p.phase] || "→"}${ete}` : null;
    })
    .filter(Boolean)
    .join(" ") + " min";
}

// hh:mm:ss parser/formatter
// parseHHMM accepts "HH:MM" or "HH:MM:SS" → returns fractional minutes
function parseHHMM(s) {
  if (!s) return null;
  const parts = s.split(":").map(Number);
  if (parts.length < 2 || isNaN(parts[0]) || isNaN(parts[1])) return null;
  const sec = parts.length >= 3 && !isNaN(parts[2]) ? parts[2] : 0;
  return parts[0] * 60 + parts[1] + sec / 60;
}
// Display only: strips seconds → "HH:MM"
function formatHHMM(totalMin) {
  if (totalMin == null || !isFinite(totalMin)) return "--:--";
  const t = ((totalMin % 1440) + 1440) % 1440;
  const h = Math.floor(t / 60);
  const m = Math.floor(t % 60);
  return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
}
// Storage: full precision → "HH:MM:SS"
function formatHHMMSS(totalMin) {
  if (totalMin == null || !isFinite(totalMin)) return "--:--:--";
  const t = ((totalMin % 1440) + 1440) % 1440;
  const totalSec = Math.round(t * 60);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}
// Display helper: "HH:MM:SS" or "HH:MM" → "HH:MM" for Em Voo display
function displayTime(str) {
  if (!str) return null;
  return str.slice(0, 5);
}
// nowHHMM includes seconds for recording precision
function nowHHMM() {
  const d = new Date();
  return d.getUTCHours() * 60 + d.getUTCMinutes() + d.getUTCSeconds() / 60;
}

// ================= AIRAC.NET CLIENT =================
// Public AIRAC navigation database. CORS open, no auth, BunnyCDN in front.
// All responses include AIRAC cycle headers; the data is immutable per cycle
// (28 days), so we cache aggressively in localStorage.
const AIRAC_BASE = "https://airac.net/api/v1";
const AIRAC_LS_PREFIX = "airac_v1_";

function _airacCacheGet(key) {
  try {
    const raw = localStorage.getItem(AIRAC_LS_PREFIX + key);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (obj.expiresAt && obj.expiresAt < Date.now()) return null;
    return obj.data;
  } catch (_) { return null; }
}
function _airacCacheSet(key, data, ttlMs) {
  try {
    localStorage.setItem(AIRAC_LS_PREFIX + key, JSON.stringify({
      data,
      expiresAt: Date.now() + (ttlMs != null ? ttlMs : 14 * 86_400_000),
    }));
  } catch (_) {}
}

async function airacGetCurrent() {
  const cached = _airacCacheGet("current");
  if (cached) return cached;
  try {
    const r = await fetch(AIRAC_BASE + "/airac/current", { headers: { Accept: "application/json" } });
    if (!r.ok) return null;
    const j = await r.json();
    if (j.status !== "success" || !j.data) return null;
    const d = j.data;
    // Re-check at most once a day even if days_remaining is much larger.
    const ttl = Math.min(86_400_000, Math.max(60_000, ((d.days_remaining || 0) + 0.5) * 86_400_000));
    _airacCacheSet("current", d, ttl);
    return d;
  } catch (_) { return null; }
}

async function airacSearch(q, signal) {
  if (!q || q.length < 2) return null;
  try {
    const r = await fetch(AIRAC_BASE + "/search?q=" + encodeURIComponent(q), {
      headers: { Accept: "application/json" }, signal,
    });
    if (!r.ok) return null;
    const j = await r.json();
    return j.status === "success" ? j.data : null;
  } catch (e) {
    if (e && e.name === "AbortError") throw e;
    return null;
  }
}

function _normalizeCoords(d) {
  // PHP-style float serialization leaves long binary tails on lat/lon — round to 6 dp.
  if (!d) return d;
  if (d.latitude  != null) d.latitude  = Math.round(Number(d.latitude)  * 1e6) / 1e6;
  if (d.longitude != null) d.longitude = Math.round(Number(d.longitude) * 1e6) / 1e6;
  if (d.coordinates) {
    if (d.coordinates.lat != null) d.coordinates.lat = Math.round(Number(d.coordinates.lat) * 1e6) / 1e6;
    if (d.coordinates.lon != null) d.coordinates.lon = Math.round(Number(d.coordinates.lon) * 1e6) / 1e6;
  }
  return d;
}

async function airacAirport(icao) {
  if (!icao) return null;
  const code = String(icao).toUpperCase().trim();
  if (!/^[A-Z0-9]{3,4}$/.test(code)) return null;
  const cached = _airacCacheGet("ap_" + code);
  if (cached) return cached;
  try {
    const r = await fetch(AIRAC_BASE + "/airports/" + code, { headers: { Accept: "application/json" } });
    if (!r.ok) return null;
    const j = await r.json();
    if (j.status !== "success" || !j.data) return null;
    const d = _normalizeCoords(j.data);
    _airacCacheSet("ap_" + code, d, 14 * 86_400_000);
    return d;
  } catch (_) { return null; }
}

async function airacProcedures(icao) {
  if (!icao) return null;
  const code = String(icao).toUpperCase().trim();
  if (!/^[A-Z0-9]{3,4}$/.test(code)) return null;
  const cached = _airacCacheGet("proc_" + code);
  if (cached) return cached;
  try {
    const r = await fetch(AIRAC_BASE + "/airports/" + code + "/procedures", { headers: { Accept: "application/json" } });
    if (!r.ok) return null;
    const j = await r.json();
    if (j.status !== "success" || !j.data) return null;
    _airacCacheSet("proc_" + code, j.data, 14 * 86_400_000);
    return j.data;
  } catch (_) { return null; }
}

async function airacProcedureDetail(airport, identifier) {
  if (!airport || !identifier) return null;
  const ap = String(airport).toUpperCase().trim();
  const id = String(identifier).toUpperCase().trim();
  const key = "procd_" + ap + "_" + id;
  const cached = _airacCacheGet(key);
  if (cached) return cached;
  try {
    const r = await fetch(AIRAC_BASE + "/procedures/" + ap + "/" + id, { headers: { Accept: "application/json" } });
    if (!r.ok) return null;
    const j = await r.json();
    if (j.status !== "success" || !j.data) return null;
    _airacCacheSet(key, j.data, 14 * 86_400_000);
    return j.data;
  } catch (_) { return null; }
}

// Build the ordered leg list for a chosen (procedure, transition).
// Resolves runway-transition (key "RW35B" → look up "35B") vs fix-transition (key as-is).
// Concatenation order:
//   APP        : transitionLegs + commonRoute  (you arrive via the IAF, then onto common path)
//   SID / STAR : commonRoute + transitionLegs  (you fly the body, then exit via the transition)
// Consecutive duplicate fix_identifier are collapsed (e.g. transition ends at USITO and
// the common_route also starts at USITO).
function pickProcedureLegs(detail, transitionName, typeCode) {
  if (!detail) return [];
  function bySeq(a, b) { return (a.sequence || 0) - (b.sequence || 0); }
  let transLegs = [];
  if (transitionName) {
    if (/^RW/i.test(transitionName)) {
      const rwy = transitionName.replace(/^RW/i, "");
      transLegs = (detail.runway_transitions && detail.runway_transitions[rwy]) || [];
    } else {
      transLegs = (detail.transitions && detail.transitions[transitionName]) || [];
    }
  }
  transLegs = (transLegs || []).slice().sort(bySeq);
  const commonLegs = (detail.common_route || []).slice().sort(bySeq);
  const combined = String(typeCode).toUpperCase() === "APP"
    ? transLegs.concat(commonLegs)
    : commonLegs.concat(transLegs);
  const out = [];
  for (const leg of combined) {
    const last = out[out.length - 1];
    if (last && last.fix_identifier && leg.fix_identifier && last.fix_identifier === leg.fix_identifier) continue;
    out.push(leg);
  }
  return out;
}

function legToCheckpoint(leg, source, typeCode) {
  if (!leg.fix_coordinates || leg.fix_coordinates.lat == null || leg.fix_coordinates.lon == null) return null;
  const lat = Math.round(Number(leg.fix_coordinates.lat) * 1e6) / 1e6;
  const lon = Math.round(Number(leg.fix_coordinates.lon) * 1e6) / 1e6;
  const cp = {
    name: String(leg.fix_identifier || leg.fix_name || "PT").slice(0, 10).toUpperCase(),
    lat: lat, lon: lon,
    ata: null, gsActual: null,
    source: Object.assign({}, source, { sequence: leg.sequence }),
  };
  if (leg.altitude_ft != null) {
    cp.alt = Number(leg.altitude_ft);
    cp.useCruiseAlt = false;
  }
  const isClimb = String(typeCode).toUpperCase() === "SID";
  if (leg.altitude_restriction === "at_or_above") {
    cp.arrivalMode = "asap";
  } else if (leg.altitude_restriction === "at_or_below") {
    cp.arrivalMode = "at_fix";
  } else if (leg.altitude_ft != null) {
    cp.arrivalMode = isClimb ? "asap" : "at_fix";
  }
  return cp;
}

// Synchronous localStorage read so initial state is correct on the first
// render — avoids the race where the auto-save effect overwrites the saved
// value with the in-memory default before the async load effect resolves.
function loadNavlogLS(key, fallback) {
  try {
    const r = localStorage.getItem("navlog_" + key);
    if (r != null) return JSON.parse(r);
  } catch {}
  return fallback;
}

  const [viewMode, setViewMode] = useState("leg");
  const [notesOpen, setNotesOpen] = useState(false);
  const [notesIdx, setNotesIdx] = useState(null);
  const [legTimerStart, setLegTimerStart] = useState(null); // timestamp em ms
  const [deviationOpen, setDeviationOpen] = useState(false);
  const [userPoints, setUserPoints] = useState([]);
  // Map center+zoom is preserved across tab switches (Leaflet otherwise
  // re-initialises and re-fits-bounds whenever the MapTab remounts).
  const [mapView, setMapView] = useState(null);

  // Load user points library from IndexedDB on mount
  useEffect(() => {

  async function addUserPoint(pt) {

  async function deleteUserPoint(id) {

  }

  // Auto-fill freqs/elev from AIRAC when an ICAO is entered for origin/destination/alternate.
  // Only fills if the matching freqs slot is empty (never overwrites user input). Refresh
  // button in FreqsSection lets the user re-fetch on demand.
  function _airacFreqKey(type) {
    var t = String(type || "").toLowerCase();
    if (t === "atis") return "atis";
    if (t === "ground") return "ground";
    if (t === "tower") return "tower";
    if (t === "approach" || t === "departure") return "approach";
    if (t === "ctaf") return "ctaf";
    if (t === "unicom") return "unicom";
    return null;
  }
  function airportToFreqs(ap) {
    if (!ap) return null;
    var out = {};
    if (ap.elevation_ft != null) out.elev = String(ap.elevation_ft);
    (ap.frequencies || []).forEach(function(f) {
      var k = _airacFreqKey(f.type);
      if (!k) return;
      if (out[k]) return; // first one wins per type
      var v = Number(f.frequency_mhz);
      if (isFinite(v)) out[k] = (Math.round(v * 1000) / 1000).toFixed(3);
    });
    return out;
  }

  async function refreshAirportFreqs(which, overwrite) {
    var icao = flight && flight[which];
    if (!icao || !/^[A-Z0-9]{4}$/.test(String(icao).toUpperCase())) return;
    var ap = await airacAirport(icao);
    if (!ap) return;
    var derived = airportToFreqs(ap);
    if (!derived) return;
    setFlight(function(f) {
      var prev = (f.freqs && f.freqs[which]) || {};
      var merged = {};
      Object.keys(derived).forEach(function(k) {
        merged[k] = overwrite ? derived[k] : (prev[k] || derived[k]);
      });
      // preserve any user-entered fields not in derived
      Object.keys(prev).forEach(function(k) { if (!(k in merged)) merged[k] = prev[k]; });
      return Object.assign({}, f, { freqs: Object.assign({}, f.freqs || {}, { [which]: merged }) });
    });
  }

  useEffect(function() {
    ["origin", "destination", "alternate"].forEach(function(which) {
      var icao = flight[which];
      if (!icao || !/^[A-Z0-9]{4}$/.test(String(icao).toUpperCase())) return;
      var current = (flight.freqs && flight.freqs[which]) || {};
      var hasAny = Object.keys(current).some(function(k) { return current[k]; });
      if (hasAny) return; // never auto-overwrite
      refreshAirportFreqs(which, false);
    });
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [flight.origin, flight.destination, flight.alternate]);
  const [fleet, setFleet] = useState(() => {
    try {
      const saved = localStorage.getItem('navlog_fleet');
      if (saved) {
        const parsed = JSON.parse(saved);
        if (Object.keys(parsed).length > 0) return parsed;
      }
    } catch {}
    return Object.fromEntries(
      Object.entries(FLEET_DEFAULTS).map(([k, v]) => [k, { ...v, id: k, isBuiltIn: true }])
    );
  });
  const [fleetOpen, setFleetOpen] = useState(false);
  const [fleetEditAircraft, setFleetEditAircraft] = useState(null); // null = closed, {} = new, {id,...} = edit

  const ac = fleet[flight.aircraftKey] || Object.values(fleet)[0];

  // Trigger recompute when the WMM library finishes loading
  const [geomagReady, setGeomagReady] = useState(!!window._geomagnetism);
  useEffect(() => {
    if (window._geomagnetism) { setGeomagReady(true); return; }
    var handler = function() { setGeomagReady(true); };
    window.addEventListener('geomagready', handler);
    return function() { window.removeEventListener('geomagready', handler); };
  }, []);

  // Theme tokens
  const theme = useMemo(() => themes[prefs.theme] || themes.night, [prefs.theme]);
  const fontScale = { s: 0.9, m: 1, l: 1.15 }[prefs.fontSize] || 1;

  // Computa dados de cada checkpoint (perna ATÉ ele)
  const computed = useMemo(() => {
    // Lat/lon is source of truth: for consecutive pairs with explicit coords,
    // always derive TC and dist from geometry (overrides any manually stored value).
    var resolvedCps = flight.checkpoints.map(function(cp, i) {
      if (i === 0 || cp.isOrigin) return cp;
      var prev = flight.checkpoints[i - 1];
      if (prev.lat != null && prev.lon != null && cp.lat != null && cp.lon != null) {
        return Object.assign({}, cp, {
          tc:   Math.round(gcTC(prev.lat, prev.lon, cp.lat, cp.lon)),
          dist: Math.round(gcDist(prev.lat, prev.lon, cp.lat, cp.lon) * 10) / 10
        });
      }
      return cp;
    });

    // Resolve altitude profile — handles inherited altitudes and multi-leg climbs
    var _altRes = resolveAltitudeProfile(resolvedCps, ac, flight);
    var altProfile     = _altRes.profile;
    var altProfileWarn = _altRes.altWarnings;
    var altLegPlans    = _altRes.legPlans || {};

    const eobtMin = parseHHMM(flight.eobt) ?? 0;
    const fuelStart = flight.fuelInitial ?? ac.fuelUsable;
    let etaPlanned = eobtMin;
    let fuelRem = fuelStart;
    let cumDist = 0;
    let cumTime = 0;
    var _res = resolvedCps.map((cp, i) => {
      if (cp.isOrigin) {
        const originAlt = altProfile[i];
        return {
          ...cp,
          alt: originAlt,
          tas: null, wca: null, th: null, mc: null, mh: null, ch: null,
          gsPlanned: null, etePlanned: 0,
          etaPlanned: eobtMin,
          fuelLeg: 0,
          fuelRemPlanned: fuelStart,
          gphEffective: ac.gphCruise,
          portions: [],
          cumDist: 0,
          cumTime: 0,
          windDirUsed: flight.windDir,
          windVelUsed: flight.windVel,
        };
      }

      // Altitude-per-fix: use pre-resolved profile (handles inherited / multi-leg climbs)
      const prevAlt = altProfile[i - 1];
      const thisAlt = altProfile[i];

      // Vento: windMode = null/undefined → padrão da rota
      //                   "none"          → sem vento (vel=0)
      //                   "custom"        → windDir/windVel do checkpoint
      let wDir, wVel;
      if (cp.windMode === "none") {
        wDir = 0; wVel = 0;
      } else if (cp.windMode === "custom" && cp.windDir != null) {
        wDir = Number(cp.windDir);
        wVel = Number(cp.windVel ?? 0);
      } else {
        wDir = flight.windDir;
        wVel = flight.windVel;
      }

      // Phase split: prefer the resolver's segment-aware plan (continuous
      // climb/descent across inherit WPs ⇒ middle legs are single-phase, only
      // the boundary legs carry TOC/TOD virtuals). Fall back to per-leg
      // computeLegPhases when the resolver didn't pre-plan this leg.
      let portions, avgTas;
      if (altLegPlans[i]) {
        portions = altLegPlans[i];
        const _tt = portions.reduce((s, p) => s + (p.timeMin || 0), 0);
        const _td = portions.reduce((s, p) => s + (p.dist || 0), 0);
        avgTas = _tt > 0 ? (_td / _tt) * 60 : (ac.tasCruise || 100);
      } else {
        const _r = computeLegPhases(
          prevAlt, thisAlt, cp.dist || 0, cp, ac, flight.isaDevC || 0,
          wDir, wVel, flight.variation
        );
        portions = _r.portions;
        avgTas = _r.avgTas;
      }

      // Per-leg magnetic variation from WMM (if library loaded and coords known)
      // Falls back to flight.variation when unavailable
      var legVar = getDecl(cp.lat, cp.lon, thisAlt) ?? (flight.variation ?? 0);

      // ETE = sum of timeMin per portion (climb/descent time is fixed by altitude/ROC, not distance)
      // Fuel = sum of (timeMin/60) × gph per portion
      let totalETE = 0;
      let fuelLeg = 0;
      let displayResult = null; // use cruise phase for MH/WCA/heading display
      portions.forEach((p) => {
        totalETE += p.timeMin ?? 0;
        fuelLeg += ((p.timeMin ?? 0) / 60) * p.gph;
        // For heading/WCA display, prefer the cruise phase
        const pr = calcLeg(cp.tc, 1, p.tas, wDir, wVel, legVar, 0);
        if (p.phase === "CRUZEIRO" || displayResult == null) displayResult = pr;
      });
      if (!displayResult) displayResult = calcLeg(cp.tc, 1, avgTas, wDir, wVel, legVar, 0);

      const totalDist = cp.dist || 0;
      // Effective GS = total distance / total time
      const totalGS = totalETE > 0 ? (totalDist / totalETE) * 60 : displayResult.gs;
      etaPlanned += totalETE;
      cumDist += totalDist;
      cumTime += totalETE;

      const gphEffective = totalETE > 0 ? fuelLeg / (totalETE / 60) : ac.gphCruise;
      fuelRem -= fuelLeg;

      return {
        ...cp,
        alt: thisAlt,   // effective altitude (resolved useCruiseAlt)
        tas: avgTas, ...displayResult,
        variation: legVar, // per-leg magnetic variation (WMM or fallback)
        gs: totalGS,
        ete: totalETE,
        gsPlanned: totalGS,
        etePlanned: totalETE,
        etaPlanned,
        fuelLeg,
        fuelRemPlanned: fuelRem,
        gphEffective,
        portions,
        cumDist,
        cumTime,
        windDirUsed: wDir,
        windVelUsed: wVel,
        windOverride: cp.windMode === "none" || cp.windMode === "custom",
        warnings: [...validateLeg(cp, { gs: totalGS }), ...(altProfileWarn[i] ? [altProfileWarn[i]] : [])],
        notes: cp.notes || "",
      };
    });

    // Detect cross-leg phase transitions at user WPs: when the climb (or
    // descent) completes exactly at a fix instead of mid-leg, no virtual
    // marker is emitted by liveRoute (the leg is single-phase). Tag the WP
    // itself so the views can render a TOC/TOD/BOC/BOD badge inline.
    for (var _ph = 0; _ph < _res.length; _ph++) {
      var _here = _res[_ph];
      var _next = _res[_ph + 1];
      if (!_here || _here.isOrigin || !_here.portions || _here.portions.length === 0) continue;
      if (!_next || !_next.portions || _next.portions.length === 0) continue;
      var _lastPhase = _here.portions[_here.portions.length - 1].phase;
      var _nextFirst = _next.portions[0].phase;
      if (_lastPhase === "SUBIDA" && _nextFirst !== "SUBIDA") _here.phaseHint = "TOC";
      else if (_lastPhase === "DESCIDA" && _nextFirst !== "DESCIDA") _here.phaseHint = "BOD";
      else if (_lastPhase !== "SUBIDA" && _nextFirst === "SUBIDA") _here.phaseHint = "BOC";
      else if (_lastPhase !== "DESCIDA" && _nextFirst === "DESCIDA") _here.phaseHint = "TOD";
    }

    // Project lat/lon for waypoints without explicit coords using TC + dist
    // Forward pass: project from each known coord to subsequent unknown waypoints
    for (var _fi = 1; _fi < _res.length; _fi++) {
      if (_res[_fi].lat == null && _res[_fi-1].lat != null
          && _res[_fi].tc != null && (_res[_fi].dist ?? 0) > 0) {
        var _fp = projectDest(_res[_fi-1].lat, _res[_fi-1].lon, _res[_fi].tc, _res[_fi].dist);
        _res[_fi] = Object.assign({}, _res[_fi], { lat: _fp[0], lon: _fp[1], coordProjected: true });
      }
    }
    // Backward pass: project from each known coord back through unknown predecessors
    for (var _bi = _res.length - 2; _bi >= 0; _bi--) {
      if (_res[_bi].lat == null && _res[_bi+1].lat != null
          && _res[_bi+1].tc != null && (_res[_bi+1].dist ?? 0) > 0) {
        var _bp = projectSource(_res[_bi+1].lat, _res[_bi+1].lon, _res[_bi+1].tc, _res[_bi+1].dist);
        _res[_bi] = Object.assign({}, _res[_bi], { lat: _bp[0], lon: _bp[1], coordProjected: true });
      }
    }
    return _res;
  }, [flight, ac, geomagReady]);

  // Próximo checkpoint não cruzado
  const nextIdx = useMemo(() => {
    const idx = computed.findIndex((cp) => !cp.isOrigin && cp.ata == null);
    return idx === -1 ? computed.length : idx;
  }, [computed]);

  // ETA em voo: último ATA (ou ATD) + ETE das pernas seguintes
  // Se temos GS real do último ponto cruzado, recomputa ETE futuro com esse GS
  // Map: legIdx -> [{ label, autoKey, dist (planned, NM into the leg), time (planned, min into the leg) }]
  // Mirrors the autoKey numbering used by liveRoute below so we can look up virtual ATAs per leg.
  const legVirtualsMap = useMemo(() => {
    const map = {};
    let tocN = 0, todN = 0, bodN = 0, bocN = 0;
    computed.forEach((cp, i) => {
      if (cp.isOrigin || !cp.portions || cp.portions.length <= 1) return;
      const list = [];
      let accDist = 0, accTime = 0;
      for (let p = 0; p < cp.portions.length - 1; p++) {
        accDist += cp.portions[p].dist || 0;
        accTime += cp.portions[p].timeMin || 0;
        const from = cp.portions[p].phase, to = cp.portions[p + 1].phase;
        const label = from !== "SUBIDA"  && to === "SUBIDA"  ? "BOC"
          : from === "SUBIDA"  && to !== "SUBIDA"  ? "TOC"
          : from !== "DESCIDA" && to === "DESCIDA" ? "TOD"
          : from === "DESCIDA" && to !== "DESCIDA" ? "BOD"
          : null;
        if (!label) continue;
        const autoKey = label === "TOC" ? `toc_${tocN++}`
          : label === "TOD" ? `tod_${todN++}`
          : label === "BOC" ? `boc_${bocN++}`
          : `bod_${bodN++}`;
        list.push({ label, autoKey, dist: accDist, time: accTime });
      }
      if (list.length > 0) map[i] = list;
    });
    return map;
  }, [computed]);

  const liveETAs = useMemo(() => {
    const etas = computed.map(() => null);
    let lastCrossed = null;
    for (let i = computed.length - 1; i >= 0; i--) {
      if (computed[i].ata != null) { lastCrossed = i; break; }
    }
    let baseMin, baseIdx;
    if (lastCrossed != null) {
      baseMin = parseHHMM(computed[lastCrossed].ata);
      baseIdx = lastCrossed;
      etas[lastCrossed] = baseMin;
    } else if (flight.atd) {
      baseMin = parseHHMM(flight.atd);
      baseIdx = 0;
    } else {
      return etas;
    }
    let cumMin = baseMin;
    for (let i = baseIdx + 1; i < computed.length; i++) {
      const cp = computed[i];
      const legStartMin = cumMin;
      let legETE = cp.etePlanned;

      // Active deviation override: if this leg is the deviation target, replace
      // the planned ETE with one computed from the pilot's current position +
      // current TAS (wind-corrected). Cascades downstream legs naturally.
      const dev = flight.activeDeviation;
      if (dev && dev.targetIdx === i && dev.fromLat != null && dev.fromLon != null
          && cp.lat != null && cp.lon != null) {
        const devDist = gcDist(dev.fromLat, dev.fromLon, cp.lat, cp.lon);
        const devTas  = Number(dev.currentTas) || (ac && ac.tasCruise) || 100;
        const devTC   = gcTC(dev.fromLat, dev.fromLon, cp.lat, cp.lon);
        const r = calcLeg(devTC, devDist, devTas, flight.windDir, flight.windVel, flight.variation, 0);
        legETE = r.ete;
        const devStartMin = parseHHMM(dev.startedAt);
        if (devStartMin != null) {
          cumMin = devStartMin + legETE;
          etas[i] = cumMin;
          continue;
        }
        // Fall through: cumMin += legETE below
      }

      // Adjust ETE based on the latest marked virtual (TOC/TOD/BOD) on this leg.
      // Model: actual_GS in the climb/descent phase equals planned_GS, so reaching
      // TOC X minutes off plan means we covered planned_dist * (X / planned_time).
      // The remaining distance after the virtual runs at the planned post-virtual GS.
      const virtuals = legVirtualsMap[i];
      if (virtuals && virtuals.length > 0 && (cp.dist || 0) > 0 && (cp.etePlanned || 0) > 0) {
        const marked = [];
        for (const v of virtuals) {
          const ata = parseHHMM(flight.autoWpATAs?.[v.autoKey]);
          if (ata != null) marked.push({ ...v, ata });
        }
        if (marked.length > 0) {
          const last = marked[marked.length - 1];
          const actualTimeToVirtual = last.ata - legStartMin;
          if (actualTimeToVirtual > 0 && last.time > 0) {
            const actualDistToVirtual = last.dist * (actualTimeToVirtual / last.time);
            const remPlannedDist = cp.dist - last.dist;
            const remPlannedTime = cp.etePlanned - last.time;
            const remDist = cp.dist - actualDistToVirtual;
            const remGS = remPlannedDist > 0 && remPlannedTime > 0 ? remPlannedDist / remPlannedTime : null;
            const remTime = (remGS && remDist > 0) ? remDist / remGS : remPlannedTime;
            legETE = actualTimeToVirtual + Math.max(0, remTime);
          }
        }
      }

      cumMin = legStartMin + legETE;
      etas[i] = cumMin;
    }
    return etas;
  }, [computed, flight.atd, flight.autoWpATAs, flight.activeDeviation, flight.windDir, flight.windVel, flight.variation, ac, legVirtualsMap]);

  // Rota expandida com TOC/TOD/BOD virtuais interpolados entre as pernas
  const liveRoute = useMemo(() => {
    const result = [];
    let tocN = 0, todN = 0, bodN = 0, bocN = 0;
    computed.forEach((cp, i) => {
      if (cp.isOrigin) { result.push({ ...cp, userIdx: i }); return; }
      const prevEta = i > 0 ? computed[i - 1].etaPlanned : (parseHHMM(flight.eobt) ?? 0);
      const prevAlt = i > 0 ? computed[i - 1].alt : 0;
      const prevLat  = i > 0 ? computed[i - 1].lat  : null;
      const prevLon  = i > 0 ? computed[i - 1].lon  : null;
      // Actual leg-start time: prefer the ATA of the previous fix when it has been crossed.
      const prevAtaStr = i > 0 ? computed[i - 1].ata : null;
      const legStartActual = prevAtaStr ? parseHHMM(prevAtaStr) : prevEta;
      if (cp.portions?.length > 1) {
        let accDist = 0, accETE = 0;
        let prevVirtETE = 0, prevVirtDist = 0;
        // Total leg time from portions (sum of timeMin), used to distribute etePlanned by phase
        const totalLegTime = cp.portions.reduce((s, p) => s + (p.timeMin ?? 0), 0);
        for (let p = 0; p < cp.portions.length - 1; p++) {
          const por = cp.portions[p];
          // Time fraction: portion's timeMin share of total leg time
          const timeFrac = totalLegTime > 0 && (por.timeMin ?? 0) > 0
            ? por.timeMin / totalLegTime
            : (cp.dist > 0 ? por.dist / cp.dist : 0);
          accDist += por.dist;
          accETE += timeFrac * cp.etePlanned;
          const from = por.phase, to = cp.portions[p + 1].phase;
          let label = from !== "SUBIDA"  && to === "SUBIDA"  ? "BOC"
            : from === "SUBIDA"  && to !== "SUBIDA"  ? "TOC"
            : from !== "DESCIDA" && to === "DESCIDA" ? "TOD"
            : from === "DESCIDA" && to !== "DESCIDA" ? "BOD"
            : null;
          if (label) {
            const autoKey = label === "TOC" ? `toc_${tocN++}`
              : label === "TOD" ? `tod_${todN++}`
              : label === "BOC" ? `boc_${bocN++}`
              : `bod_${bodN++}`;
            const ataStr = flight.autoWpATAs?.[autoKey] ?? null;
            const ataMin = parseHHMM(ataStr);
            const eteLeg = accETE - prevVirtETE;
            const distLeg = accDist - prevVirtDist;
            // Visual position: when the virtual has been marked, shift it along the leg to the
            // distance the user actually covered (assuming planned phase GS).
            let displayDist = accDist;
            if (ataMin != null && accETE > 0) {
              const actualTime = ataMin - legStartActual;
              if (actualTime > 0) {
                const actualDist = accDist * (actualTime / accETE);
                displayDist = Math.max(0, Math.min(cp.dist || actualDist, actualDist));
              }
            }
            const vFrac = cp.dist > 0 ? displayDist / cp.dist : 0;
            const [vLat, vLon] = (prevLat != null && cp.lat != null)
              ? gcInterpolate(prevLat, prevLon, cp.lat, cp.lon, Math.max(0, Math.min(1, vFrac))) : [null, null];
            result.push({
              name: label, isVirtual: true, autoKey, userIdx: i,
              // TOC/BOD = leveled at dest alt; BOC/TOD = still at src alt
              alt: (label === "TOC" || label === "BOD") ? cp.alt : (prevAlt ?? cp.alt),
              lat: vLat, lon: vLon,
              tc: cp.tc, mh: cp.mh, mc: cp.mc, wca: cp.wca,
              windMode: cp.windMode, windDirUsed: cp.windDirUsed, windVelUsed: cp.windVelUsed,
              dist: Math.round(displayDist * 10) / 10,
              distToNext: Math.round(((cp.dist || 0) - displayDist) * 10) / 10,
              etePlanned: accETE,
              eteLeg: Math.round(eteLeg * 10) / 10,
              distLeg: Math.round(distLeg * 100) / 100,
              etaPlanned: prevEta + accETE,
              ata: ataStr,
              gsActual: null, portions: [], warnings: [], notes: "",
            });
            prevVirtETE = accETE;
            prevVirtDist = accDist;
          }
        }
        // User waypoint gets the remaining segment after the last virtual point
        const eteLeg = cp.etePlanned - prevVirtETE;
        const distLeg = cp.dist - prevVirtDist;
        result.push({ ...cp, userIdx: i, eteLeg, distLeg });
      } else {
        result.push({ ...cp, userIdx: i });
      }
    });
    return result;
  }, [computed, flight.autoWpATAs, flight.eobt]);

  // Próximo item não cruzado na liveRoute (inclui TOC/TOD virtuais)
  const nextLiveIdx = useMemo(() => {
    for (let i = 0; i < liveRoute.length; i++) {
      const item = liveRoute[i];
      if (item.isOrigin || item.ata != null) continue;
      if (item.isVirtual) {
        // Pular se o próximo waypoint de usuário já foi cruzado
        const nextUser = liveRoute.slice(i + 1).find(x => !x.isVirtual && !x.isOrigin);
        if (nextUser?.ata != null) continue;
      }
      return i;
    }
    return liveRoute.length;
  }, [liveRoute]);

  function markVirtual(key) {
    haptic([40]); warmUpAudio();
    const now = nowHHMM();
    setFlight((f) => ({ ...f, autoWpATAs: { ...(f.autoWpATAs || {}), [key]: formatHHMMSS(now) } }));
    setLegTimerStart(Date.now());
  }
  function unmarkVirtual(key) {
    setFlight((f) => { const m = { ...(f.autoWpATAs || {}) }; delete m[key]; return { ...f, autoWpATAs: m }; });
  }
  function setVirtualAta(key, ataStr) {
    setFlight((f) => ({ ...f, autoWpATAs: { ...(f.autoWpATAs || {}), [key]: ataStr } }));
  }

  // Combustível restante real (baseado em ATAs reais consumindo no GPH planejado)
  const liveFuel = useMemo(() => {
    const fuelStart = flight.fuelInitial ?? ac.fuelUsable;
    let fuel = fuelStart;
    return computed.map((cp, i) => {
      if (cp.isOrigin) return fuel;
      // Se tem ATA real, usa tempo real
      if (cp.ata != null && i > 0) {
        const prevAta = computed[i - 1].ata != null
          ? parseHHMM(computed[i - 1].ata)
          : (i - 1 === 0 ? parseHHMM(flight.atd ?? flight.eobt) : null);
        if (prevAta != null) {
          const ataMin = parseHHMM(cp.ata);
          let elapsed = ataMin - prevAta;
          if (elapsed < 0) elapsed += 1440;
          fuel -= (elapsed / 60) * (cp.gphEffective || ac.gphCruise);
          return fuel;
        }
      }
      return null; // não cruzado ainda
    });
  }, [computed, flight, ac]);

  // Marca checkpoint como cruzado (registra ATA = agora UTC, calcula GS real)
  function markCrossed(i) {
    haptic([60]); warmUpAudio();
    const now = nowHHMM();
    setAta(i, formatHHMMSS(now));
    setLegTimerStart(Date.now()); // inicia cronômetro de perna
  }

  // Salvar nota de um waypoint
  function saveNote(i, text) {
    setFlight((f) => {
      const cps = [...f.checkpoints];
      cps[i] = { ...cps[i], notes: text };
      return { ...f, checkpoints: cps };
    });
  }

  // Define ATA manualmente (string "hh:mm"); calcula GS real automaticamente
  function setAta(i, ataStr) {
    setFlight((f) => {
      const cps = [...f.checkpoints];
      const ataMin = parseHHMM(ataStr);
      if (ataMin == null) {
        cps[i] = { ...cps[i], ata: null, gsActual: null };
        return { ...f, checkpoints: cps };
      }
      // Acha tempo do checkpoint anterior (ATA real, ou ATD/EOBT se for o primeiro depois da origem)
      const prev = cps[i - 1];
      let prevTime;
      if (prev.isOrigin) {
        prevTime = parseHHMM(f.atd ?? f.eobt);
      } else {
        prevTime = prev.ata != null ? parseHHMM(prev.ata) : null;
      }
      let gsActual = null;
      if (prevTime != null && cps[i].dist > 0) {
        let elapsed = ataMin - prevTime;
        if (elapsed < 0) elapsed += 1440;
        if (elapsed > 0) gsActual = (cps[i].dist / elapsed) * 60;
      }
      cps[i] = { ...cps[i], ata: ataStr, gsActual };
      // Auto-clear an active deviation when its target gets a real ATA — the
      // adjustment leg has been consumed and the original plan resumes.
      var nextDev = f.activeDeviation;
      if (ataStr != null && nextDev && nextDev.targetIdx === i) nextDev = null;
      return { ...f, checkpoints: cps, activeDeviation: nextDev };
    });
  }

  function setDeviation(dev) {
    setFlight(function(f) { return Object.assign({}, f, { activeDeviation: dev }); });
  }
  function clearDeviation() {
    setFlight(function(f) {
      var c = Object.assign({}, f);
      delete c.activeDeviation;
      return c;
    });
  }

  function unmark(i) {
    setFlight((f) => {
      const cps = [...f.checkpoints];
      cps[i] = { ...cps[i], ata: null, gsActual: null };
      return { ...f, checkpoints: cps };
    });
  }

  function moveUp(i) {
    if (i <= 1) return;
    setFlight((f) => {
      const cps = [...f.checkpoints];
      [cps[i - 1], cps[i]] = [cps[i], cps[i - 1]];
      return { ...f, checkpoints: cps };
    });
  }

  function reorder(fromIdx, toIdx) {
    if (fromIdx === toIdx || fromIdx <= 0 || toIdx <= 0) return;
    setFlight((f) => {
      const cps = [...f.checkpoints];
      const [item] = cps.splice(fromIdx, 1);
      cps.splice(toIdx, 0, item);
      return { ...f, checkpoints: cps };
    });
  }

  function moveDown(i) {
    setFlight((f) => {
      if (i >= f.checkpoints.length - 1) return f;
      if (i === 0) return f;
      const cps = [...f.checkpoints];
      [cps[i], cps[i + 1]] = [cps[i + 1], cps[i]];
      return { ...f, checkpoints: cps };
    });
  }

  function resetFlight() {
    setFlight((f) => ({
      ...f,
      atd: null,
      autoWpATAs: {},
      checkpoints: f.checkpoints.map((cp) =>
        cp.isOrigin ? cp : { ...cp, ata: null, gsActual: null }
      ),
    }));
    setLegTimerStart(null);
  }

  function depart() {
    haptic([50, 30, 50, 30, 80]); warmUpAudio();
    const now = nowHHMM();
    setFlight((f) => ({ ...f, atd: formatHHMMSS(now) }));
    setLegTimerStart(Date.now());
  }

  // ----- Rotas salvas -----
  function newBlankRoute() {
    if (!confirm("Limpar a rota atual e começar do zero?")) return;
    setFlight({
      ...DEFAULT_FLIGHT,
      callsign: flight.callsign,
      aircraftKey: flight.aircraftKey,
      checkpoints: [
        { name: "ORIG", alt: 0, tc: null, dist: 0, ata: null, gsActual: null, isOrigin: true },
      ],
      origin: "",
      destination: "",
      alternate: "",
    });
  }

  async function saveCurrentRoute() {
    const name = prompt("Nome da rota:", `${flight.origin}-${flight.destination}`);
    if (!name) return;
    const route = {
      id: Date.now().toString(),
      name,
      savedAt: new Date().toISOString(),
      flight: {
        ...flight,
        // limpa ATAs antes de salvar — rota é template
        checkpoints: flight.checkpoints.map((cp) => ({ ...cp, ata: null, gsActual: null })),
      },
    };
    const next = [...savedRoutes.filter((r) => r.name !== name), route];
    setSavedRoutes(next);
    try {
      if (window.storage) await window.storage.set("routes", JSON.stringify(next));
    } catch {}
  }

  async function loadRoute(route) {
    setFlight(route.flight);
    setRoutesOpen(false);
    setTab("setup");
  }

  async function deleteRoute(id) {
    if (!confirm("Excluir esta rota salva?")) return;
    const next = savedRoutes.filter((r) => r.id !== id);
    setSavedRoutes(next);
    try {
      if (window.storage) await window.storage.set("routes", JSON.stringify(next));
    } catch {}
  }

  // ----- Calcular TOC/TOD automaticamente -----
  function calcTOCTOD() {
    setFlight((f) => {
      const cps = [...f.checkpoints];

      // ── 1. Reconstruir rota limpa ──────────────────────────────────────────
      // Remove TOC/TOD e colapsa as pernas que foram divididas na iteração anterior.
      // Uma perna foi dividida se dois checkpoints consecutivos têm o mesmo TC.
      // Estratégia: primeiro filtrar TOC/TOD, depois fundir consecutivos com TC igual.
      const noTOCTOD = cps.filter((cp, i) => i === 0 || (cp.name !== "TOC" && cp.name !== "TOD"));

      // Fundir consecutivos com TC igual (fragmentos de perna dividida)
      const merged = [noTOCTOD[0]];
      for (let i = 1; i < noTOCTOD.length; i++) {
        const prev = merged[merged.length - 1];
        const cur = noTOCTOD[i];
        // Dois fragmentos têm o mesmo TC e um deles foi a "segunda metade" (não tem nome especial)
        if (
          !prev.isOrigin &&
          prev.tc === cur.tc &&
          prev.name !== cur.name // nomes diferentes = dois WP reais, não fundir
        ) {
          // Fundir: o ponto "real" é o cur (tem o nome original), dist somada
          merged[merged.length - 1] = {
            ...cur,
            dist: Math.round((prev.dist + cur.dist) * 10) / 10,
          };
        } else {
          merged.push(cur);
        }
      }

      const cleaned = merged;
      if (cleaned.length < 2) {
        alert("Adicione pelo menos um waypoint além da origem antes de calcular TOC/TOD.");
        return f;
      }

      // ── 2. Calcular distâncias de subida e descida ─────────────────────────
      const origElev = Number(f.freqs?.origin?.elev) || 0;
      const destElev = Number(f.freqs?.destination?.elev) || 0;
      const cruiseAlt = Number(f.cruiseAlt) || 7000;
      const ac = FLEET_DEFAULTS[f.aircraftKey];

      const climbDist = Math.round(
        ((ac.vy + 10) / 60) * ((cruiseAlt - origElev) / ac.rocClimb) * 10
      ) / 10;
      const descDist = Math.round(
        (ac.vDescent / 60) * ((cruiseAlt - destElev) / ac.rodDescent) * 10
      ) / 10;

      const routeDist = cleaned.slice(1).reduce((s, cp) => s + (cp.dist || 0), 0);

      if (climbDist + descDist > routeDist) {
        alert(
          `Rota muito curta para subir até ${cruiseAlt} ft.\n` +
          `Subida: ${climbDist.toFixed(1)} NM · Descida: ${descDist.toFixed(1)} NM\n` +
          `Total necessário: ${(climbDist + descDist).toFixed(1)} NM · Rota: ${routeDist.toFixed(1)} NM`
        );
        return f;
      }

      // ── 3. Inserir TOC e TOD na rota limpa ────────────────────────────────
      const todAt = routeDist - descDist; // dist acumulada onde TOD ocorre
      const out = [cleaned[0]];
      let acc = 0;
      let tocInserted = false;
      let todInserted = false;

      for (let i = 1; i < cleaned.length; i++) {
        const cp = cleaned[i];
        const legStart = acc;
        const legEnd = acc + (cp.dist || 0);
        const SNAP = 0.5; // NM mínimos para inserir ponto separado

        // TOC cai nesta perna?
        if (!tocInserted && climbDist > legStart && climbDist <= legEnd) {
          const dToTOC   = Math.round((climbDist - legStart) * 10) / 10;
          const dFromTOC = Math.round((legEnd - climbDist) * 10) / 10;
          if (dToTOC >= SNAP && dFromTOC >= SNAP) {
            out.push({ name: "TOC", phase: "SUBIDA",   tc: cp.tc, dist: dToTOC,   ata: null, gsActual: null });
            out.push({ ...cp,       phase: "CRUZEIRO",             dist: dFromTOC });
          } else {
            // Muito próximo de um extremo: sobe TOC para o WP vizinho mais próximo
            out.push({ ...cp, phase: dToTOC < SNAP ? "SUBIDA" : "CRUZEIRO" });
          }
          tocInserted = true;
          acc = legEnd;
          continue;
        }

        // TOD cai nesta perna?
        if (tocInserted && !todInserted && todAt > legStart && todAt <= legEnd) {
          const dToTOD   = Math.round((todAt - legStart) * 10) / 10;
          const dFromTOD = Math.round((legEnd - todAt) * 10) / 10;
          if (dToTOD >= SNAP && dFromTOD >= SNAP) {
            out.push({ name: "TOD", phase: "CRUZEIRO", tc: cp.tc, dist: dToTOD,   ata: null, gsActual: null });
            out.push({ ...cp,       phase: "DESCIDA",              dist: dFromTOD });
          } else {
            out.push({ ...cp, phase: dToTOD < SNAP ? "CRUZEIRO" : "DESCIDA" });
          }
          todInserted = true;
          acc = legEnd;
          continue;
        }

        // Waypoint normal: atribui fase pelo posicionamento
        const phase = !tocInserted ? "SUBIDA" : !todInserted ? "CRUZEIRO" : "DESCIDA";
        out.push({ ...cp, phase });
        acc = legEnd;
      }

      return { ...f, checkpoints: out };
    });
  }

  // ----- Preferências -----
  function savePrefs(p) {
    setPrefs(p);
    try { if (window.storage) window.storage.set("prefs", JSON.stringify(p)); } catch {}
    try { localStorage.setItem("navlog_prefs", JSON.stringify(p)); } catch {}
  }

  // ----- Wake lock -----
  useEffect(() => {
    let cancelled = false;
    async function acquire() {
      if (!prefs.wakeLock) return;
      try {
        if ("wakeLock" in navigator) {
          wakeLockRef.current = await navigator.wakeLock.request("screen");
        }
      } catch {}
    }
    async function release() {
      try {
        if (wakeLockRef.current) {
          await wakeLockRef.current.release();
          wakeLockRef.current = null;
        }
      } catch {}
    }
    if (prefs.wakeLock) acquire(); else release();
    // re-aquire quando volta visível
    const onVis = () => { if (prefs.wakeLock && document.visibilityState === "visible") acquire(); };
    document.addEventListener("visibilitychange", onVis);
    return () => { cancelled = true; document.removeEventListener("visibilitychange", onVis); release(); };
  }, [prefs.wakeLock]);

  // ----- Importar rota de string FPL ICAO -----
  function importFPLRoute(rawRoute) {
    // Extrai sequência de tokens que parecem fixos: 5+ letras, ou nome com /altitude
    // FPL típico: "DCT EMBOI UZ23 RIPLI DCT" — separadores: espaços, vírgulas
    const tokens = rawRoute.toUpperCase()
      .replace(/[\n\r,]+/g, " ")
      .split(/\s+/)
      .filter(Boolean);
    // Filtros: descartar DCT, palavras de aerovia (UA/UZ/UB/UM seguidos de número), SID/STAR comuns
    const skip = new Set(["DCT", "DIRECT", "SID", "STAR", "VFR", "IFR"]);
    const isAirway = (t) => /^[UA-Z]{1,2}\d+[A-Z]?$/.test(t);
    const isFix = (t) => /^[A-Z][A-Z0-9]{1,5}$/.test(t) && !skip.has(t) && !isAirway(t);
    const fixes = tokens.filter(isFix);
    if (fixes.length === 0) {
      alert("Nenhum waypoint reconhecido na rota.");
      return;
    }
    setFlight((f) => {
      const origin = f.checkpoints[0];
      const newCps = [origin];
      fixes.forEach((name, i) => {
        // Se já existe (ex.: o destino), preserva
        const existing = f.checkpoints.find((c) => c.name === name && !c.isOrigin);
        if (existing) {
          newCps.push(existing);
        } else {
          newCps.push({
            name, alt: f.cruiseAlt ?? 7000, tc: 0, dist: 0,
            ata: null, gsActual: null,
          });
        }
      });
      return { ...f, checkpoints: newCps, autoWpATAs: {} };
    });
    setImportOpen(false);
  }

  // Persistência — storage do artifact + fallback localStorage
  const store = {
    async get(key) {
      try {
        if (window.storage) {
          const r = await window.storage.get(key);
          if (r?.value) return r.value;
        }
      } catch {}
      try { return localStorage.getItem("navlog_" + key); } catch {}
      return null;
    },
    async set(key, value) {
      try { if (window.storage) await window.storage.set(key, value); } catch {}
      try { localStorage.setItem("navlog_" + key, value); } catch {}
    },
  };

  useEffect(() => {
    (async () => {
      try {
        const r = await store.get("flight");
        if (r) {
          const loaded = JSON.parse(r);
          // Strip legacy isAuto waypoints from previous deploy
          if (loaded.checkpoints) loaded.checkpoints = loaded.checkpoints.filter(cp => !cp.isAuto);
          setFlight({ ...DEFAULT_FLIGHT, ...loaded });
        }
        const rr = await store.get("routes");
        if (rr) setSavedRoutes(JSON.parse(rr));
        const pp = await store.get("prefs");
        if (pp) setPrefs({ ...DEFAULT_PREFS, ...JSON.parse(pp) });
        // Load PDF overlays from IndexedDB (stores warped dataUrl + bounds)
        var idbOverlays = await getAllPdfOverlaysIdb();
        if (idbOverlays.length > 0) {
          // Use stored data directly — warped image and bounds are already in IndexedDB
          setPdfOverlays(idbOverlays.filter(function(r) { return r.dataUrl && r.bounds; }));
        }
      } catch {}
      // Mark the initial load as complete so the cleanup effect can run safely.
      setPdfLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (!pdfLoaded) return; // skip until async load completes — avoids overwriting artifact storage with the in-memory default
    store.set("flight", JSON.stringify(flight));
  }, [flight, pdfLoaded]);

  useEffect(() => {
    if (!pdfLoaded) return;
    store.set("routes", JSON.stringify(savedRoutes));
  }, [savedRoutes, pdfLoaded]);

  useEffect(() => {
    // Don't sync to IDB until the initial load has populated pdfOverlays —
    // otherwise the empty initial state would mark every stored overlay as
    // an orphan and delete them all on app start (losing all charts).
    if (!pdfLoaded) return;
    pdfOverlays.forEach(function(o) {
      savePdfOverlayIdb(o, null); // handle was saved separately on creation
    });
    // Clean up deleted overlays
    var ids = new Set(pdfOverlays.map(function(o) { return o.id; }));
    getAllPdfOverlaysIdb().then(function(all) {
      all.forEach(function(rec) { if (!ids.has(rec.id)) deletePdfHandle(rec.id); });
    }).catch(function() {});
  }, [pdfOverlays, pdfLoaded]);

  useEffect(() => {
    try { localStorage.setItem('navlog_fleet', JSON.stringify(fleet)); } catch {}
  }, [fleet]);

  const glowStyle = theme.glow ? "text-shadow: 0 0 8px currentColor;" : "";

  // Estilos compartilhados — paleta cockpit dark
  return (
    <div className={`min-h-screen ${theme.bg} ${theme.fg} font-mono`}
         style={{ fontSize: `${fontScale}rem` }}>
      <style>{`:root { --amber: #ffb13b; --cyan: #4ddbff; --green: #4ade80; --red: #ef4444; }
        .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
        .cockpit-glow { ${glowStyle} }
        @media (orientation: landscape) and (max-height: 500px) {
          .landscape-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
          .landscape-sidebar { border-left: 1px solid; overflow-y: auto; max-height: 100vh; }
          .landscape-main { overflow-y: auto; max-height: 100vh; }
        }
      `}</style>

      {/* HEADER */}
      <header className={`sticky top-0 z-20 ${theme.bg}/95 backdrop-blur border-b ${theme.panelBorder}`}>
        <div className="px-3 py-2 flex items-center justify-between">
          <div className="flex items-center gap-2 flex-1 min-w-0">
            <Plane className={`w-5 h-5 ${theme.accent} shrink-0`} />
